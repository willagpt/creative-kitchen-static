<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chefly® — creative kitchen static</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF6EE;
    --warm-white: #FFFAF5;
    --near-black: #0D0D0D;
    --orange: #FF6B2C;
    --orange-dim: #D4561F;
    --hot-yellow: #FFD60A;
    --electric-green: #A8E10C;
    --blush: #FF8FA3;
    --sky-blue: #5CCFFF;
    --warm-grey: #E8E0D8;
    --mid-grey: #9A918A;
    --green-soft: #D4EDDA;
    --green-text: #1B5E20;
    --red-soft: #F8D7DA;
    --red-text: #721C24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--cream);
    color: var(--near-black);
    font-weight: 400;
    line-height: 1.6;
    font-size: 15px;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    opacity: 0.04;
  }

  /* ═══ NAV ═══ */
  .nav {
    background: var(--near-black);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .nav h1 {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
    letter-spacing: -0.5px; color: white; margin: 0; line-height: 1;
  }
  .nav button {
    background: var(--orange);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.3s ease;
  }
  .nav button:hover { background: var(--orange-dim); }
  .nav button:disabled {
    background: var(--mid-grey);
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* ═══ MAIN LAYOUT ═══ */
  .container {
    display: grid;
    grid-template-columns: 400px 1fr;
    min-height: calc(100vh - 48px);
    gap: 20px;
    padding: 20px;
  }
  @media (max-width: 1200px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { max-height: 400px; overflow-y: auto; }
  }

  /* ═══ SIDEBAR ═══ */
  .sidebar {
    background: white;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid var(--warm-grey);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .sidebar h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 8px;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .input-group label {
    font-weight: 600;
    font-size: 13px;
    color: var(--mid-grey);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .input-group input,
  .input-group textarea,
  .input-group select {
    padding: 10px 12px;
    border: 1px solid var(--warm-grey);
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 400;
    background: var(--warm-white);
    color: var(--near-black);
  }
  .input-group input:focus,
  .input-group textarea:focus,
  .input-group select:focus {
    outline: none;
    border-color: var(--orange);
    background: white;
  }
  .input-group textarea {
    resize: vertical;
    min-height: 80px;
  }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--orange);
  }
  .checkbox-group label {
    font-size: 14px;
    cursor: pointer;
    margin: 0;
  }

  /* ═══ MAIN CONTENT ═══ */
  .content {
    background: white;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid var(--warm-grey);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .content h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--near-black);
    margin: 0;
    line-height: 1.2;
  }
  .content p {
    margin: 0;
    color: var(--mid-grey);
    font-size: 14px;
  }

  /* ═══ RECIPE CARDS ═══ */
  .recipes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .recipe-card {
    background: linear-gradient(135deg, var(--warm-white) 0%, var(--cream) 100%);
    border: 1px solid var(--warm-grey);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }
  .recipe-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  }
  .recipe-image {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, var(--blush) 0%, var(--hot-yellow) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  .recipe-content {
    padding: 16px;
  }
  .recipe-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 8px;
  }
  .recipe-description {
    font-size: 12px;
    color: var(--mid-grey);
    margin-bottom: 12px;
  }
  .recipe-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--mid-grey);
  }

  /* ═══ LOADING / STATUS ═══ */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 24px;
    background: var(--warm-white);
    border-radius: 8px;
    border: 1px solid var(--warm-grey);
  }
  .spinner {
    border: 2px solid var(--warm-grey);
    border-top: 2px solid var(--orange);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-message {
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 14px;
  }
  .status-success {
    background: var(--green-soft);
    border-color: var(--green-text);
    color: var(--green-text);
  }
  .status-error {
    background: var(--red-soft);
    border-color: var(--red-text);
    color: var(--red-text);
  }

  /* ═══ GENERATED IMAGE DISPLAY ═══ */
  .generated-image-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .generated-image {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--warm-grey);
    max-height: 400px;
    object-fit: contain;
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-left">
    <h1>chefly® creative kitchen</h1>
  </div>
  <button id="generateBtn" onclick="generateRecipe()">Generate Recipe</button>
</div>

<div class="container">
  <div class="sidebar">
    <div>
      <h2>Recipe Type</h2>
      <div class="input-group">
        <select id="recipeType">
          <option value="appetizer">Appetizer</option>
          <option value="main">Main Course</option>
          <option value="dessert">Dessert</option>
          <option value="breakfast">Breakfast</option>
          <option value="drink">Drink</option>
          <option value="salad">Salad</option>
        </select>
      </div>
    </div>
    <div>
      <h2>Cuisine</h2>
      <div class="input-group">
        <select id="cuisine">
          <option value="italian">Italian</option>
          <option value="mexican">Mexican</option>
          <option value="japanese">Japanese</option>
          <option value="thai">Thai</option>
          <option value="french">French</option>
          <option value="indian">Indian</option>
          <option value="fusion">Fusion</option>
        </select>
      </div>
    </div>
    <div>
      <h2>Dietary Restrictions</h2>
      <div class="checkbox-group">
        <input type="checkbox" id="vegetarian" value="vegetarian">
        <label for="vegetarian">Vegetarian</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="vegan" value="vegan">
        <label for="vegan">Vegan</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="glutenfree" value="gluten-free">
        <label for="glutenfree">Gluten-Free</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="dairyfree" value="dairy-free">
        <label for="dairyfree">Dairy-Free</label>
      </div>
    </div>
    <div>
      <h2>Additional Info</h2>
      <div class="input-group">
        <label for="ingredients">Ingredients on hand (comma-separated)</label>
        <textarea id="ingredients" placeholder="e.g., chicken, garlic, olive oil"></textarea>
      </div>
      <div class="input-group">
        <label for="apiKey">FAL.AI API Key</label>
        <input type="password" id="apiKey" placeholder="sk_live_..." value="">
      </div>
      <div class="input-group">
        <label for="model">Model</label>
        <select id="model">
          <option value="fal-ai/flux-pro">Flux Pro</option>
          <option value="fal-ai/flux-realism">Flux Realism</option>
          <option value="fal-ai/flux-general">Flux General</option>
          <option value="fal-ai/flux-raw">Flux Raw</option>
          <option value="fal-ai/flux-dev">Flux Dev</option>
        </select>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="includeImage" checked>
        <label for="includeImage">Generate Image</label>
      </div>
    </div>
  </div>

  <div class="content">
    <div>
      <h2>Your Recipe</h2>
      <p>Select your preferences and generate a unique recipe with AI-generated imagery</p>
    </div>
    <div id="outputArea"></div>
  </div>
</div>

<script>
async function generateRecipe() {
  const generateBtn = document.getElementById('generateBtn');
  const outputArea = document.getElementById('outputArea');

  // Get input values
  const recipeType = document.getElementById('recipeType').value;
  const cuisine = document.getElementById('cuisine').value;
  const apiKey = document.getElementById('apiKey').value;
  const model = document.getElementById('model').value;
  const includeImage = document.getElementById('includeImage').checked;
  
  const dietary = [];
  if (document.getElementById('vegetarian').checked) dietary.push('vegetarian');
  if (document.getElementById('vegan').checked) dietary.push('vegan');
  if (document.getElementById('glutenfree').checked) dietary.push('gluten-free');
  if (document.getElementById('dairyfree').checked) dietary.push('dairy-free');
  
  const ingredients = document.getElementById('ingredients').value;

  // Validate inputs
  if (!recipeType || !cuisine) {
    outputArea.innerHTML = '<div class="status-message status-error">Please fill in recipe type and cuisine</div>';
    return;
  }

  if (includeImage && !apiKey) {
    outputArea.innerHTML = '<div class="status-message status-error">API Key is required to generate images</div>';
    return;
  }

  generateBtn.disabled = true;
  outputArea.innerHTML = '<div class="loading"><div class="spinner"></div> Generating recipe...</div>';

  try {
    // Generate recipe description using Claude
    const recipeResponse = await fetch('/.netlify/functions/generate-recipe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recipeType,
        cuisine,
        dietary,
        ingredients
      })
    });

    if (!recipeResponse.ok) {
      throw new Error(`Recipe generation failed: ${recipeResponse.statusText}`);
    }

    const recipeData = await recipeResponse.json();

    let html = `
      <div class="generated-image-container">
        <h3 style="font-family: 'Syne', sans-serif; font-weight: 700; margin: 0;">${recipeData.name}</h3>
        <p style="color: var(--mid-grey); font-size: 14px; margin: 0;">${recipeData.description}</p>
        <div style="background: var(--warm-white); padding: 12px; border-radius: 8px; font-size: 13px;">
          <strong>Prep Time:</strong> ${recipeData.prepTime} | <strong>Cook Time:</strong> ${recipeData.cookTime} | <strong>Serves:</strong> ${recipeData.servings}
        </div>
        <div style="background: var(--warm-white); padding: 12px; border-radius: 8px; font-size: 13px;">
          <strong>Ingredients:</strong>
          <ul style="margin: 8px 0 0 20px;">
            ${recipeData.ingredients.map(i => `<li>${i}</li>`).join('')}
          </ul>
        </div>
        <div style="background: var(--warm-white); padding: 12px; border-radius: 8px; font-size: 13px;">
          <strong>Instructions:</strong>
          <ol style="margin: 8px 0 0 20px;">
            ${recipeData.instructions.map(i => `<li>${i}</li>`).join('')}
          </ol>
        </div>
    `;

    if (includeImage) {
      outputArea.innerHTML = `<div class="loading"><div class="spinner"></div> Generating image... (this may take a minute)</div>`;
      
      // Generate image
      const imageData = await generateImage(recipeData.name, apiKey, model);
      html += `
        <img src="${imageData.url}" alt="${recipeData.name}" class="generated-image" />
      `;
    }

    html += '</div>';
    outputArea.innerHTML = html;
  } catch (error) {
    outputArea.innerHTML = `<div class="status-message status-error">Error: ${error.message}</div>`;
  } finally {
    generateBtn.disabled = false;
  }
}

async function generateImage(recipeName, apiKey, model) {
  const requestId = Math.random().toString(36).substring(2);
  const statusUrl = `https://queue.fal.run/${model}/requests/${requestId}/status`;
  const resultUrl = `https://queue.fal.run/${model}/requests/${requestId}`;
  const maxWait = 120000; // 2 min timeout
  
  // Submit job
  const submitResponse = await fetch(`https://queue.fal.run/${model}`, {
    method: 'POST',
    headers: { 'Authorization': `Key ${apiKey}` },
    body: JSON.stringify({
      prompt: `A beautifully plated ${recipeName} dish, professional food photography, studio lighting, appetizing presentation, high-quality, detailed, vibrant colors`,
      image_size: 'landscape_16_9',
      num_images: 1,
      enable_safety_checker: true
    })
  });

  if (!submitResponse.ok) {
    throw new Error(`Failed to submit image generation job: ${submitResponse.statusText}`);
  }

  const submitData = await submitResponse.json();
  const actualRequestId = submitData.request_id || requestId;
  const actualStatusUrl = `https://queue.fal.run/${model}/requests/${actualRequestId}/status`;
  const actualResultUrl = `https://queue.fal.run/${model}/requests/${actualRequestId}`;
  
  // Poll for completion
  const start = Date.now();
  while (Date.now() - start < maxWait) {
    const pollResp = await fetch(actualStatusUrl, { headers: { 'Authorization': `Key ${apiKey}` } });
    if (!pollResp.ok) throw new Error(`Status check failed: ${pollResp.statusText}`);
    
    const status = await pollResp.json();
    if (status.status === 'COMPLETED') {
      const resultResp = await fetch(actualResultUrl, { headers: { 'Authorization': `Key ${apiKey}` } });
      if (!resultResp.ok) throw new Error(`Result retrieval failed: ${resultResp.statusText}`);
      
      const result = await resultResp.json();
      return { url: result.images[0].url };
    }
    
    // Wait before polling again
    await new Promise(resolve => setTimeout(resolve, 2000));
  }
  
  throw new Error('Image generation timed out');
}
</script>

</body>
</html>
