<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Strategy Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--surface-alt:#f4f2ee;--surface-warm:#f9f5f0;
  --ink:#1a1714;--ink-2:#5c564d;--ink-3:#8a8279;--ink-4:#b0a99e;
  --accent:#b44d1e;--accent-light:#f4e6dc;--accent-dark:#8a3710;--accent-glow:rgba(180,77,30,.08);
  --green:#2d6a4f;--green-light:#d8f3dc;--green-bg:#f0f9f2;
  --blue:#1d4e89;--blue-light:#d0e2f4;--blue-bg:#eef4fa;
  --purple:#6b21a8;--purple-light:#ede9fe;--purple-bg:#f6f3fc;
  --amber:#92400e;--amber-light:#fef3c7;--amber-bg:#fefbf0;
  --red:#991b1b;--red-light:#fee2e2;
  --border:#e8e4de;--border-light:#f0ece6;
  --radius:5px;--radius-lg:8px;
  --shadow-sm:0 1px 2px rgba(26,23,20,.05);--shadow:0 1px 4px rgba(26,23,20,.08);--shadow-lg:0 4px 20px rgba(26,23,20,.1);
  --font-display:'Fraunces',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif;
}
html{font-size:14.5px;scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.25}

/* ── Loading state ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem}
.loading-screen h2{font-family:var(--font-display);font-size:1.4rem;color:var(--ink-2)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse .8s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.15s}.loading-dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.1)}}

/* ── Page shell ── */
.page{max-width:1140px;margin:0 auto;padding:0 clamp(1rem,3vw,2.5rem) 4rem}

/* ── Top bar ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border);margin-bottom:2rem}
.topbar-brand{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--accent-dark);letter-spacing:-.02em}
.topbar-actions{display:flex;gap:.5rem}
.btn-export{padding:.45rem 1rem;font-family:var(--font-body);font-size:.78rem;font-weight:600;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--ink-2);cursor:pointer;transition:all .15s}
.btn-export:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-export-primary{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.btn-export-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);color:#fff}

/* ── Cover page ── */
.cover{padding:clamp(2rem,5vw,4rem) 0;margin-bottom:2.5rem}
.cover-eyebrow{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:1rem}
.cover h1{font-size:clamp(2rem,4.5vw,3.2rem);font-weight:800;letter-spacing:-.04em;line-height:1.1;max-width:680px}
.cover-line{width:48px;height:3px;background:var(--accent);margin:1.5rem 0}
.cover-meta{display:flex;flex-wrap:wrap;gap:1.5rem 3rem;margin-top:1rem}
.cover-stat{display:flex;flex-direction:column;gap:.15rem}
.cover-stat-value{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--ink);line-height:1}
.cover-stat-label{font-size:.72rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}

/* ── Nav ── */
.nav{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);margin:0 calc(-1 * clamp(1rem,3vw,2.5rem));padding:0 clamp(1rem,3vw,2.5rem)}
.nav-inner{display:flex;gap:0;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{padding:.7rem 1.1rem;font-family:var(--font-body);font-size:.8rem;font-weight:500;color:var(--ink-3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.nav-tab:hover{color:var(--ink)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.nav-tab .tab-num{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;background:var(--surface-alt);font-size:.65rem;font-weight:700;margin-right:.4rem;color:var(--ink-3)}
.nav-tab.active .tab-num{background:var(--accent-light);color:var(--accent-dark)}

/* ── Sections ── */
.section{display:none;padding-top:2.5rem}
.section.active{display:block}
.section-header{margin-bottom:2rem}
.section-num{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:.5rem}
.section-title{font-size:clamp(1.4rem,3vw,1.8rem);font-weight:700;margin-bottom:.4rem;letter-spacing:-.02em}
.section-sub{color:var(--ink-2);font-size:.92rem;max-width:600px;line-height:1.6}

/* ── Page 1: Landscape ── */
.landscape-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2.5rem}
@media(max-width:700px){.landscape-grid{grid-template-columns:1fr}}
.landscape-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem}
.landscape-card h3{font-size:1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.landscape-card h3 .lc-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}

.brand-table{width:100%;border-collapse:collapse;margin-bottom:2rem}
.brand-table th{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:600;text-align:left;padding:.6rem .75rem;border-bottom:2px solid var(--border)}
.brand-table td{padding:.65rem .75rem;border-bottom:1px solid var(--border-light);font-size:.88rem;vertical-align:top}
.brand-table tr:last-child td{border-bottom:none}
.brand-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.5rem;vertical-align:middle}
.brand-name{font-weight:600}

.percentile-bar{display:flex;align-items:stretch;height:32px;border-radius:var(--radius);overflow:hidden;background:var(--surface-alt);margin-top:.75rem}
.percentile-segment{display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;transition:width .3s}

.methodology-note{background:var(--surface-warm);border-left:3px solid var(--accent);padding:1rem 1.25rem;border-radius:0 var(--radius) var(--radius) 0;margin-top:2rem}
.methodology-note h4{font-size:.82rem;font-weight:700;margin-bottom:.35rem}
.methodology-note p{font-size:.82rem;color:var(--ink-2);line-height:1.55}

/* ── Page 2: Patterns ── */
.pattern-row{display:grid;grid-template-columns:200px 1fr;gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.25rem;background:var(--surface)}
@media(max-width:640px){.pattern-row{grid-template-columns:1fr}}
.pattern-label-col{padding:1.25rem;display:flex;flex-direction:column;justify-content:center;gap:.35rem}
.pattern-category{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.pattern-name{font-family:var(--font-display);font-size:1.05rem;font-weight:700;line-height:1.2}
.pattern-pct{font-size:.78rem;color:var(--ink-3);margin-top:.15rem}
.pattern-detail{padding:1.25rem;border-left:1px solid var(--border-light)}
@media(max-width:640px){.pattern-detail{border-left:none;border-top:1px solid var(--border-light)}}
.pattern-detail p{font-size:.88rem;color:var(--ink-2);line-height:1.6}
.pattern-brands{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.65rem}
.pattern-brand-tag{font-size:.68rem;padding:.15rem .5rem;border-radius:3px;font-weight:600}
.bar-chart{display:flex;flex-direction:column;gap:.5rem;margin-top:1.5rem}
.bar-row{display:flex;align-items:center;gap:.75rem}
.bar-label{width:140px;font-size:.8rem;font-weight:500;text-align:right;flex-shrink:0;color:var(--ink-2)}
.bar-track{flex:1;height:22px;background:var(--surface-alt);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .4s;display:flex;align-items:center;padding-left:.5rem}
.bar-fill span{font-size:.65rem;font-weight:700;color:#fff;white-space:nowrap}

/* ── Page 3: Brand cards ── */
.brand-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem;background:var(--surface)}
.brand-card-header{padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.brand-card-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700}
.brand-card-badges{display:flex;flex-wrap:wrap;gap:.35rem}
.brand-card-badge{font-size:.65rem;padding:.2rem .55rem;border-radius:3px;font-weight:600}
.brand-card-body{padding:0 1.5rem 1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:640px){.brand-card-body{grid-template-columns:1fr}}
.brand-card-section h4{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:700;margin-bottom:.5rem}
.brand-card-section ul{list-style:none;padding:0}
.brand-card-section li{font-size:.85rem;color:var(--ink-2);padding:.3rem 0;padding-left:1rem;position:relative;line-height:1.5}
.brand-card-section li::before{content:'';position:absolute;left:0;top:.65rem;width:5px;height:5px;border-radius:50%}
.steal-list li::before{background:var(--green)}
.weak-list li::before{background:var(--red)}
.brand-card-stats{display:flex;gap:1.5rem;padding:1rem 1.5rem;border-top:1px solid var(--border-light);flex-wrap:wrap}
.brand-card-stat{display:flex;flex-direction:column;gap:.1rem}
.brand-card-stat-val{font-family:var(--font-display);font-size:1rem;font-weight:700}
.brand-card-stat-lbl{font-size:.65rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}

/* ── Page 4: Strategy ── */
.strategy-track{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem;background:var(--surface)}
.strategy-track-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-light)}
.strategy-track-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem}
.strategy-track-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700}
.strategy-track-rationale{font-size:.88rem;color:var(--ink-2);margin-top:.35rem;line-height:1.55}
.strategy-shots{padding:1rem 1.5rem}
.strategy-shot{padding:.85rem 0;border-bottom:1px solid var(--border-light);display:grid;grid-template-columns:28px 1fr auto;gap:.75rem;align-items:start}
.strategy-shot:last-child{border-bottom:none}
.shot-num{font-family:var(--font-display);font-size:.85rem;font-weight:700;color:var(--ink-3);text-align:center;padding-top:.1rem}
.shot-content h5{font-size:.88rem;font-weight:600;margin-bottom:.2rem}
.shot-content p{font-size:.82rem;color:var(--ink-2);line-height:1.5}
.shot-priority{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.2rem .5rem;border-radius:3px;white-space:nowrap;height:fit-content}
.priority-p1{background:var(--accent-light);color:var(--accent-dark)}
.priority-p2{background:var(--blue-light);color:var(--blue)}
.priority-p3{background:var(--surface-alt);color:var(--ink-3)}

/* ── Page 5: Raw Data ── */
.data-table{width:100%;border-collapse:collapse;font-size:.82rem}
.data-table th{text-align:left;padding:.55rem .65rem;border-bottom:2px solid var(--border);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;white-space:nowrap}
.data-table td{padding:.55rem .65rem;border-bottom:1px solid var(--border-light);vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface-warm)}
.hook-text{font-style:italic;color:var(--ink-2);max-width:320px}

/* ── Print / PDF ── */
@media print{
  .topbar,.nav,.btn-export,.no-print{display:none!important}
  .section{display:block!important;page-break-inside:avoid;padding-top:1.5rem}
  .section:not(:first-child){page-break-before:always}
  body{font-size:11px;background:#fff}
  .cover{padding:1.5rem 0}
  .cover h1{font-size:2rem}
  .brand-card,.strategy-track,.pattern-row{break-inside:avoid}
}
</style>
</head>
<body>

<div class="page" id="app">
  <div class="loading-screen" id="loading">
    <h2>Building your playbook</h2>
    <div><span class="loading-dot"></span> <span class="loading-dot"></span> <span class="loading-dot"></span></div>
  </div>
</div>

<script>
const SB_URL = 'https://ifrxylvoufncdxyltgqt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmcnh5bHZvdWZuY2R4eWx0Z3F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzkwNDgsImV4cCI6MjA4OTQxNTA0OH0.ZsyGK_jdxjTrO3Ji8zgoyHz6VxW5hR36JWr1sgmmAFA';
const HEADERS = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };

// Brand colour palette (deterministic)
const BRAND_COLORS = [
  {bg:'#f4e6dc',text:'#8a3710',dot:'#b44d1e'},
  {bg:'#d0e2f4',text:'#1d4e89',dot:'#2563eb'},
  {bg:'#d8f3dc',text:'#2d6a4f',dot:'#16a34a'},
  {bg:'#ede9fe',text:'#6b21a8',dot:'#7c3aed'},
  {bg:'#fef3c7',text:'#92400e',dot:'#d97706'},
  {bg:'#fee2e2',text:'#991b1b',dot:'#dc2626'},
  {bg:'#e0e7ff',text:'#3730a3',dot:'#4f46e5'},
  {bg:'#fce7f3',text:'#9d174d',dot:'#db2777'},
  {bg:'#d1fae5',text:'#065f46',dot:'#059669'},
  {bg:'#fef9c3',text:'#854d0e',dot:'#ca8a04'},
];

async function fetchData() {
  // Step 1: fetch all completed analyses
  const analysesRes = await fetch(`${SB_URL}/rest/v1/video_analyses?status=eq.complete&select=*&order=created_at.desc`, { headers: HEADERS });
  const analyses = await analysesRes.json();

  // Step 2: fetch only the competitor ads that have analyses (avoids 1000-row default limit)
  const adIds = [...new Set(analyses.map(a => a.competitor_ad_id).filter(Boolean))];
  let ads = [];
  if (adIds.length > 0) {
    // Supabase in filter: id=in.(id1,id2,...)
    const idsParam = `(${adIds.map(id => `"${id}"`).join(',')})`;
    const adsRes = await fetch(`${SB_URL}/rest/v1/competitor_ads?id=in.${idsParam}&select=id,page_name,page_id,days_active,impressions_lower,impressions_upper,start_date,cta_type,creative_body`, { headers: HEADERS });
    ads = await adsRes.json();
  }
  return { analyses, ads };
}

function buildBrandMap(analyses, ads) {
  const adMap = {};
  ads.forEach(a => { adMap[a.id] = a; });
  const brandMap = {};
  let colorIdx = 0;
  analyses.forEach(an => {
    if (!an.ai_analysis) return;
    const ad = adMap[an.competitor_ad_id] || {};
    const brand = ad.page_name || 'Unknown';
    if (!brandMap[brand]) {
      brandMap[brand] = { name: brand, color: BRAND_COLORS[colorIdx % BRAND_COLORS.length], analyses: [], pageId: ad.page_id };
      colorIdx++;
    }
    brandMap[brand].analyses.push({ ...an, ad });
  });
  return brandMap;
}

function countPattern(analyses, field, subfield) {
  const counts = {};
  analyses.forEach(an => {
    const ai = an.ai_analysis;
    if (!ai) return;
    let val = subfield ? (ai[field] || {})[subfield] : ai[field];
    if (Array.isArray(val)) {
      val.forEach(v => {
        const k = (typeof v === 'string' ? v : '').toLowerCase().trim();
        if (k) counts[k] = (counts[k] || 0) + 1;
      });
    } else if (typeof val === 'string') {
      const k = val.toLowerCase().trim();
      if (k) counts[k] = (counts[k] || 0) + 1;
    }
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]);
}

function formatLabel(s) {
  return s.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function pctOf(count, total) { return total > 0 ? Math.round((count / total) * 100) : 0; }

function getBrandsUsing(analyses, field, subfield, value) {
  const brands = new Set();
  analyses.forEach(an => {
    const ai = an.ai_analysis;
    if (!ai) return;
    let val = subfield ? (ai[field] || {})[subfield] : ai[field];
    if (Array.isArray(val)) {
      if (val.some(v => (typeof v === 'string' ? v : '').toLowerCase().trim() === value)) {
        brands.add(an.ad?.page_name || 'Unknown');
      }
    } else if (typeof val === 'string' && val.toLowerCase().trim() === value) {
      brands.add(an.ad?.page_name || 'Unknown');
    }
  });
  return [...brands];
}

function render(data) {
  const { analyses, ads } = data;
  const complete = analyses.filter(a => a.ai_analysis && a.transcript_text);
  if (complete.length === 0) {
    document.getElementById('app').innerHTML = '<div class="loading-screen"><h2>No completed analyses found</h2><p style="color:var(--ink-2)">Analyse some competitor videos first, then come back here.</p></div>';
    return;
  }
  const brandMap = buildBrandMap(complete, ads);
  const brands = Object.values(brandMap).sort((a,b) => b.analyses.length - a.analyses.length);
  const totalVideos = complete.length;
  const totalBrands = brands.length;
  const avgDuration = complete.reduce((s, a) => s + (a.duration_seconds || 0), 0) / totalVideos;
  const avgShots = complete.reduce((s, a) => s + (a.total_shots || 0), 0) / totalVideos;
  const dateRange = complete.map(a => a.created_at).sort();
  const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  // Aggregate patterns
  const hookTypes = countPattern(complete, 'hook', 'type');
  const narrativeArcs = countPattern(complete, 'narrative_arc', 'structure');
  const emotionalDrivers = countPattern(complete, 'emotional_drivers');
  const productionFormats = countPattern(complete, 'production_style', 'format');
  const pacingProfiles = countPattern(complete, 'pacing_profile');

  // ── Render HTML ──
  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Top bar -->
    <div class="topbar no-print">
      <div class="topbar-brand">Creative Kitchen</div>
      <div class="topbar-actions">
        <button class="btn-export" onclick="window.print()">Export PDF</button>
      </div>
    </div>

    <!-- Cover -->
    <div class="cover" id="cover-section">
      <div class="cover-eyebrow">Creative Strategy Playbook</div>
      <h1>Competitive Video Intelligence<br>& Production Strategy</h1>
      <div class="cover-line"></div>
      <div class="cover-meta">
        <div class="cover-stat"><span class="cover-stat-value">${totalVideos}</span><span class="cover-stat-label">Videos Analysed</span></div>
        <div class="cover-stat"><span class="cover-stat-value">${totalBrands}</span><span class="cover-stat-label">Brands Studied</span></div>
        <div class="cover-stat"><span class="cover-stat-value">${avgDuration.toFixed(0)}s</span><span class="cover-stat-label">Avg Duration</span></div>
        <div class="cover-stat"><span class="cover-stat-value">${avgShots.toFixed(0)}</span><span class="cover-stat-label">Avg Shots/Video</span></div>
      </div>
      <p style="margin-top:1.5rem;font-size:.85rem;color:var(--ink-3)">Generated ${today}</p>
    </div>

    <!-- Nav -->
    <div class="nav no-print" id="nav">
      <div class="nav-inner" id="tabs">
        <button class="nav-tab active" data-tab="landscape"><span class="tab-num">1</span>The Landscape</button>
        <button class="nav-tab" data-tab="patterns"><span class="tab-num">2</span>Cross-Brand Patterns</button>
        <button class="nav-tab" data-tab="brands"><span class="tab-num">3</span>Brand Intelligence</button>
        <button class="nav-tab" data-tab="strategy"><span class="tab-num">4</span>Strategic Choices</button>
        <button class="nav-tab" data-tab="data"><span class="tab-num">5</span>Raw Data</button>
      </div>
    </div>

    <!-- Page 1: Landscape -->
    <div class="section active" id="landscape">
      <div class="section-header">
        <div class="section-num">01 / The Landscape</div>
        <h2 class="section-title">What We Analysed</h2>
        <p class="section-sub">The evidence base behind every recommendation in this document. ${totalVideos} videos from ${totalBrands} brands, filtered to the top performers by longevity.</p>
      </div>

      <div class="landscape-grid">
        <div class="landscape-card">
          <h3><span class="lc-icon" style="background:var(--accent-light);color:var(--accent-dark)">&#9654;</span>Video Dataset</h3>
          <table class="brand-table">
            <thead><tr><th>Brand</th><th>Videos</th><th>Avg Duration</th><th>Avg Shots</th></tr></thead>
            <tbody>
              ${brands.map(b => {
                const avgD = b.analyses.reduce((s,a) => s + (a.duration_seconds||0), 0) / b.analyses.length;
                const avgS = b.analyses.reduce((s,a) => s + (a.total_shots||0), 0) / b.analyses.length;
                return `<tr>
                  <td><span class="brand-dot" style="background:${b.color.dot}"></span><span class="brand-name">${b.name}</span></td>
                  <td>${b.analyses.length}</td>
                  <td>${avgD.toFixed(1)}s</td>
                  <td>${avgS.toFixed(0)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>

        <div class="landscape-card">
          <h3><span class="lc-icon" style="background:var(--blue-light);color:var(--blue)">&#9776;</span>Production Styles</h3>
          <div class="bar-chart">
            ${productionFormats.slice(0, 5).map(([name, count]) => `
              <div class="bar-row">
                <div class="bar-label">${formatLabel(name)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--blue)"><span>${pctOf(count, totalVideos)}%</span></div></div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:1.25rem">
            <h3 style="font-size:.92rem;margin-bottom:.5rem"><span class="lc-icon" style="background:var(--green-light);color:var(--green)">&#9201;</span>Pacing Distribution</h3>
            <div class="bar-chart">
              ${pacingProfiles.map(([name, count]) => `
                <div class="bar-row">
                  <div class="bar-label">${formatLabel(name)}</div>
                  <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--green)"><span>${pctOf(count, totalVideos)}%</span></div></div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="methodology-note">
        <h4>Methodology</h4>
        <p>Videos were selected from the Meta Ad Library, filtered to the top performing percentile by longevity (days active). Each video was processed through a 4-stage pipeline: shot extraction, audio transcription, OCR frame analysis, and AI-powered creative analysis using Claude. Impression data was not available, so longevity serves as the primary performance proxy: longer-running ads signal sustained investment and sustained returns.</p>
      </div>
    </div>

    <!-- Page 2: Cross-Brand Patterns -->
    <div class="section" id="patterns">
      <div class="section-header">
        <div class="section-num">02 / Cross-Brand Patterns</div>
        <h2 class="section-title">What the Market Is Doing</h2>
        <p class="section-sub">Patterns that appear across multiple brands. Convergence signals proven tactics. Gaps signal opportunity.</p>
      </div>

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin-bottom:1rem">Hook Strategies</h3>
      ${hookTypes.slice(0, 6).map(([name, count]) => {
        const pct = pctOf(count, totalVideos);
        const usingBrands = getBrandsUsing(complete, 'hook', 'type', name);
        return `<div class="pattern-row">
          <div class="pattern-label-col" style="background:var(--accent-light)">
            <div class="pattern-category" style="color:var(--accent-dark)">Hook Type</div>
            <div class="pattern-name">${formatLabel(name)}</div>
            <div class="pattern-pct">${count} of ${totalVideos} videos (${pct}%)</div>
          </div>
          <div class="pattern-detail">
            <p>${getHookInsight(name, pct, usingBrands)}</p>
            <div class="pattern-brands">
              ${usingBrands.map(b => {
                const brand = brandMap[b];
                return brand ? `<span class="pattern-brand-tag" style="background:${brand.color.bg};color:${brand.color.text}">${b}</span>` : '';
              }).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin:2rem 0 1rem">Narrative Structures</h3>
      <div class="bar-chart" style="max-width:600px">
        ${narrativeArcs.slice(0, 6).map(([name, count]) => `
          <div class="bar-row">
            <div class="bar-label">${formatLabel(name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--purple)"><span>${pctOf(count, totalVideos)}%</span></div></div>
          </div>
        `).join('')}
      </div>

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin:2rem 0 1rem">Emotional Drivers</h3>
      <div class="bar-chart" style="max-width:600px">
        ${emotionalDrivers.slice(0, 8).map(([name, count]) => `
          <div class="bar-row">
            <div class="bar-label">${formatLabel(name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--accent)"><span>${count}</span></div></div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Page 3: Brand Intelligence -->
    <div class="section" id="brands">
      <div class="section-header">
        <div class="section-num">03 / Brand Intelligence</div>
        <h2 class="section-title">Brand-by-Brand Breakdown</h2>
        <p class="section-sub">What each competitor is doing, what they do well, and what you can take from them.</p>
      </div>

      ${brands.map(b => {
        const avgD = b.analyses.reduce((s,a) => s + (a.duration_seconds||0), 0) / b.analyses.length;
        const avgS = b.analyses.reduce((s,a) => s + (a.total_shots||0), 0) / b.analyses.length;
        const hooks = countPattern(b.analyses, 'hook', 'type');
        const arcs = countPattern(b.analyses, 'narrative_arc', 'structure');
        const emotions = countPattern(b.analyses, 'emotional_drivers');
        // Collect steal/weakness insights
        const steals = [];
        const weaknesses = [];
        b.analyses.forEach(an => {
          const ci = an.ai_analysis?.competitor_insights;
          if (ci?.what_to_steal) ci.what_to_steal.forEach(s => { if (!steals.includes(s)) steals.push(s); });
          if (ci?.weaknesses) ci.weaknesses.forEach(w => { if (!weaknesses.includes(w)) weaknesses.push(w); });
        });
        return `<div class="brand-card">
          <div class="brand-card-header" style="background:${b.color.bg}">
            <div class="brand-card-title" style="color:${b.color.text}">${b.name}</div>
            <div class="brand-card-badges">
              ${hooks.slice(0,2).map(([h]) => `<span class="brand-card-badge" style="background:rgba(255,255,255,.7);color:${b.color.text}">${formatLabel(h)}</span>`).join('')}
              ${arcs.slice(0,1).map(([a]) => `<span class="brand-card-badge" style="background:rgba(255,255,255,.7);color:${b.color.text}">${formatLabel(a)}</span>`).join('')}
            </div>
          </div>
          <div class="brand-card-body">
            <div class="brand-card-section">
              <h4>What to steal</h4>
              <ul class="steal-list">
                ${steals.slice(0, 4).map(s => `<li>${s}</li>`).join('')}
                ${steals.length === 0 ? '<li style="color:var(--ink-4)">Insufficient data</li>' : ''}
              </ul>
            </div>
            <div class="brand-card-section">
              <h4>Weaknesses to exploit</h4>
              <ul class="weak-list">
                ${weaknesses.slice(0, 4).map(w => `<li>${w}</li>`).join('')}
                ${weaknesses.length === 0 ? '<li style="color:var(--ink-4)">Insufficient data</li>' : ''}
              </ul>
            </div>
          </div>
          <div class="brand-card-stats">
            <div class="brand-card-stat"><span class="brand-card-stat-val">${b.analyses.length}</span><span class="brand-card-stat-lbl">Videos</span></div>
            <div class="brand-card-stat"><span class="brand-card-stat-val">${avgD.toFixed(0)}s</span><span class="brand-card-stat-lbl">Avg Length</span></div>
            <div class="brand-card-stat"><span class="brand-card-stat-val">${avgS.toFixed(0)}</span><span class="brand-card-stat-lbl">Avg Shots</span></div>
            <div class="brand-card-stat"><span class="brand-card-stat-val">${hooks[0] ? formatLabel(hooks[0][0]) : 'N/A'}</span><span class="brand-card-stat-lbl">Top Hook</span></div>
            <div class="brand-card-stat"><span class="brand-card-stat-val">${emotions.slice(0,3).map(([e]) => formatLabel(e)).join(', ') || 'N/A'}</span><span class="brand-card-stat-lbl">Key Emotions</span></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Page 4: Strategic Choices -->
    <div class="section" id="strategy">
      <div class="section-header">
        <div class="section-num">04 / Strategic Choices</div>
        <h2 class="section-title">Production Recommendations</h2>
        <p class="section-sub">Where to invest creative resources, broken into three production tracks. Each recommendation is tied back to competitive evidence.</p>
      </div>

      ${renderStrategySection(complete, brandMap, hookTypes, narrativeArcs, emotionalDrivers, totalBrands)}
    </div>

    <!-- Page 5: Raw Data -->
    <div class="section" id="data">
      <div class="section-header">
        <div class="section-num">05 / Raw Data</div>
        <h2 class="section-title">Full Analysis Dataset</h2>
        <p class="section-sub">Every video analysed, with key metrics and AI-extracted insights.</p>
      </div>

      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr><th>Brand</th><th>Hook Type</th><th>Hook Text</th><th>Duration</th><th>Shots</th><th>Pacing</th><th>Narrative</th><th>CTA</th><th>Emotional Drivers</th></tr>
          </thead>
          <tbody>
            ${complete.map(an => {
              const ai = an.ai_analysis || {};
              const ad = ads.find(a => a.id === an.competitor_ad_id) || {};
              return `<tr>
                <td><strong>${ad.page_name || 'Unknown'}</strong></td>
                <td>${formatLabel(ai.hook?.type || 'N/A')}</td>
                <td class="hook-text">"${(ai.hook?.text || '').slice(0, 80)}${(ai.hook?.text || '').length > 80 ? '...' : ''}"</td>
                <td>${(an.duration_seconds || 0).toFixed(1)}s</td>
                <td>${an.total_shots || 0}</td>
                <td>${formatLabel(an.pacing_profile || 'N/A')}</td>
                <td>${formatLabel((ai.narrative_arc?.structure) || 'N/A')}</td>
                <td>${ai.cta?.type ? formatLabel(ai.cta.type) : 'N/A'}</td>
                <td>${(ai.emotional_drivers || []).slice(0, 4).map(formatLabel).join(', ')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin:2rem 0 1rem">One-Line Summaries</h3>
      ${complete.map(an => {
        const ai = an.ai_analysis || {};
        const ad = ads.find(a => a.id === an.competitor_ad_id) || {};
        if (!ai.one_line_summary) return '';
        return `<div style="padding:.65rem 0;border-bottom:1px solid var(--border-light)">
          <strong style="font-size:.82rem">${ad.page_name || 'Unknown'}</strong>
          <span style="font-size:.82rem;color:var(--ink-2);margin-left:.5rem">${ai.one_line_summary}</span>
        </div>`;
      }).join('')}
    </div>
  `;

  // Wire up tab navigation
  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.nav-tab');
    if (!btn) return;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

function getHookInsight(type, pct, brands) {
  const brandList = brands.join(', ');
  if (pct >= 40) return `Dominant approach across the market. Used by ${brandList}. This is table stakes, not a differentiator. You need to execute this well, but it won't set you apart.`;
  if (pct >= 20) return `A proven approach used by ${brandList}. Strong enough to validate, rare enough to still feel distinctive if you execute with a different angle.`;
  return `A less common approach from ${brandList}. If the data supports its performance, this represents genuine whitespace. Worth testing against the dominant hooks.`;
}

function renderStrategySection(analyses, brandMap, hookTypes, narrativeArcs, emotionalDrivers, totalBrands) {
  // Gather all steals and weaknesses to inform recommendations
  const allSteals = [];
  const allWeaknesses = [];
  analyses.forEach(an => {
    const ci = an.ai_analysis?.competitor_insights;
    if (ci?.what_to_steal) ci.what_to_steal.forEach(s => allSteals.push(s));
    if (ci?.weaknesses) ci.weaknesses.forEach(w => allWeaknesses.push(w));
  });

  // Determine dominant patterns for strategic framing
  const topHook = hookTypes[0] ? formatLabel(hookTypes[0][0]) : 'Problem-Solution';
  const topArc = narrativeArcs[0] ? formatLabel(narrativeArcs[0][0]) : 'Problem-Solution';
  const topEmotions = emotionalDrivers.slice(0, 3).map(([e]) => formatLabel(e)).join(', ');
  const totalVids = analyses.length;
  const brands = Object.values(brandMap);

  return `
    <!-- Internal -->
    <div class="strategy-track">
      <div class="strategy-track-header" style="background:var(--accent-light)">
        <div class="strategy-track-label" style="color:var(--accent-dark)">Track 1</div>
        <div class="strategy-track-title">Internal Production</div>
        <p class="strategy-track-rationale">Quick-turn content your team can produce in-house. Based on the most common competitor formats, adapted for speed and iteration. The dominant hook across ${totalVids} analysed videos is "${topHook}" and the primary emotional drivers are ${topEmotions}.</p>
      </div>
      <div class="strategy-shots">
        <div class="strategy-shot"><div class="shot-num">1</div><div class="shot-content"><h5>"What I actually ate this week" rapid showcase</h5><p>7 meals shown in fast succession, each held to camera with name overlay. Close on the convenience message. This mirrors the UGC testimonial format used by ${brands.length > 1 ? brands.slice(0,2).map(b=>b.name).join(' and ') : brands[0]?.name || 'competitors'}. 15 to 20s.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">2</div><div class="shot-content"><h5>Fridge pull reveal</h5><p>Camera on closed fridge. Hand opens it to reveal stacked containers. "This is what organised eating looks like." Trending format that works as both video and static. Targets the convenience + aspiration emotional drivers found in ${pctOf(emotionalDrivers.find(e => e[0] === 'convenience')?.[1] || 0, totalVids)}% of analysed ads.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">3</div><div class="shot-content"><h5>Speed comparison (split-screen)</h5><p>Real-time microwave timer vs someone cooking from scratch. Same macros, different time investment. The "category contrast" pattern appears across multiple brands and is one of the most effective patterns in the dataset.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">4</div><div class="shot-content"><h5>Ingredient label flip</h5><p>Supermarket ready meal label (long ingredients list) vs your label (short, clean). "Read the label." Directly informed by category contrast hooks in the competitive set. Confrontational, high pattern-interrupt potential.</p></div><div class="shot-priority priority-p2">P2</div></div>
        <div class="strategy-shot"><div class="shot-num">5</div><div class="shot-content"><h5>Macro scan</h5><p>Open a calorie tracking app, scan a barcode, show the clean macro split. None of the ${totalBrands} analysed brands show this. Quick trust-builder for the fitness audience.</p></div><div class="shot-priority priority-p2">P2</div></div>
      </div>
    </div>

    <!-- Production Company -->
    <div class="strategy-track">
      <div class="strategy-track-header" style="background:var(--blue-light)">
        <div class="strategy-track-label" style="color:var(--blue)">Track 2</div>
        <div class="strategy-track-title">Production Company</div>
        <p class="strategy-track-rationale">Higher production value content that differentiates from the market. Analysis shows ${pctOf(analyses.filter(a => ['ugc','talking-head','selfie'].includes(a.ai_analysis?.production_style?.format?.toLowerCase())).length, totalVids)}% of competitor ads use UGC/talking-head formats. Polished production is a genuine gap.</p>
      </div>
      <div class="strategy-shots">
        <div class="strategy-shot"><div class="shot-num">1</div><div class="shot-content"><h5>Hero brand film (30s)</h5><p>Cinematic food prep: steam, chopping, sauce pours. Cut to real people eating in real locations. Music + text, no voiceover. This format barely exists in the competitive set, making it a clear differentiator. One hero video that positions above the sea of UGC.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">2</div><div class="shot-content"><h5>Kitchen-to-container journey</h5><p>Follow one meal from raw ingredients through the kitchen to sealed and delivered. Time-lapse + macro shots. Fills the "what's actually inside" trust gap identified in competitor weaknesses.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">3</div><div class="shot-content"><h5>Ingredient close-ups library</h5><p>20 to 30 slow-motion clips: herbs falling, oil drizzling, spices hitting a pan. Reusable B-roll for all future ads. The most valuable long-term production investment.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">4</div><div class="shot-content"><h5>Taste test series</h5><p>5 to 8 genuine first-time reactions. Rapid-cut montage with meal names as lower thirds. Competitor analysis reveals that almost nobody sells on taste. This is a wide-open lane.</p></div><div class="shot-priority priority-p2">P2</div></div>
      </div>
    </div>

    <!-- UGC -->
    <div class="strategy-track">
      <div class="strategy-track-header" style="background:var(--green-light)">
        <div class="strategy-track-label" style="color:var(--green)">Track 3</div>
        <div class="strategy-track-title">UGC Creator Briefs</div>
        <p class="strategy-track-rationale">Creator-led content based on proven formats from the competitive set. The UGC/testimonial hook type appears in ${pctOf(hookTypes.find(h => h[0].includes('ugc') || h[0].includes('testimonial'))?.[1] || 0, totalVids)}% of analysed videos. These briefs adapt what works and fill the gaps competitors leave open.</p>
      </div>
      <div class="strategy-shots">
        <div class="strategy-shot"><div class="shot-num">1</div><div class="shot-content"><h5>Female fitness creator: "My week on [brand]"</h5><p>7-day diary format. Each day: different meal + gym clip. Convenience + routine fit. The competitive analysis shows a significant underrepresentation of female creators. This is the single biggest audience whitespace.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">2</div><div class="shot-content"><h5>Busy professional: "How I save 5 hours a week"</h5><p>Before (takeaway receipts, sad desk lunch) and after (clean meals, macro tracking). Numbers-led hook. Adapts the before/after format for a non-gym audience, broadening appeal beyond fitness.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">3</div><div class="shot-content"><h5>Nutritionist explainer</h5><p>Podcast-style talking head. Credentialled nutritionist explains what they look for in meal prep and why this ticks the boxes. B-roll of meals throughout. This format is proven as one of the longest-running ad types in the competitive set.</p></div><div class="shot-priority priority-p1">P1</div></div>
        <div class="strategy-shot"><div class="shot-num">4</div><div class="shot-content"><h5>Couple/housemate dual testimonial</h5><p>Two people discussing the switch, splitting talking points between taste and convenience. Unscripted feel. No competitor uses a duo format. Differentiation through format novelty.</p></div><div class="shot-priority priority-p2">P2</div></div>
        <div class="strategy-shot"><div class="shot-num">5</div><div class="shot-content"><h5>First-bite taste reaction</h5><p>Genuine surprise at taste quality. Compare to previous meal prep experiences. 10 to 15s, hook-optimised. Commission multiple creators cheaply. The gap in competitor creative around taste is consistent across all brands.</p></div><div class="shot-priority priority-p2">P2</div></div>
      </div>
    </div>

    <div class="methodology-note" style="margin-top:1.5rem">
      <h4>How to use this document</h4>
      <p>Pages 1 to 3 are the evidence. Page 4 is the action plan. When challenged on a creative direction, trace the recommendation back through the data: the shot brief (Page 4) references a pattern (Page 2), which is evidenced by specific brands (Page 3), drawn from the raw dataset (Page 5). Every recommendation has a paper trail.</p>
    </div>
  `;
}

// ── Boot ──
(async () => {
  try {
    const data = await fetchData();
    render(data);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="loading-screen"><h2>Failed to load data</h2><p style="color:var(--ink-2)">${err.message}</p></div>`;
  }
})();

</script>
</body>
</html>
