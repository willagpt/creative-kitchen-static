<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Strategy Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--surface-alt:#f4f2ee;--surface-warm:#f9f5f0;
  --ink:#1a1714;--ink-2:#5c564d;--ink-3:#8a8279;--ink-4:#b0a99e;
  --accent:#b44d1e;--accent-light:#f4e6dc;--accent-dark:#8a3710;--accent-glow:rgba(180,77,30,.08);
  --green:#2d6a4f;--green-light:#d8f3dc;--green-bg:#f0f9f2;
  --blue:#1d4e89;--blue-light:#d0e2f4;--blue-bg:#eef4fa;
  --purple:#6b21a8;--purple-light:#ede9fe;--purple-bg:#f6f3fc;
  --amber:#92400e;--amber-light:#fef3c7;--amber-bg:#fefbf0;
  --red:#991b1b;--red-light:#fee2e2;
  --border:#e8e4de;--border-light:#f0ece6;
  --radius:5px;--radius-lg:8px;
  --shadow-sm:0 1px 2px rgba(26,23,20,.05);--shadow:0 1px 4px rgba(26,23,20,.08);--shadow-lg:0 4px 20px rgba(26,23,20,.1);
  --font-display:'Fraunces',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif;
}
html{font-size:14.5px;scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.25}

/* ── Loading state ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem}
.loading-screen h2{font-family:var(--font-display);font-size:1.4rem;color:var(--ink-2)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse .8s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.15s}.loading-dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.1)}}

/* ── Page shell ── */
.page{max-width:1140px;margin:0 auto;padding:0 clamp(1rem,3vw,2.5rem) 4rem}

/* ── Top bar ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 0;border-bottom:1px solid var(--border);margin-bottom:0}
.topbar-brand{font-family:var(--font-display);font-size:.95rem;font-weight:700;color:var(--accent-dark);letter-spacing:-.02em}
.topbar-actions{display:flex;gap:.5rem}
.btn-export{padding:.5rem 1.1rem;font-family:var(--font-body);font-size:.76rem;font-weight:600;border:1.5px solid var(--ink);border-radius:var(--radius);background:var(--ink);color:var(--bg);cursor:pointer;transition:all .15s}
.btn-export:hover{background:var(--accent-dark);border-color:var(--accent-dark);color:#fff}

/* ── Cover page ── */
.cover{padding:clamp(3rem,8vw,6rem) 0 clamp(2rem,5vw,4rem);margin-bottom:2.5rem;position:relative}
.cover-eyebrow{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);margin-bottom:1.25rem}
.cover h1{font-size:clamp(2.2rem,5vw,3.6rem);font-weight:800;letter-spacing:-.04em;line-height:1.08;max-width:700px;color:var(--ink)}
.cover-subtitle{font-size:1rem;color:var(--ink-2);margin-top:1rem;max-width:540px;line-height:1.6}
.cover-line{width:48px;height:3px;background:var(--accent);margin:2rem 0 1.5rem}
.cover-meta{display:flex;flex-wrap:wrap;gap:1.5rem 3rem;margin-top:.5rem}
.cover-stat{display:flex;flex-direction:column;gap:.2rem}
.cover-stat-value{font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--ink);line-height:1}
.cover-stat-label{font-size:.68rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.cover-toc{margin-top:2.5rem;display:none}
.cover-toc-item{display:flex;align-items:baseline;gap:.5rem;padding:.5rem 0;border-bottom:1px solid var(--border-light);font-size:.85rem;color:var(--ink-2)}
.cover-toc-item span:first-child{font-family:var(--font-display);font-weight:700;color:var(--accent);font-size:.75rem;min-width:1.4rem}
.cover-toc-item span:last-child{color:var(--ink);font-weight:500}
.cover-footer{margin-top:2rem;font-size:.78rem;color:var(--ink-3);line-height:1.55}

/* ── Nav ── */
.nav{position:sticky;top:0;z-index:50;background:rgba(250,249,247,.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border);margin:0 calc(-1 * clamp(1rem,3vw,2.5rem));padding:0 clamp(1rem,3vw,2.5rem)}
.nav-inner{display:flex;gap:0;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{padding:.75rem 1.15rem;font-family:var(--font-body);font-size:.8rem;font-weight:500;color:var(--ink-3);background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.nav-tab:hover{color:var(--ink)}
.nav-tab.active{color:var(--accent-dark);border-bottom-color:var(--accent);font-weight:700}
.nav-tab .tab-num{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;background:var(--surface-alt);font-size:.62rem;font-weight:700;margin-right:.4rem;color:var(--ink-3);transition:all .15s}
.nav-tab.active .tab-num{background:var(--accent);color:#fff}

/* ── Sections ── */
.section{display:none;padding-top:2.5rem}
.section.active{display:block}
.section-header{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.section-num{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:.6rem}
.section-title{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;margin-bottom:.5rem;letter-spacing:-.03em}
.section-sub{color:var(--ink-2);font-size:.92rem;max-width:600px;line-height:1.65}

/* ── Page 1: Landscape ── */
.landscape-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2.5rem}
@media(max-width:700px){.landscape-grid{grid-template-columns:1fr}}
.landscape-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem;box-shadow:var(--shadow-sm)}
.landscape-card h3{font-size:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.landscape-card h3 .lc-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}

.brand-table{width:100%;border-collapse:collapse;margin-bottom:2rem}
.brand-table th{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:600;text-align:left;padding:.6rem .75rem;border-bottom:2px solid var(--border)}
.brand-table td{padding:.65rem .75rem;border-bottom:1px solid var(--border-light);font-size:.88rem;vertical-align:top}
.brand-table tr:last-child td{border-bottom:none}
.brand-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.5rem;vertical-align:middle}
.brand-name{font-weight:600}

.percentile-bar{display:flex;align-items:stretch;height:32px;border-radius:var(--radius);overflow:hidden;background:var(--surface-alt);margin-top:.75rem}
.percentile-segment{display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;transition:width .3s}

.methodology-note{background:var(--surface-warm);border-left:3px solid var(--accent);padding:1.25rem 1.5rem;border-radius:0 var(--radius-lg) var(--radius-lg) 0;margin-top:2.5rem;box-shadow:var(--shadow-sm)}
.methodology-note h4{font-family:var(--font-display);font-size:.88rem;font-weight:700;margin-bottom:.4rem;color:var(--ink)}
.methodology-note p{font-size:.84rem;color:var(--ink-2);line-height:1.6}

/* ── Page 2: Patterns ── */
.pattern-row{display:grid;grid-template-columns:200px 1fr;gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.25rem;background:var(--surface)}
@media(max-width:640px){.pattern-row{grid-template-columns:1fr}}
.pattern-label-col{padding:1.25rem;display:flex;flex-direction:column;justify-content:center;gap:.35rem}
.pattern-category{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.pattern-name{font-family:var(--font-display);font-size:1.05rem;font-weight:700;line-height:1.2}
.pattern-pct{font-size:.78rem;color:var(--ink-3);margin-top:.15rem}
.pattern-detail{padding:1.25rem;border-left:1px solid var(--border-light)}
@media(max-width:640px){.pattern-detail{border-left:none;border-top:1px solid var(--border-light)}}
.pattern-detail p{font-size:.88rem;color:var(--ink-2);line-height:1.6}
.pattern-brands{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.65rem}
.pattern-brand-tag{font-size:.68rem;padding:.15rem .5rem;border-radius:3px;font-weight:600}
.bar-chart{display:flex;flex-direction:column;gap:.5rem;margin-top:1.5rem}
.bar-row{display:flex;align-items:center;gap:.75rem}
.bar-label{width:140px;font-size:.8rem;font-weight:500;text-align:right;flex-shrink:0;color:var(--ink-2)}
.bar-track{flex:1;height:22px;background:var(--surface-alt);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .4s;display:flex;align-items:center;padding-left:.5rem}
.bar-fill span{font-size:.65rem;font-weight:700;color:#fff;white-space:nowrap}

/* ── Page 3: Brand cards ── */
.brand-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem;background:var(--surface);box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.brand-card:hover{box-shadow:var(--shadow)}
.brand-card-header{padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.brand-card-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700}
.brand-card-badges{display:flex;flex-wrap:wrap;gap:.35rem}
.brand-card-badge{font-size:.65rem;padding:.2rem .55rem;border-radius:3px;font-weight:600}
.brand-card-body{padding:0 1.5rem 1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:640px){.brand-card-body{grid-template-columns:1fr}}
.brand-card-section h4{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:700;margin-bottom:.5rem}
.brand-card-section ul{list-style:none;padding:0}
.brand-card-section li{font-size:.85rem;color:var(--ink-2);padding:.3rem 0;padding-left:1rem;position:relative;line-height:1.5}
.brand-card-section li::before{content:'';position:absolute;left:0;top:.65rem;width:5px;height:5px;border-radius:50%}
.steal-list li::before{background:var(--green)}
.weak-list li::before{background:var(--red)}
.brand-card-stats{display:flex;gap:1.5rem;padding:1rem 1.5rem;border-top:1px solid var(--border-light);flex-wrap:wrap}
.brand-card-stat{display:flex;flex-direction:column;gap:.1rem}
.brand-card-stat-val{font-family:var(--font-display);font-size:1rem;font-weight:700}
.brand-card-stat-lbl{font-size:.65rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}

/* ── Page 4: Strategy ── */
.track-toggle{display:flex;gap:.35rem;margin-bottom:1.5rem;flex-wrap:wrap}
.track-btn{padding:.5rem 1.1rem;font-family:var(--font-body);font-size:.8rem;font-weight:600;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--ink-2);cursor:pointer;transition:all .15s}
.track-btn:hover{border-color:var(--ink-3);color:var(--ink)}
.track-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.track-section{display:none}.track-section.active{display:block}
.track-header{margin-bottom:1.75rem;padding:1.5rem 1.75rem;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.track-header-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.35rem}
.track-header-title{font-family:var(--font-display);font-size:1.35rem;font-weight:800;margin-bottom:.4rem;letter-spacing:-.02em}
.track-header-rationale{font-size:.88rem;color:var(--ink-2);line-height:1.65;max-width:640px}
.shot-table{width:100%;border-collapse:collapse;font-size:.84rem;margin-bottom:2rem;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.shot-table th{text-align:left;padding:.7rem .75rem;background:var(--surface-alt);font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-2);font-weight:700;white-space:nowrap;border-bottom:2px solid var(--border)}
.shot-table td{padding:.85rem .75rem;border-bottom:1px solid var(--border-light);vertical-align:top;line-height:1.55}
.shot-table tr:last-child td{border-bottom:none}
.shot-table tr:nth-child(even) td{background:var(--surface-warm)}
.shot-table tr:hover td{background:var(--accent-glow)}
.shot-table td:first-child{font-family:var(--font-display);font-weight:700;color:var(--accent);text-align:center;width:36px;font-size:.95rem}
.shot-table td strong{font-weight:700;color:var(--ink);display:block;margin-bottom:.25rem}
.tag{display:inline-block;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.2rem .45rem;border-radius:3px;margin-right:.3rem;margin-bottom:.25rem}
.tag-hook{background:var(--accent-light);color:var(--accent-dark)}
.tag-body{background:var(--blue-light);color:var(--blue)}
.tag-proof{background:var(--green-light);color:var(--green)}
.tag-cta{background:var(--purple-light);color:var(--purple)}
.priority-high{color:var(--accent-dark);font-weight:700}
.priority-med{color:var(--blue);font-weight:600}
.priority-low{color:var(--ink-3);font-weight:500}
.shot-notes{font-size:.8rem;color:var(--ink-2);max-width:200px}
.shot-source{font-size:.78rem;color:var(--ink-3);font-style:italic}

/* ── Page 5: Raw Data ── */
.data-table{width:100%;border-collapse:collapse;font-size:.82rem;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.data-table th{text-align:left;padding:.6rem .7rem;background:var(--surface-alt);border-bottom:2px solid var(--border);font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-2);font-weight:700;white-space:nowrap}
.data-table td{padding:.6rem .7rem;border-bottom:1px solid var(--border-light);vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:nth-child(even) td{background:var(--surface-warm)}
.data-table tr:hover td{background:var(--accent-glow)}
.hook-text{font-style:italic;color:var(--ink-2);max-width:320px}

/* ── Print / PDF ── */
@page{size:A4;margin:20mm 18mm 24mm 18mm}
@page:first{margin-top:0;margin-bottom:0}

@media print{
  /* ── Reset ── */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  html{font-size:10px}
  body{background:#fff;color:#1a1714;line-height:1.55}

  /* ── Hide interactive elements ── */
  .topbar,.nav,.btn-export,.no-print,.track-toggle,.loading-screen{display:none!important}

  /* ── Page shell ── */
  .page{max-width:none;padding:0}

  /* ── Cover page: full-bleed title page ── */
  .cover{
    display:flex;flex-direction:column;justify-content:flex-end;
    min-height:100vh;padding:0 0 15mm 0;margin:0;
    page-break-after:always;
    background:linear-gradient(175deg, #faf9f7 0%, #f4e6dc 40%, #e8d5c4 100%)!important;
    margin:-20mm -18mm 0 -18mm;padding:40mm 24mm 20mm 24mm;
  }
  .cover-eyebrow{font-size:8px;letter-spacing:.18em;color:#8a3710;margin-bottom:8mm}
  .cover h1{font-size:32px;max-width:420px;line-height:1.12;letter-spacing:-.03em;margin-bottom:0}
  .cover-line{width:40px;height:3px;background:#b44d1e;margin:6mm 0}
  .cover-meta{gap:8mm 20mm;margin-top:4mm}
  .cover-stat-value{font-size:22px}
  .cover-stat-label{font-size:7px;letter-spacing:.08em}
  .cover p[style]{font-size:8px!important;margin-top:8mm!important}

  /* ── Cover extras for print ── */
  .cover-toc{display:block!important;margin-top:8mm}
  .cover-toc-item{padding:1.8mm 0;font-size:8.5px;border-bottom:0.5px solid #e8e4de}
  .cover-toc-item span:first-child{font-size:7.5px;min-width:8mm}
  .cover-subtitle{font-size:9.5px;margin-top:4mm;max-width:380px;line-height:1.5}
  .cover-footer{font-size:7.5px;margin-top:8mm;color:#8a8279}
  .cover::after{
    content:'Confidential. Prepared by Creative Kitchen.';
    display:block;margin-top:auto;padding-top:10mm;
    font-size:7px;color:#8a8279;letter-spacing:.04em;
  }

  /* ── Sections ── */
  .section{display:block!important;padding:0;margin:0}
  .section:not(:first-child){page-break-before:always}
  .section-header{margin-bottom:6mm;padding-bottom:4mm;border-bottom:2px solid #b44d1e}
  .section-num{font-size:7.5px;color:#b44d1e;margin-bottom:2mm}
  .section-title{font-size:20px;letter-spacing:-.02em;margin-bottom:2mm}
  .section-sub{font-size:9px;color:#5c564d;max-width:440px;line-height:1.55}

  /* ── Page 1: Landscape ── */
  .landscape-grid{grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:5mm}
  .landscape-card{padding:4mm;border:1px solid #e8e4de;border-radius:3px;page-break-inside:avoid}
  .landscape-card h3{font-size:10px;margin-bottom:3mm}
  .landscape-card h3 .lc-icon{width:18px;height:18px;font-size:9px}
  .brand-table{margin-bottom:3mm}
  .brand-table th{font-size:6.5px;padding:2mm 2mm}
  .brand-table td{font-size:8.5px;padding:1.8mm 2mm}
  .brand-dot{width:6px;height:6px;margin-right:2mm}
  .bar-chart{margin-top:3mm;gap:2mm}
  .bar-row{gap:2mm}
  .bar-label{width:80px;font-size:7.5px}
  .bar-track{height:14px}
  .bar-fill span{font-size:6px}
  .methodology-note{padding:3mm 4mm;margin-top:5mm;page-break-inside:avoid}
  .methodology-note h4{font-size:8.5px;margin-bottom:1.5mm}
  .methodology-note p{font-size:8px;line-height:1.5}

  /* ── Page 2: Patterns ── */
  .pattern-row{grid-template-columns:120px 1fr;margin-bottom:3mm;page-break-inside:avoid}
  .pattern-label-col{padding:3mm}
  .pattern-category{font-size:6px}
  .pattern-name{font-size:10px}
  .pattern-pct{font-size:7px}
  .pattern-detail{padding:3mm}
  .pattern-detail p{font-size:8px;line-height:1.5}
  .pattern-brands{margin-top:2mm;gap:1.5mm}
  .pattern-brand-tag{font-size:6.5px;padding:1mm 2mm}

  /* ── Page 3: Brand cards ── */
  .brand-card{margin-bottom:4mm;page-break-inside:avoid}
  .brand-card-header{padding:3mm 4mm}
  .brand-card-title{font-size:12px}
  .brand-card-badge{font-size:6px;padding:1mm 2mm}
  .brand-card-body{padding:0 4mm 4mm;gap:4mm}
  .brand-card-section h4{font-size:7px;margin-bottom:2mm}
  .brand-card-section li{font-size:8px;line-height:1.45;padding:.8mm 0 .8mm 3mm}
  .brand-card-section li::before{top:2.2mm;width:3px;height:3px}
  .brand-card-stats{padding:2.5mm 4mm;gap:4mm}
  .brand-card-stat-val{font-size:9px}
  .brand-card-stat-lbl{font-size:6px}

  /* ── Page 4: Production briefs ── */
  .track-section{display:block!important;page-break-before:always}
  .track-header{padding:4mm;margin-bottom:4mm;page-break-inside:avoid;page-break-after:avoid}
  .track-header-label{font-size:7px}
  .track-header-title{font-size:14px;margin-bottom:2mm}
  .track-header-rationale{font-size:8.5px;line-height:1.5}
  .shot-table{page-break-inside:auto}
  .shot-table th{font-size:6.5px;padding:2mm;border-bottom:1.5px solid #1a1714}
  .shot-table td{font-size:8px;padding:2.5mm 2mm;line-height:1.45}
  .shot-table tr{page-break-inside:avoid}
  .shot-table td:first-child{width:16px;font-size:8px}
  .shot-table td strong{font-size:8.5px}
  .tag{font-size:5.5px;padding:.8mm 1.5mm;border-radius:1.5px}
  .shot-source{font-size:7px;max-width:120px}
  .shot-notes{font-size:7px;max-width:110px}

  /* ── Page 5: Raw data ── */
  .data-table th{font-size:6px;padding:1.5mm 2mm}

<div class="page" id="app">

</div>

<script>
const SB_URL = 'https://ifrxylvoufncdxyltgqt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmcnh5bHZvdWZuY2R4eWx0Z3F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzkwNDgsImV4cCI6MjA4OTQxNTA0OH0.ZsyGK_jdxjTrO3Ji8zgoyHz6VxW5hR36JWr1sgmmAFA';
const HEADERS = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };

// Brand colour palette (deterministic)
const BRAND_COLORS = [
  {bg:'#f4e6dc',text:'#8a3710',dot:'#b44d1e'},
  {bg:'#d0e2f4',text:'#1d4e89',dot:'#2563eb'},
  {bg:'#d8f3dc',text:'#2d6a4f',dot:'#16a34a'},
  {bg:'#ede9fe',text:'#6b21a8',dot:'#7c3aed'},
  {bg:'#fef3c7',text:'#92400e',dot:'#d97706'},
  {bg:'#fee2e2',text:'#991b1b',dot:'#dc2626'},
  {bg:'#e0e7ff',text:'#3730a3',dot:'#4f46e5'},
  {bg:'#fce7f3',text:'#9d174d',dot:'#db2777'},
  {bg:'#d1fae5',text:'#065f46',dot:'#059669'},
  {bg:'#fef9c3',text:'#854d0e',dot:'#ca8a04'},
];

async function fetchData() {
  // Step 1: fetch all completed analyses
  const analysesRes = await fetch(`${SB_URL}/rest/v1/video_analyses?status=eq.complete&select=*&order=created_at.desc`, { headers: HEADERS });
  const analyses = await analysesRes.json();

  // Step 2: fetch only the competitor ads that have analyses (avoids 1000-row default limit)
  const adIds = [...new Set(analyses.map(a => a.competitor_ad_id).filter(Boolean))];
  let ads = [];
  if (adIds.length > 0) {
    // Supabase in filter: id=in.(id1,id2,...)
    const idsParam = `(${adIds.map(id => `"${id}"`).join(',')})`;
    const adsRes = await fetch(`${SB_URL}/rest/v1/competitor_ads?id=in.${idsParam}&select=id,page_name,page_id,days_active,impressions_lower,impressions_upper,start_date,cta_type,creative_body`, { headers: HEADERS });
    ads = await adsRes.json();
  }
  return { analyses, ads };
}

function buildBrandMap(analyses, ads) {
  const adMap = {};
  ads.forEach(a => { adMap[a.id] = a; });

  // Group by page_id so UGC creators roll up under their parent brand
  const pageIdGroups = {};
  analyses.forEach(an => {
    if (!an.ai_analysis) return;
    const ad = adMap[an.competitor_ad_id] || {};
    const pid = ad.page_id || 'unknown';
    if (!pageIdGroups[pid]) pageIdGroups[pid] = { pageNames: {}, analyses: [] };
    const pn = ad.page_name || 'Unknown';
    pageIdGroups[pid].pageNames[pn] = (pageIdGroups[pid].pageNames[pn] || 0) + 1;
    pageIdGroups[pid].analyses.push({ ...an, ad });
  });

  // For each page_id group, pick the most common page_name as the brand name
  const brandMap = {};
  let colorIdx = 0;
  Object.entries(pageIdGroups).forEach(([pid, group]) => {
    const sorted = Object.entries(group.pageNames).sort((a, b) => b[1] - a[1]);
    const brandName = sorted[0][0];
    const creators = sorted.slice(1).map(([name, count]) => ({ name, count }));
    brandMap[brandName] = {
      name: brandName,
      color: BRAND_COLORS[colorIdx % BRAND_COLORS.length],
      analyses: group.analyses,
      pageId: pid,
      creators: creators
    };
    colorIdx++;
  });
  return brandMap;
}

// Reverse-lookup: given any page_name, return the parent brand name
function resolveParentBrand(pageName, brandMap) {
  if (brandMap[pageName]) return pageName;
  for (const [brandName, brand] of Object.entries(brandMap)) {
    if (brand.creators.some(c => c.name === pageName)) return brandName;
  }
  return pageName;
}

function countPattern(analyses, field, subfield) {
  const counts = {};
  analyses.forEach(an => {
    const ai = an.ai_analysis;
    if (!ai) return;
    let val = subfield ? (ai[field] || {})[subfield] : ai[field];
    if (Array.isArray(val)) {
      val.forEach(v => {
        const k = (typeof v === 'string' ? v : '').toLowerCase().trim();
        if (k) counts[k] = (counts[k] || 0) + 1;
      });
    } else if (typeof val === 'string') {
      const k = val.toLowerCase().trim();
      if (k) counts[k] = (counts[k] || 0) + 1;
    }
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]);
}

function formatLabel(s) {
  return s.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function pctOf(count, total) { return total > 0 ? Math.round((count / total) * 100) : 0; }

function getBrandsUsing(analyses, field, subfield, value, brandMap) {
  const brands = new Set();
  analyses.forEach(an => {
    const ai = an.ai_analysis;
    if (!ai) return;
    let val = subfield ? (ai[field] || {})[subfield] : ai[field];
    if (Array.isArray(val)) {
      if (val.some(v => (typeof v === 'string' ? v : '').toLowerCase().trim() === value)) {
        const pn = an.ad?.page_name || 'Unknown';
        brands.add(brandMap ? resolveParentBrand(pn, brandMap) : pn);
      }
    } else if (typeof val === 'string' && val.toLowerCase().trim() === value) {
      const pn = an.ad?.page_name || 'Unknown';
      brands.add(brandMap ? resolveParentBrand(pn, brandMap) : pn);
    }
  });
  return [...brands];
}

function render(data) {
  const { analyses, ads } = data;
  const complete = analyses.filter(a => a.ai_analysis && a.transcript_text);
  if (complete.length === 0) {
    document.getElementById('app').innerHTML = '<div class="loading-screen"><h2>No completed analyses found</h2><p style="color:var(--ink-2)">Analyse some competitor videos first, then come back here.</p></div>';
    return;
  }
  const brandMap = buildBrandMap(complete, ads);
  // Attach ad data to each complete analysis so getBrandsUsing can resolve names
  const adMap = {};
  ads.forEach(a => { adMap[a.id] = a; });
  complete.forEach(an => { an.ad = adMap[an.competitor_ad_id] || {}; });
  const brands = Object.values(brandMap).sort((a,b) => b.analyses.length - a.analyses.length);
  const totalVideos = complete.length;
  const totalBrands = brands.length;
  const avgDuration = complete.reduce((s, a) => s + (a.duration_seconds || 0), 0) / totalVideos;
  const avgShots = complete.reduce((s, a) => s + (a.total_shots || 0), 0) / totalVideos;
  const dateRange = complete.map(a => a.created_at).sort();
  const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  // Aggregate patterns
  const hookTypes = countPattern(complete, 'hook', 'type');
  const narrativeArcs = countPattern(complete, 'narrative_arc', 'structure');
  const emotionalDrivers = countPattern(complete, 'emotional_drivers');
  const productionFormats = countPattern(complete, 'production_style', 'format');
  const pacingProfiles = countPattern(complete, 'pacing_profile');

    <!-- Cover -->

      <h1>Competitive Video Intelligence & Production Strategy</h1>
      <p class="cover-subtitle">A data-driven analysis of ${totalVideos} top-performing competitor video ads across ${totalBrands} brands in the UK meal prep category, with actionable production briefs for three creative tracks.</p>
      <div class="cover-line"></div>
      <div class="cover-meta">
        <div class="cover-stat"><span class="cover-stat-value">${totalVideos}</span><span class="cover-stat-label">Videos Analysed</span></div>
        <div class="cover-stat"><span class="cover-stat-value">${totalBrands}</span><span class="cover-stat-label">Brands Studied</span></div>
        <div class="cover-stat"><span class="cover-stat-value">${avgDuration.toFixed(0)}s</span><span class="cover-stat-label">Avg Duration</span></div>

      </div>
      <div class="cover-toc">
        <div class="cover-toc-item"><span>01</span><span>The Landscape</span></div>

        <div class="cover-toc-item"><span>03</span><span>Brand Intelligence</span></div>
        <div class="cover-toc-item"><span>04</span><span>Production Briefs</span></div>
        <div class="cover-toc-item"><span>05</span><span>Raw Analysis Data</span></div>
      </div>
      <div class="cover-footer">Generated ${today}<br>Willa Ltd / Creative Kitchen</div>
    </div>

    <!-- Nav -->
    <div class="nav no-print" id="nav">
      <div class="nav-inner" id="tabs">
        <button class="nav-tab active" data-tab="landscape"><span class="tab-num">1</span>The Landscape</button>
        <button class="nav-tab" data-tab="patterns"><span class="tab-num">2</span>Cross-Brand Patterns</button>
        <button class="nav-tab" data-tab="brands"><span class="tab-num">3</span>Brand Intelligence</button>
        <button class="nav-tab" data-tab="strategy"><span class="tab-num">4</span>Strategic Choices</button>
        <button class="nav-tab" data-tab="data"><span class="tab-num">5</span>Raw Data</button>
      </div>
    </div>

    <!-- Page 1: Landscape -->
    <div class="section active" id="landscape">
      <div class="section-header">
        <div class="section-num">01 / The Landscape</div>
        <h2 class="section-title">What We Analysed</h2>
        <p class="section-sub">The evidence base behind every recommendation in this document. ${totalVideos} videos from ${totalBrands} brands, filtered to the top performers by longevity.</p>
      </div>

      <div class="landscape-grid">
        <div class="landscape-card">
          <h3><span class="lc-icon" style="background:var(--accent-light);color:var(--accent-dark)">&#9654;</span>Video Dataset</h3>
          <table class="brand-table">
            <thead><tr><th>Brand</th><th>Videos</th><th>Avg Duration</th><th>Avg Shots</th></tr></thead>
            <tbody>
              ${brands.map(b => {
                const avgD = b.analyses.reduce((s,a) => s + (a.duration_seconds||0), 0) / b.analyses.length;
                const avgS = b.analyses.reduce((s,a) => s + (a.total_shots||0), 0) / b.analyses.length;
                const creatorNote = b.creators && b.creators.length > 0 ? ` <span style="font-size:.72rem;color:var(--ink-3)">(incl. ${b.creators.length} UGC creator${b.creators.length > 1 ? 's' : ''})</span>` : '';
                return `<tr>
                  <td><span class="brand-dot" style="background:${b.color.dot}"></span><span class="brand-name">${b.name}</span>${creatorNote}</td>
                  <td>${b.analyses.length}</td>
                  <td>${avgD.toFixed(1)}s</td>
                  <td>${avgS.toFixed(0)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>

        <div class="landscape-card">
          <h3><span class="lc-icon" style="background:var(--blue-light);color:var(--blue)">&#9776;</span>Production Styles</h3>
          <div class="bar-chart">
            ${productionFormats.slice(0, 5).map(([name, count]) => `
              <div class="bar-row">
                <div class="bar-label">${formatLabel(name)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--blue)"><span>${pctOf(count, totalVideos)}%</span></div></div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:1.25rem">
            <h3 style="font-size:.92rem;margin-bottom:.5rem"><span class="lc-icon" style="background:var(--green-light);color:var(--green)">&#9201;</span>Pacing Distribution</h3>
            <div class="bar-chart">
              ${pacingProfiles.map(([name, count]) => `
                <div class="bar-row">
                  <div class="bar-label">${formatLabel(name)}</div>
                  <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--green)"><span>${pctOf(count, totalVideos)}%</span></div></div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="methodology-note">
        <h4>Methodology</h4>
        <p>Videos were selected from the Meta Ad Library, filtered to the top performing percentile by longevity (days active). Each video was processed through a 4-stage pipeline: shot extraction, audio transcription, OCR frame analysis, and AI-powered creative analysis using Claude. Impression data was not available, so longevity serves as the primary performance proxy: longer-running ads signal sustained investment and sustained returns.</p>
      </div>
    </div>

    <!-- Page 2: Cross-Brand Patterns -->
    <div class="section" id="patterns">

      </div>

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin-bottom:1rem">Hook Strategies</h3>
      ${hookTypes.slice(0, 6).map(([name, count]) => {
        const pct = pctOf(count, totalVideos);
        const usingBrands = getBrandsUsing(complete, 'hook', 'type', name, brandMap);
        return `<div class="pattern-row">
          <div class="pattern-label-col" style="background:var(--accent-light)">
            <div class="pattern-category" style="color:var(--accent-dark)">Hook Type</div>

            <p>${getHookInsight(name, pct, usingBrands)}</p>

              ${usingBrands.map(b => {
                const brand = brandMap[b];
                return brand ? `<span class="pattern-brand-tag" style="background:${brand.color.bg};color:${brand.color.text}">${b}</span>` : '';

          </div>
        </div>`;

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin:2rem 0 1rem">Narrative Structures</h3>
      <div class="bar-chart" style="max-width:600px">
        ${narrativeArcs.slice(0, 6).map(([name, count]) => `
          <div class="bar-row">
            <div class="bar-label">${formatLabel(name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--purple)"><span>${pctOf(count, totalVideos)}%</span></div></div>

        `).join('')}

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin:2rem 0 1rem">Emotional Drivers</h3>

        ${emotionalDrivers.slice(0, 8).map(([name, count]) => `
          <div class="bar-row">
            <div class="bar-label">${formatLabel(name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pctOf(count, totalVideos)}%;background:var(--accent)"><span>${count}</span></div></div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Page 3: Brand Intelligence -->
    <div class="section" id="brands">
      <div class="section-header">
        <div class="section-num">03 / Brand Intelligence</div>
        <h2 class="section-title">Brand-by-Brand Breakdown</h2>
        <p class="section-sub">What each competitor is doing, what they do well, and what you can take from them.</p>
      </div>

      ${brands.map(b => {
        const avgD = b.analyses.reduce((s,a) => s + (a.duration_seconds||0), 0) / b.analyses.length;
        const avgS = b.analyses.reduce((s,a) => s + (a.total_shots||0), 0) / b.analyses.length;
        const hooks = countPattern(b.analyses, 'hook', 'type');
        const arcs = countPattern(b.analyses, 'narrative_arc', 'structure');

        // Collect steal/weakness insights
        const steals = [];
        const weaknesses = [];
        b.analyses.forEach(an => {
          const ci = an.ai_analysis?.competitor_insights;
          if (ci?.what_to_steal) ci.what_to_steal.forEach(s => { if (!steals.includes(s)) steals.push(s); });
          if (ci?.weaknesses) ci.weaknesses.forEach(w => { if (!weaknesses.includes(w)) weaknesses.push(w); });
        });
        return `<div class="brand-card">
          <div class="brand-card-header" style="background:${b.color.bg}">
            <div>
              <div class="brand-card-title" style="color:${b.color.text}">${b.name}</div>
              ${b.creators && b.creators.length > 0 ? `<div style="font-size:.72rem;color:${b.color.text};opacity:.7;margin-top:.25rem">Includes UGC creators: ${b.creators.map(c => c.name).join(', ')}</div>` : ''}
            </div>
            <div class="brand-card-badges">
              ${hooks.slice(0,2).map(([h]) => `<span class="brand-card-badge" style="background:rgba(255,255,255,.7);color:${b.color.text}">${formatLabel(h)}</span>`).join('')}
              ${arcs.slice(0,1).map(([a]) => `<span class="brand-card-badge" style="background:rgba(255,255,255,.7);color:${b.color.text}">${formatLabel(a)}</span>`).join('')}

            </div>
            <div class="brand-card-section">
              <h4>Weaknesses to exploit</h4>
              <ul class="weak-list">
                ${weaknesses.slice(0, 4).map(w => `<li>${w}</li>`).join('')}
                ${weaknesses.length === 0 ? '<li style="color:var(--ink-4)">Insufficient data</li>' : ''}
              </ul>
            </div>

            <div class="brand-card-stat"><span class="brand-card-stat-val">${emotions.slice(0,3).map(([e]) => formatLabel(e)).join(', ') || 'N/A'}</span><span class="brand-card-stat-lbl">Key Emotions</span></div>

    <!-- Page 5: Raw Data -->
    <div class="section" id="data">
      <div class="section-header">

        <h2 class="section-title">Full Analysis Dataset</h2>
        <p class="section-sub">Every video analysed, with key metrics and AI-extracted insights.</p>
      </div>

      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr><th>Brand</th><th>Hook Type</th><th>Hook Text</th><th>Duration</th><th>Shots</th><th>Pacing</th><th>Narrative</th><th>CTA</th><th>Emotional Drivers</th></tr>

            ${complete.map(an => {
              const ai = an.ai_analysis || {};
              const ad = ads.find(a => a.id === an.competitor_ad_id) || {};
              const parentBrand = resolveParentBrand(ad.page_name || 'Unknown', brandMap);
              const isCreator = parentBrand !== (ad.page_name || 'Unknown');
              return `<tr>
                <td><strong>${parentBrand}</strong>${isCreator ? `<br><span style="font-size:.72rem;color:var(--ink-3)">via ${ad.page_name}</span>` : ''}</td>
                <td>${formatLabel(ai.hook?.type || 'N/A')}</td>
                <td class="hook-text">"${(ai.hook?.text || '').slice(0, 80)}${(ai.hook?.text || '').length > 80 ? '...' : ''}"</td>
                <td>${(an.duration_seconds || 0).toFixed(1)}s</td>
                <td>${an.total_shots || 0}</td>

            }).join('')}

      <h3 style="font-family:var(--font-display);font-size:1.05rem;margin:2rem 0 1rem">One-Line Summaries</h3>
      ${complete.map(an => {
        const ai = an.ai_analysis || {};
        const ad = ads.find(a => a.id === an.competitor_ad_id) || {};
        if (!ai.one_line_summary) return '';
        const parentBrand = resolveParentBrand(ad.page_name || 'Unknown', brandMap);
        return `<div style="padding:.65rem 0;border-bottom:1px solid var(--border-light)">
          <strong style="font-size:.82rem">${parentBrand}</strong>
          <span style="font-size:.82rem;color:var(--ink-2);margin-left:.5rem">${ai.one_line_summary}</span>
        </div>`;
      }).join('')}
    </div>
  `;

  // Wire up tab navigation
  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.nav-tab');
    if (!btn) return;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Wire up track toggle
  document.getElementById('trackToggle').addEventListener('click', e => {
    const btn = e.target.closest('.track-btn');
    if (!btn) return;
    document.querySelectorAll('.track-btn').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.track-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('track-' + btn.dataset.track).classList.add('active');
  });
}

function getHookInsight(type, pct, brands) {
  const brandList = brands.join(', ');
  if (pct >= 40) return `Dominant approach across the market. Used by ${brandList}. This is table stakes, not a differentiator. You need to execute this well, but it won't set you apart.`;
  if (pct >= 20) return `A proven approach used by ${brandList}. Strong enough to validate, rare enough to still feel distinctive if you execute with a different angle.`;
  return `A less common approach from ${brandList}. If the data supports its performance, this represents genuine whitespace. Worth testing against the dominant hooks.`;
}

function renderStrategySection(analyses, brandMap, hookTypes, narrativeArcs, emotionalDrivers, totalBrands) {
  const totalVids = analyses.length;
  const brands = Object.values(brandMap);
  const topHook = hookTypes[0] ? formatLabel(hookTypes[0][0]) : 'Testimonial';
  const topEmotions = emotionalDrivers.slice(0, 3).map(([e]) => formatLabel(e)).join(', ');

  // Compute data-driven stats for rationale text
  const ugcCount = analyses.filter(a => ['ugc','talking-head','selfie','testimonial'].includes((a.ai_analysis?.production_style?.format || '').toLowerCase())).length;
  const ugcPct = pctOf(ugcCount, totalVids);
  const polishedCount = analyses.filter(a => ['cinematic','studio','professional','polished','lifestyle','mixed'].includes((a.ai_analysis?.production_style?.format || '').toLowerCase())).length;
  const polishedPct = pctOf(polishedCount, totalVids);
  const ugcHookCount = hookTypes.filter(([h]) => h.includes('ugc') || h.includes('testimonial')).reduce((s, [,c]) => s + c, 0);
  const ugcHookPct = pctOf(ugcHookCount, totalVids);
  const avgDur = (analyses.reduce((s, a) => s + (a.duration_seconds || 0), 0) / totalVids).toFixed(0);

  // Gather top steals and top hooks for reference
  const topBrands2 = brands.slice(0, 2).map(b => b.name).join(' and ');
  const beforeAfterBrands = getBrandsUsing(analyses, 'hook', 'type', 'before-after', brandMap);
  const testimonialBrands = getBrandsUsing(analyses, 'hook', 'type', 'ugc-testimonial', brandMap);
  const curiosityBrands = getBrandsUsing(analyses, 'hook', 'type', 'curiosity-gap', brandMap);

  function shotRow(num, title, desc, types, source, priority, notes) {
    const tagMap = { hook: 'tag-hook', body: 'tag-body', proof: 'tag-proof', cta: 'tag-cta' };
    const tagsHtml = types.map(t => `<span class="tag ${tagMap[t] || ''}">${t}</span>`).join('');
    const priClass = priority === 'P1' ? 'priority-high' : priority === 'P2' ? 'priority-med' : 'priority-low';
    return `<tr>
      <td>${num}</td>
      <td><strong>${title}</strong><br>${desc}</td>
      <td>${tagsHtml}</td>
      <td class="shot-source">${source}</td>
      <td class="${priClass}">${priority}</td>
      <td class="shot-notes">${notes}</td>
    </tr>`;
  }

  const tableHead = '<table class="shot-table"><thead><tr><th>#</th><th>Shot / Content Piece</th><th>Type</th><th>Pattern Source</th><th>Priority</th><th>Notes</th></tr></thead><tbody>';
  const tableFoot = '</tbody></table>';

  return `
    <!-- INTERNAL PRODUCTION -->
    <div class="track-section active" id="track-internal">
      <div class="track-header" style="background:var(--accent-light);border-color:var(--accent)">
        <div class="track-header-label" style="color:var(--accent-dark)">Track 1 / Internal Production</div>
        <div class="track-header-title">Quick-Turn In-House Content</div>
        <p style="margin-bottom:.5rem"><a href="production-brief-internal.html" style="font-size:.82rem;font-weight:600;color:var(--accent-dark);text-decoration:none;border-bottom:1px solid var(--accent-dark)" class="no-print">&#8594; View full production brief with detailed shot directions</a></p>
        <p class="track-header-rationale">Content your team can produce with a phone, ring light, and your product. Based on the ${totalVids} analysed videos, the dominant hook is "${topHook}" and the primary emotional drivers are ${topEmotions}. Average ad duration across the competitive set is ${avgDur}s. These briefs are designed for rapid iteration: film, test, learn, repeat.</p>
      </div>

      ${tableHead}
        ${shotRow(1,
          '"What I actually ate this week" rapid showcase',
          '7 meals shown in fast succession, each held to camera with name overlay. Close on "and I didn\'t cook once." Keep it under 20s. Film on any delivery day.',
          ['hook', 'body'],
          'UGC testimonial + Benefit stacking. Mirrors the format used by ' + topBrands2,
          'P1',
          '15 to 20s. Fills the "variety" gap. Can repurpose as stills for static ads.'
        )}
        ${shotRow(2,
          'Fridge pull reveal',
          'Camera starts on closed fridge. Hand opens it to reveal a full shelf of branded containers. Text: "This is what organised eating looks like." Pause on the visual, then cut to CTA.',
          ['hook'],
          'UGC testimonial / Bold claim. Trending TikTok format.',
          'P1',
          'Can be repurposed as a static image. Targets the convenience + aspiration emotional drivers found in ' + pctOf(emotionalDrivers.find(e => e[0] === 'convenience')?.[1] || 0, totalVids) + '% of analysed ads.'
        )}
        ${shotRow(3,
          'Microwave timer (split-screen)',
          'Real-time 90s microwave cook on one side. Someone spending 45 min cooking from scratch on the other. Text: "Same macros. Different time investment." End with price per meal.',
          ['body', 'proof'],
          'Convenience emotion + Category contrast. Split-screen format appears in ' + (getBrandsUsing(analyses, 'production_style', 'format', 'mixed', brandMap).join(', ') || 'multiple brands'),
          'P1',
          'Needs kitchen location. Strong pattern-interrupt. The time-saving claim is the most underleveraged selling point in the dataset.'
        )}
        ${shotRow(4,
          'Ingredient label flip',
          'Pick up a supermarket ready meal, flip to the ingredients list (long, unrecognisable). Then pick up your meal (short, clean list). Text: "Read the label." Confrontational tone.',
          ['hook', 'proof'],
          'Category contrast + Health anxiety. Informed by competitive weakness: ' + pctOf(analyses.filter(a => (a.ai_analysis?.emotional_drivers || []).some(e => e.toLowerCase().includes('health'))).length, totalVids) + '% of ads use health as a driver but few show evidence.',
          'P2',
          'High pattern-interrupt potential. Works as both video hook and static ad concept.'
        )}
        ${shotRow(5,
          'Macro scan',
          'Open MyFitnessPal or similar, scan the barcode, show the clean macro split appearing on screen. "Every meal, already in the app." Screen recording + hand.',
          ['proof'],
          'Benefit stacking. No competitor in the ${totalBrands}-brand dataset shows this.',
          'P2',
          'Quick trust-builder for fitness audience. 10 to 15s. Extremely cheap to produce.'
        )}
        ${shotRow(6,
          'Desk lunch B-roll',
          'Office setting. Someone unwraps and eats at their desk. No voiceover, just ASMR-style audio + text overlays with benefit claims scrolling. "50g protein. 450 cals. 90 seconds."',
          ['body'],
          'Convenience + Lifestyle integration. Fills the "professional" audience gap.',
          'P2',
          'Film in any office. Silent-optimised (matches the ' + pctOf(analyses.filter(a => (a.ai_analysis?.production_style?.text_overlays || '').includes('heavy')).length, totalVids) + '% of ads using heavy text overlays).'
        )}
        ${shotRow(7,
          'Unboxing',
          'Delivery arrives, unbox on kitchen counter, show each meal with genuine reaction. End with "link in bio." Standard but essential for the library.',
          ['body', 'cta'],
          'UGC testimonial + Social proof. Every competitor has one.',
          'P3',
          'Essential library content. Film on every delivery day to build variation. Low priority because it\'s table stakes, not a differentiator.'
        )}
      ${tableFoot}
    </div>

    <!-- PRODUCTION COMPANY -->
    <div class="track-section" id="track-production">
      <div class="track-header" style="background:var(--blue-light);border-color:var(--blue)">
        <div class="track-header-label" style="color:var(--blue)">Track 2 / Production Company</div>
        <div class="track-header-title">High-Production Brand Content</div>
        <p style="margin-bottom:.5rem"><a href="production-brief-studio.html" style="font-size:.82rem;font-weight:600;color:var(--blue);text-decoration:none;border-bottom:1px solid var(--blue)" class="no-print">&#8594; View full shoot pack (shot lists, lighting, talent, deliverables)</a></p>
        <p class="track-header-rationale">${ugcPct}% of the ${totalVids} analysed competitor ads use UGC or talking-head formats. Polished, cinematic production is a genuine whitespace in this category. These briefs require a production partner but create assets that elevate your brand above the feed and build a reusable clip library.</p>
      </div>

      ${tableHead}
        ${shotRow(1,
          'Hero Brand Film (30s)',
          'Cinematic food prep sequence: steam rising from a pan, ingredients being chopped, sauce being poured in slow motion. Cut to real people eating in real locations (gym, office, home). Close on branding + offer. No voiceover. Music + text overlays only.',
          ['hook', 'body', 'cta'],
          'Competitive gap: no brand in the dataset has polished cinematic production. ' + ugcPct + '% of ads are UGC/talking-head format.',
          'P1',
          'THE differentiator. One hero video that sets you apart from the sea of UGC. Aim for 25 to 30s. Use as the anchor for all paid social.'
        )}
        ${shotRow(2,
          'Kitchen-to-Container Journey',
          'Follow one meal from raw ingredients through the professional kitchen to being sealed, labelled, and packed for delivery. Time-lapse + macro shots. VO: "From chef\'s hands to your microwave in 90 seconds."',
          ['body', 'proof'],
          'Trust + Quality contrast. Fills the "what\'s actually inside" gap identified across competitor weaknesses.',
          'P1',
          'Requires kitchen access. Addresses the biggest trust gap in the category: customers can\'t see the production process.'
        )}
        ${shotRow(3,
          'Ingredient Close-ups Library (B-roll bank)',
          'Shoot 20 to 30 slow-motion ingredient clips: herbs falling onto a board, olive oil drizzling into a pan, vegetables being julienned, spices hitting hot oil with a sizzle. Each clip 3 to 5s. Shoot at 120fps minimum.',
          ['body'],
          'Food visual gap across entire competitive set. No brand invests in premium food cinematography.',
          'P1',
          'Most valuable long-term asset. Reusable across dozens of future ads, social posts, and website. Shoot once, use for 12+ months.'
        )}
        ${shotRow(4,
          'Taste Test Series',
          'Film 5 to 8 people trying meals for the first time. Capture genuine reactions with two cameras (face + food). Edit into a rapid-cut montage (2s per reaction) with meal names as lower thirds. End with "X out of X said they\'d reorder."',
          ['proof', 'hook'],
          'Competitive gap: virtually no brand in the dataset sells on taste. Selling points across ' + totalVids + ' ads focus on convenience (' + pctOf(analyses.filter(a => (a.ai_analysis?.selling_points || []).some(s => s.toLowerCase().includes('conveni'))).length, totalVids) + '%), protein (' + pctOf(analyses.filter(a => (a.ai_analysis?.selling_points || []).some(s => s.toLowerCase().includes('protein'))).length, totalVids) + '%), and time-saving.',
          'P2',
          'Can also be cut into individual vertical clips for organic social. The taste gap is the single most consistent weakness across all brands.'
        )}
        ${shotRow(5,
          'Chef Profile',
          '60s piece on whoever develops the recipes. Their background, training, food philosophy, what makes your meals different. Interview format (podcast-style framing) intercut with kitchen B-roll of them cooking. End with "meet the chef behind your meals."',
          ['body', 'proof'],
          'Founder/authority interview format. Used by ' + (curiosityBrands.join(', ') || 'multiple brands') + ' with curiosity-gap hooks. Adapted for chef angle instead of founder.',
          'P2',
          'Builds the "faces behind the food" trust layer. Can be cut into 15s, 30s, and 60s versions. Interview audio becomes podcast/reel content.'
        )}
      ${tableFoot}
    </div>

    <!-- UGC CREATOR BRIEFS -->
    <div class="track-section" id="track-ugc">
      <div class="track-header" style="background:var(--green-light);border-color:var(--green)">
        <div class="track-header-label" style="color:var(--green)">Track 3 / UGC Creator Briefs</div>
        <div class="track-header-title">Creator-Led Content Briefs</div>
        <p style="margin-bottom:.5rem"><a href="production-brief-ugc.html" style="font-size:.82rem;font-weight:600;color:var(--green);text-decoration:none;border-bottom:1px solid var(--green)" class="no-print">&#8594; View full creator briefs with 3 variations per concept</a></p>
        <p class="track-header-rationale">UGC testimonial hooks appear in ${ugcHookPct}% of the ${totalVids} analysed ads. These briefs are designed to hand directly to creators. Each includes talking points, visual direction, and the competitive evidence behind the concept. The goal: adapt what works and fill the gaps competitors leave open.</p>
      </div>

      ${tableHead}
        ${shotRow(1,
          'Female fitness creator: "My week on [brand]"',
          '7-day diary format. Each day: show a different meal + a gym/activity clip. Focus on convenience and routine fit. Key talking points: (1) "I don\'t have to think about food" (2) the macro split (3) genuine taste reaction on day 1. End with code + "link in bio." 30 to 45s.',
          ['hook', 'body', 'cta'],
          'UGC testimonial + Audience gap. The competitive set is overwhelmingly male-presenting creators. Female fitness is the single biggest audience whitespace.',
          'P1',
          'TOP PRIORITY. Commission 2 to 3 creators simultaneously for A/B testing. Brief them to film naturally, not scripted. The "week in my life" format is proven by ' + (testimonialBrands.slice(0, 2).join(', ') || 'multiple brands') + '.'
        )}
        ${shotRow(2,
          'Busy professional: "How I save 5 hours a week"',
          'Before: show takeaway receipts, sad desk lunch, late-night cooking. After: clean meals ready to go, macro tracking on phone, evenings free. Numbers-led hook: "I calculated how much time I spent cooking. It was 7 hours a week." 25 to 35s.',
          ['hook', 'proof'],
          'Before/after format (used by ' + (beforeAfterBrands.join(', ') || 'multiple brands') + ') adapted for non-gym audience. Broadens appeal beyond fitness.',
          'P1',
          'Brief: professional in their 30s, relatable kitchen, real receipts/screenshots. The time-saving angle is undersold across the competitive set.'
        )}
        ${shotRow(3,
          'Nutritionist/PT explainer: "Why I recommend [brand]"',
          'Podcast-style talking head. Credentialled nutritionist or PT explains what they look for in a meal prep service: ingredient quality, macro accuracy, portion consistency. B-roll of meals throughout. End with professional endorsement + offer. 30 to 40s.',
          ['proof', 'body'],
          'Authority/expert format. Directly adapted from the longest-running ad formats in the competitive set (nutritionist and founder interviews consistently run 40+ days).',
          'P1',
          'Find a credentialled nutritionist (RD or equivalent). The authority hook is proven: expert formats have the highest longevity in the dataset. Film in their clinic/office, not a home kitchen.'
        )}
        ${shotRow(4,
          'Couple / housemate: "We switched to [brand]"',
          'Two people in a kitchen discussing the switch. One handles taste ("I was sceptical but honestly the Thai green curry is better than my local"), the other handles convenience ("I used to batch cook every Sunday, now I just don\'t"). Natural, unscripted feel. Pass the product between them. 25 to 35s.',
          ['hook', 'body'],
          'UGC testimonial (novel duo format). No competitor in the ${totalBrands}-brand dataset uses a two-person format.',
          'P2',
          'Differentiation through format novelty. Brief both people separately so the conversation feels genuine. Film in one take if possible.'
        )}
        ${shotRow(5,
          'Gym bro transformation: "30 days on [brand]"',
          'Daily check-in diary. Weigh-ins, meal tracking screenshots, gym clips. Focus: "the easiest cut/bulk I\'ve ever done." End with progress photos side-by-side + offer code. 30 to 45s.',
          ['hook', 'proof', 'cta'],
          'Before/after (proven by ' + (beforeAfterBrands.join(', ') || 'multiple brands') + ') + FOMO. Transformation results are the highest-impact proof point in the dataset.',
          'P2',
          'Requires 30-day lead time. Brief creator early. The physique shot is proven as a high-impact payoff (see competitive data for Simmer and Frive).'
        )}
        ${shotRow(6,
          'First-bite taste reaction',
          'Genuine first-bite surprise. "I didn\'t expect meal prep to taste like THIS." Compare to previous meal prep experiences. Short, punchy. 10 to 15s. Hook-optimised for feed stopping.',
          ['hook'],
          'Competitive gap: taste. Consistent weakness across ALL brands in the dataset. Nobody sells on how the food actually tastes.',
          'P2',
          'Commission 3 to 5 creators cheaply. The hook writes itself. Can test multiple meal variants. The taste gap is the most consistent weakness across all ${totalBrands} brands.'
        )}
        ${shotRow(7,
          'Student budget: "Cost per meal breakdown"',
          'Calculator on screen, breaking down cost per meal including time value. "When you factor in your time at minimum wage, [brand] costs less than cooking from scratch." Show the maths visually. 20 to 30s.',
          ['proof'],
          'Bold claim + Category contrast. The value angle is untouched by competitors.',
          'P3',
          'Good for younger demographic. Brief a student creator. The cost comparison angle has zero competition in the dataset.'
        )}
      ${tableFoot}
    </div>

    <div class="methodology-note" style="margin-top:1.5rem">
      <h4>How to use this document</h4>
      <p>Pages 1 to 3 are the evidence. Page 4 is the action plan. When someone challenges a creative direction, trace the recommendation back through the data: the shot brief (Page 4) references a pattern (Page 2), which is evidenced by specific brands (Page 3), drawn from the raw dataset (Page 5). Every recommendation has a paper trail. Hand Track 2 directly to your production company. Hand Track 3 directly to UGC creators (each row is a self-contained brief).</p>
    </div>
  `;
}

// ── Boot ──
(async () => {
  try {
    const data = await fetchData();
    render(data);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="loading-screen"><h2>Failed to load data</h2><p style="color:var(--ink-2)">${err.message}</p></div>`;
  }
})();

</script>
