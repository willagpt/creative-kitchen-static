<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEFLY Prompt Tester</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0D0D0D;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #FFF6EE;
    --text-dim: #9A918A;
    --orange: #FF6B2C;
    --yellow: #FFD60A;
    --green: #A8E10C;
    --blush: #FF8FA3;
    --sky: #5CCFFF;
    --cream: #FFF6EE;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--orange); }

  .header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-row input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    width: 260px;
  }

  .api-row .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
  }

  .api-row .dot.active { background: var(--green); }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    height: calc(100vh - 120px);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  select, .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  select:hover, .btn:hover { border-color: #555; }

  .btn-generate {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
    font-weight: 600;
    padding: 8px 20px;
  }

  .btn-generate:hover { background: #e55a1f; }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
  }

  textarea:focus { outline: none; border-color: var(--orange); }

  .prompt-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .result-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    min-height: 400px;
  }

  .result-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  .result-placeholder {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .result-placeholder .icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.3;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-bar .timer { font-variant-numeric: tabular-nums; }

  .history {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .history-thumb {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: 0.6;
    transition: all 0.15s;
  }

  .history-thumb:hover { opacity: 1; }
  .history-thumb.active { border-color: var(--orange); opacity: 1; }
  .history-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .history-detail {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 11px;
    line-height: 1.5;
  }

  .history-detail.hidden { display: none; }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .detail-label {
    color: var(--orange);
    font-weight: 600;
    font-size: 11px;
  }

  .detail-prompt {
    color: var(--text-dim);
    max-height: 80px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .presets {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover { color: var(--text); border-color: var(--orange); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .generating { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>CHEFLY</span> prompt tester</h1>
    <div class="subtitle">test prompts against fal.ai models — iterate fast, waste nothing</div>
  </div>
  <div class="api-row">
    <div class="dot" id="apiDot"></div>
    <input type="password" id="apiKey" placeholder="fal.ai API key" />
  </div>
</div>

<div class="main">
  <!-- Left: Prompt -->
  <div class="panel">
    <div class="panel-title">prompt</div>

    <div class="presets" id="presets"></div>

    <div class="controls">
      <select id="modelSelect">
        <option value="fal-ai/nano-banana-2">nano banana 2 (default)</option>
        <option value="fal-ai/nano-banana-pro">nano banana pro (older)</option>
        <option value="fal-ai/flux-2-pro">flux 2 pro (current gen)</option>
        <option value="fal-ai/flux-pro/v1.1-ultra">flux pro v1.1 ultra</option>
        <option value="fal-ai/flux/schnell">flux schnell (fast/cheap)</option>
      </select>
      <select id="ratioSelect">
        <option value="1:1">1:1</option>
        <option value="4:5">4:5</option>
        <option value="9:16">9:16</option>
        <option value="16:9">16:9</option>
        <option value="3:2">3:2</option>
        <option value="2:3">2:3</option>
      </select>
      <select id="resSelect">
        <option value="1K">1K</option>
        <option value="512px">512px (fast draft)</option>
        <option value="2K">2K</option>
        <option value="4K">4K</option>
      </select>
      <button class="btn btn-generate" id="genBtn" onclick="generate()">generate</button>
    </div>

    <textarea id="promptInput" placeholder="Write your prompt here...">Create a bold headline static advertisement for "CHEFLY" (eatchefly.com). Large, attention-grabbing headline dominates the top third. Product image centered below. Strong call-to-action button at bottom. Brand colors — use ONLY these for all backgrounds, text, accents, and graphic elements: #FF6B2C, #0D0D0D, #FFF6EE, #FFD60A, #A8E10C, #FF8FA3, #5CCFFF. Product: fresh meals. Key claims: Preservative-free meals, no seed oils, high protein. Photography: Clean, minimal, product-focused compositions. Professional advertising quality. 1080x1080 square format.</textarea>

    <div class="prompt-meta">
      <span id="charCount">0 chars</span>
      <span id="tokenEst">~0 tokens</span>
    </div>
  </div>

  <!-- Right: Result -->
  <div class="panel">
    <div class="panel-title">result</div>

    <div class="result-area" id="resultArea">
      <div class="result-placeholder" id="placeholder">
        <div class="icon">&#x1f3a8;</div>
        <div>paste a prompt and hit generate</div>
        <div style="margin-top:4px;font-size:11px">tip: start at 512px to iterate fast, then upscale winners</div>
      </div>
    </div>

    <div class="status-bar">
      <span id="statusText">ready</span>
      <span class="timer" id="timer"></span>
    </div>

    <div class="history-detail hidden" id="historyDetail">
      <div class="detail-header">
        <span class="detail-label" id="detailLabel">—</span>
        <button class="preset-btn" onclick="loadFromHistory()" title="Load this prompt back into the editor">↑ load prompt</button>
      </div>
      <div class="detail-prompt" id="detailPrompt"></div>
    </div>

    <div id="historyLabel" style="font-size:10px;color:var(--text-dim);margin-top:12px;display:none;justify-content:space-between;align-items:center">
      <span>generation history — click to compare · <span id="historyCount">0</span> saved</span>
      <button class="preset-btn" onclick="clearHistory()" style="color:#FF8FA3">clear all</button>
    </div>
    <div class="history" id="history"></div>
  </div>
</div>

<script>
// Presets
const PRESETS = [
  { name: 'B (favourite)', prompt: 'Create a bold headline static advertisement for "CHEFLY" (eatchefly.com). Large, attention-grabbing headline dominates the top third. Product image centered below. Strong call-to-action button at bottom. Brand colors — use ONLY these for all backgrounds, text, accents, and graphic elements: #FF6B2C, #0D0D0D, #FFF6EE, #FFD60A, #A8E10C, #FF8FA3, #5CCFFF. Product: fresh meals. Key claims: Preservative-free meals, no seed oils, high protein. Photography: Clean, minimal, product-focused compositions. Professional advertising quality. 1080x1080 square format.' },
  { name: 'C (favourite)', prompt: 'Create a bold headline static advertisement. Large, attention-grabbing headline text dominates the top third. Product image centered below. Strong call-to-action button at the bottom. Clean background with brand colors. Brand name: "CHEFLY". Website URL text displayed on ad: "eatchefly.com". Product: fresh meals. Key claims: Preservative-free meals, no seed oils, high protein. Brand colors — use ONLY these for all backgrounds, text, accents, and graphic elements: #FF6B2C, #0D0D0D, #FFF6EE, #FFD60A, #A8E10C, #FF8FA3, #5CCFFF. Photography style: Clean, minimal compositions. Product-focused compositions for CHEFLY. Direct-response advertising with clear value propositions. CHEFLY aesthetic throughout. Strong CTAs with brand color accents. Do NOT generate any AI text overlays, watermarks, or placeholder logos. IMPORTANT: Any website URL shown in the ad MUST read exactly "eatchefly.com" — not any other domain. Professional advertising quality. 1080x1080 square format.' },
  { name: 'B-rewrite (photo style)', prompt: 'Premium DTC meal delivery advertisement for CHEFLY (eatchefly.com). Hero shot of a freshly prepared high-protein meal in branded matte packaging, steam gently rising, shot on Canon R5 85mm f/2.8 from a 30-degree overhead angle. Soft key light from upper left, warm fill light reflecting off a cream surface. Bold headline text "CHEFLY" dominates the top third in clean sans-serif type, call-to-action button at bottom reading "eatchefly.com". Brand color palette — use ONLY these: #FF6B2C for accents, #0D0D0D for text and backgrounds, #FFF6EE for surface, #FFD60A #A8E10C #FF8FA3 #5CCFFF as accent highlights. Preservative-free, no seed oils, high protein. For a scroll-stopping paid social campaign. 1:1, 1080x1080.' },
  { name: 'C-rewrite (photo style)', prompt: 'Static advertisement for CHEFLY, a premium chef-cooked meal delivery brand (eatchefly.com). Centre frame: a sealed meal tray with visible protein, grains, and fresh vegetables, shot on Hasselblad X2D 90mm at f/4, shallow depth of field. Warm directional lighting from upper right, dark moody background fading to near-black. Text "CHEFLY" in bold clean sans-serif across the top third, tagline "Preservative-free. No seed oils. High protein." in smaller type below. CTA "eatchefly.com" at bottom. Brand colors — use ONLY these throughout: #FF6B2C, #0D0D0D, #FFF6EE, #FFD60A, #A8E10C, #FF8FA3, #5CCFFF. Direct-response advertising aesthetic, clean modern layout. Do NOT generate any watermarks or placeholder logos. For a high-converting paid social campaign targeting food enthusiasts. 1:1, 1080x1080.' },
  { name: 'empty', prompt: '' }
];

// Init
const apiKeyInput = document.getElementById('apiKey');
const apiDot = document.getElementById('apiDot');
const promptInput = document.getElementById('promptInput');
const charCount = document.getElementById('charCount');
const tokenEst = document.getElementById('tokenEst');
const presetsEl = document.getElementById('presets');

// Load API key from localStorage
const savedKey = localStorage.getItem('ck_fal_api_key');
if (savedKey) {
  apiKeyInput.value = savedKey;
  apiDot.classList.add('active');
}

apiKeyInput.addEventListener('input', () => {
  const key = apiKeyInput.value.trim();
  localStorage.setItem('ck_fal_api_key', key);
  apiDot.classList.toggle('active', !!key);
});

// Char count
function updateCounts() {
  const len = promptInput.value.length;
  charCount.textContent = len + ' chars';
  tokenEst.textContent = '~' + Math.round(len / 4) + ' tokens';
}
promptInput.addEventListener('input', updateCounts);
updateCounts();

// Presets
PRESETS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = p.name;
  btn.onclick = () => {
    promptInput.value = p.prompt;
    updateCounts();
  };
  presetsEl.appendChild(btn);
});

// === IndexedDB persistence — images survive reloads ===
const DB_NAME = 'ck_prompt_tester';
const DB_VERSION = 1;
const STORE_NAME = 'generations';
const MAX_SAVED = 50;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToDB(item) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(item);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadAllFromDB() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result.sort((a, b) => b.id - a.id));
    req.onerror = () => reject(req.error);
  });
}

async function deleteFromDB(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function imageUrlToDataUrl(url) {
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn('Could not cache image:', e);
    return url; // fallback to remote URL
  }
}

// Generation history
let history = [];
let timerInterval = null;

// Restore history on page load
(async function restoreHistory() {
  try {
    const saved = await loadAllFromDB();
    if (saved.length > 0) {
      history = saved;
      selectedHistoryId = history[0].id;
      renderHistory();
      showHistoryDetail(history[0]);
      // Show most recent image
      const placeholder = document.getElementById('placeholder');
      if (placeholder) placeholder.remove();
      document.getElementById('resultArea').innerHTML = '<img src="' + history[0].dataUrl + '" alt="Generated image" />';
      document.getElementById('statusText').textContent = history[0].model.split('/').pop() + ' · ' + history[0].ratio + ' · ' + history[0].resolution + ' · ' + history[0].time + 's · restored';
    }
  } catch (e) {
    console.warn('Could not restore history:', e);
  }
})();

async function generate() {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { alert('Enter your fal.ai API key first'); return; }

  const prompt = promptInput.value.trim();
  if (!prompt) { alert('Enter a prompt'); return; }

  const model = document.getElementById('modelSelect').value;
  const ratio = document.getElementById('ratioSelect').value;
  const resolution = document.getElementById('resSelect').value;

  const btn = document.getElementById('genBtn');
  const statusText = document.getElementById('statusText');
  const timerEl = document.getElementById('timer');
  const resultArea = document.getElementById('resultArea');

  btn.disabled = true;
  btn.textContent = 'generating…';
  statusText.textContent = 'submitting to ' + model + '…';
  statusText.classList.add('generating');

  // Start timer
  const startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    timerEl.textContent = elapsed + 's';
  }, 100);

  const headers = {
    'Authorization': 'Key ' + apiKey,
    'Content-Type': 'application/json'
  };

  try {
    // Build request body — Flux models use image_size, Nano Banana uses aspect_ratio + resolution
    const isFlux = model.includes('flux');
    const fluxSizeMap = {
      '1:1': 'square_hd',
      '4:5': { width: 1080, height: 1350 },
      '9:16': 'portrait_16_9',
      '16:9': 'landscape_16_9',
      '3:2': 'landscape_4_3',
      '2:3': 'portrait_4_3'
    };
    const body = { prompt, num_images: 1 };
    if (isFlux) {
      body.image_size = fluxSizeMap[ratio] || 'square_hd';
    } else {
      // Nano Banana models only accept 1K, 2K, 4K — fall back from 512px to 1K
      const validRes = (resolution === '512px') ? '1K' : resolution;
      if (resolution === '512px') {
        statusText.textContent = '512px not supported by ' + model.split('/').pop() + ' — using 1K…';
      }
      body.aspect_ratio = ratio;
      body.resolution = validRes;
    }

    // Submit to queue
    const submitResp = await fetch('https://queue.fal.run/' + model, {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });

    if (!submitResp.ok) throw new Error('Submit error: ' + submitResp.status);
    const submitData = await submitResp.json();

    // Check for direct URL
    let imageUrl = submitData.images?.[0]?.url || submitData.output?.images?.[0]?.url;

    if (!imageUrl) {
      const requestId = submitData.request_id;
      if (!requestId) throw new Error('No request_id returned');

      const statusUrl = 'https://queue.fal.run/' + model + '/requests/' + requestId + '/status';
      const resultUrl = 'https://queue.fal.run/' + model + '/requests/' + requestId;

      // Poll
      statusText.textContent = 'queued…';
      const maxWait = 180000;
      while (Date.now() - startTime < maxWait) {
        await new Promise(r => setTimeout(r, 1500));
        const pollResp = await fetch(statusUrl, { headers: { 'Authorization': 'Key ' + apiKey } });
        if (!pollResp.ok) throw new Error('Poll error: ' + pollResp.status);
        const pollData = await pollResp.json();
        const elapsed = Math.round((Date.now() - startTime) / 1000);

        if (pollData.status === 'COMPLETED') {
          statusText.textContent = 'downloading…';
          const resultResp = await fetch(resultUrl, { headers: { 'Authorization': 'Key ' + apiKey } });
          if (!resultResp.ok) throw new Error('Result error: ' + resultResp.status);
          const resultData = await resultResp.json();
          imageUrl = resultData.images?.[0]?.url || resultData.output?.images?.[0]?.url;
          break;
        } else if (pollData.status === 'FAILED') {
          throw new Error('Generation failed: ' + (pollData.error || 'unknown'));
        } else {
          statusText.textContent = pollData.status.toLowerCase().replace('_', ' ') + '… ' + elapsed + 's';
        }
      }

      if (!imageUrl) throw new Error('Timed out after 3 minutes');
    }

    // Display result
    clearInterval(timerInterval);
    const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
    timerEl.textContent = totalTime + 's';

    const placeholder = document.getElementById('placeholder');
    if (placeholder) placeholder.remove();

    resultArea.innerHTML = '<img src="' + imageUrl + '" alt="Generated image" />';
    statusText.textContent = model.split('/').pop() + ' · ' + ratio + ' · ' + resolution + ' · ' + totalTime + 's';
    statusText.classList.remove('generating');

    // Cache image locally as data URL so it survives reloads
    statusText.textContent += ' · saving…';
    const dataUrl = await imageUrlToDataUrl(imageUrl);

    // Add to history and persist
    const entry = { url: imageUrl, dataUrl, model, ratio, resolution, time: totalTime, prompt: prompt, id: Date.now() };
    history.unshift(entry);
    selectedHistoryId = history[0].id;

    // Save to IndexedDB
    try {
      await saveToDB(entry);
      // Trim old entries if over limit
      if (history.length > MAX_SAVED) {
        const old = history.splice(MAX_SAVED);
        for (const item of old) await deleteFromDB(item.id);
      }
    } catch (e) { console.warn('Could not persist:', e); }

    statusText.textContent = model.split('/').pop() + ' · ' + ratio + ' · ' + resolution + ' · ' + totalTime + 's · saved';
    renderHistory();
    showHistoryDetail(history[0]);

  } catch (err) {
    clearInterval(timerInterval);
    statusText.textContent = 'error: ' + err.message;
    statusText.classList.remove('generating');
  }

  btn.disabled = false;
  btn.textContent = 'generate';
}

let selectedHistoryId = null;

function renderHistory() {
  const container = document.getElementById('history');
  const label = document.getElementById('historyLabel');
  container.innerHTML = '';
  if (history.length > 0) {
    label.style.display = 'flex';
    document.getElementById('historyCount').textContent = history.length;
  }

  history.forEach((item, i) => {
    const imgSrc = item.dataUrl || item.url;
    const thumb = document.createElement('div');
    thumb.className = 'history-thumb' + (item.id === selectedHistoryId ? ' active' : '');
    thumb.innerHTML = '<img src="' + imgSrc + '" />';
    thumb.title = '#' + (history.length - i) + ' · ' + item.model.split('/').pop() + ' · ' + item.ratio + ' · ' + item.time + 's';
    thumb.onclick = () => {
      selectedHistoryId = item.id;
      document.getElementById('resultArea').innerHTML = '<img src="' + imgSrc + '" alt="Generated image" />';
      document.getElementById('statusText').textContent = item.model.split('/').pop() + ' · ' + item.ratio + ' · ' + item.resolution + ' · ' + item.time + 's';
      document.querySelectorAll('.history-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      showHistoryDetail(item);
    };
    container.appendChild(thumb);
  });
}

function showHistoryDetail(item) {
  const panel = document.getElementById('historyDetail');
  const label = document.getElementById('detailLabel');
  const promptEl = document.getElementById('detailPrompt');

  const modelName = item.model.split('/').pop();
  const idx = history.length - history.findIndex(h => h.id === item.id);
  label.textContent = '#' + idx + ' · ' + modelName + ' · ' + item.ratio + ' · ' + item.resolution + ' · ' + item.time + 's';
  promptEl.textContent = item.prompt;
  panel.classList.remove('hidden');
}

function loadFromHistory() {
  const item = history.find(h => h.id === selectedHistoryId);
  if (!item) return;
  promptInput.value = item.prompt;
  document.getElementById('modelSelect').value = item.model;
  document.getElementById('ratioSelect').value = item.ratio;
  document.getElementById('resSelect').value = item.resolution;
  updateCounts();
}

async function clearHistory() {
  if (!confirm('Delete all saved generations? This cannot be undone.')) return;
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).clear();
    await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
  } catch (e) { console.warn('Could not clear DB:', e); }
  history = [];
  selectedHistoryId = null;
  document.getElementById('history').innerHTML = '';
  document.getElementById('historyLabel').style.display = 'none';
  document.getElementById('historyDetail').classList.add('hidden');
  document.getElementById('resultArea').innerHTML = '<div class="result-placeholder"><div class="icon">&#x1f3a8;</div><div>paste a prompt and hit generate</div></div>';
  document.getElementById('statusText').textContent = 'history cleared';
}
</script>
</body>
</html>
