<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot Sheets / Creative Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--surface-alt:#f4f2ee;--surface-warm:#f9f5f0;
  --ink:#1a1714;--ink-2:#5c564d;--ink-3:#8a8279;--ink-4:#b0a99e;
  --accent:#b44d1e;--accent-light:#f4e6dc;--accent-dark:#8a3710;
  --green:#2d6a4f;--green-light:#d8f3dc;
  --blue:#1d4e89;--blue-light:#d0e2f4;
  --purple:#6b21a8;--purple-light:#ede9fe;
  --amber:#92400e;--amber-light:#fef3c7;
  --border:#e8e4de;--border-light:#f0ece6;
  --radius:4px;--radius-lg:6px;
  --shadow-sm:0 1px 2px rgba(26,23,20,.05);
  --font-display:'Fraunces',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif;
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.2}

.page{max-width:1100px;margin:0 auto;padding:0 clamp(1rem,3vw,2rem) 3rem}

/* Top bar */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:.9rem 0;border-bottom:1px solid var(--border)}
.topbar-brand{font-family:var(--font-display);font-size:.9rem;font-weight:700;color:var(--accent-dark)}
.topbar-actions{display:flex;gap:.4rem;align-items:center}
.btn{padding:.4rem .9rem;font-family:var(--font-body);font-size:.72rem;font-weight:600;border-radius:var(--radius);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;border:1.5px solid var(--border);background:var(--surface);color:var(--ink-2)}
.btn:hover{border-color:var(--ink-3);color:var(--ink)}
.btn-primary{border-color:var(--ink);background:var(--ink);color:var(--bg)}
.btn-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark)}

/* Hub index */
.hub{padding:clamp(2rem,5vw,3.5rem) 0 2rem}
.hub h1{font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:800;letter-spacing:-.03em;margin-bottom:.4rem}
.hub-sub{font-size:.88rem;color:var(--ink-2);max-width:520px;margin-bottom:2rem}

/* Track groups */
.track-group{margin-bottom:2rem}
.track-group-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem}
.track-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.track-group-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-2)}
.track-group-count{font-size:.68rem;color:var(--ink-4)}

/* Sheet index cards */
.sheet-index{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.6rem}
.sheet-card{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s}
.sheet-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.sheet-card.active{border-color:var(--accent);background:var(--accent-light)}
.sheet-card-num{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--ink-3);min-width:1.8rem}
.sheet-card.active .sheet-card-num{color:var(--accent)}
.sheet-card-info{flex:1;min-width:0}
.sheet-card-title{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sheet-card-meta{font-size:.68rem;color:var(--ink-3)}
.sheet-card-arrow{font-size:.8rem;color:var(--ink-4);transition:color .15s}
.sheet-card:hover .sheet-card-arrow{color:var(--accent)}

/* Sheet view */
.sheet-view{display:none;padding-top:1.5rem}
.sheet-view.active{display:block}

/* Sheet header */
.sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:2px solid var(--ink);flex-wrap:wrap}
.sheet-head-left{flex:1}
.sheet-head-track{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.3rem}
.sheet-head-title{font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:800;letter-spacing:-.02em;margin-bottom:.2rem}
.sheet-head-concept{font-size:.82rem;color:var(--ink-2);max-width:500px;line-height:1.5}
.sheet-head-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;font-size:.72rem;color:var(--ink-3);flex-shrink:0}
.sheet-head-right strong{color:var(--ink);font-weight:600}

/* THE GRID */
.shoot-grid{width:100%;border-collapse:collapse;border:2px solid var(--ink);font-size:.78rem}
.shoot-grid th{background:var(--ink);color:var(--bg);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.5rem .5rem;text-align:left;white-space:nowrap;position:sticky;top:0}
.shoot-grid th:first-child{width:28px;text-align:center}
.shoot-grid th:nth-child(2){width:28px;text-align:center}
.shoot-grid td{padding:.5rem .5rem;border:1px solid var(--border);vertical-align:top;line-height:1.45}
.shoot-grid tr:nth-child(even) td{background:var(--surface-alt)}
.shoot-grid tr:hover td{background:var(--accent-glow,rgba(180,77,30,.06))}
/* Checkbox column */
.shoot-grid td:first-child{text-align:center;width:28px;vertical-align:middle}
.shoot-grid td:first-child input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
/* Shot # */
.shoot-grid td:nth-child(2){text-align:center;font-family:var(--font-display);font-weight:700;color:var(--accent);width:28px}
/* Action */
.shoot-grid td:nth-child(3){font-weight:500;min-width:180px}
.shoot-grid td:nth-child(3) strong{display:block;font-weight:700;color:var(--ink);font-size:.8rem}
/* Duration */
.shoot-grid .col-dur{width:55px;text-align:center;font-family:var(--font-display);font-weight:600;white-space:nowrap}
/* Other columns */
.shoot-grid .col-sm{font-size:.74rem;color:var(--ink-2)}

/* Section divider row */
.shoot-grid .section-row td{background:var(--surface-warm)!important;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);padding:.4rem .5rem;border-top:2px solid var(--ink)}

/* Sheet footer */
.sheet-foot{margin-top:1rem;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;font-size:.78rem}
.sheet-foot-item label{display:block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin-bottom:.15rem}
.sheet-foot-item span{color:var(--ink)}

/* Cover page (print only) */
.cover-page,.section-divider{display:none}

/* Print */
@page{size:A4 landscape;margin:12mm 14mm 16mm 14mm}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  html{font-size:8.5px}
  body{background:#fff}
  .topbar,.hub,.no-print{display:none!important}
  .page{max-width:none;padding:0}
  .cover-page,.section-divider{display:flex!important}
  .cover-page{flex-direction:column;justify-content:center;align-items:center;min-height:100vh;page-break-after:always;text-align:center;padding:20mm}
  .cover-logo{font-family:var(--font-display);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:16mm}
  .cover-title{font-family:var(--font-display);font-size:36px;font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:4mm}
  .cover-subtitle{font-size:11px;color:var(--ink-2);max-width:320px;line-height:1.6;margin-bottom:14mm}
  .cover-meta{font-size:8px;color:var(--ink-3);line-height:2}
  .cover-meta strong{color:var(--ink);font-weight:600}
  .cover-toc{text-align:left;margin-top:10mm;border-top:1.5px solid var(--border);padding-top:6mm;width:280px}
  .cover-toc-title{font-family:var(--font-display);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-2);margin-bottom:4mm}
  .cover-toc-row{display:flex;justify-content:space-between;align-items:baseline;padding:1.5mm 0;border-bottom:1px dotted var(--border)}
  .cover-toc-row .toc-label{font-size:8.5px;font-weight:600;color:var(--ink)}
  .cover-toc-row .toc-dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-right:2mm}
  .cover-toc-row .toc-count{font-size:8px;color:var(--ink-3)}
  .cover-rule{width:60px;height:2px;background:var(--accent);border:none;margin:8mm auto}
  .cover-confidential{font-size:7px;color:var(--ink-4);margin-top:8mm;letter-spacing:.05em;text-transform:uppercase}

  /* Section dividers */
  .section-divider{flex-direction:column;justify-content:center;align-items:center;min-height:100vh;page-break-after:always;text-align:center;padding:14mm 20mm}
  .section-divider-num{font-family:var(--font-display);font-size:42px;font-weight:800;line-height:1;margin-bottom:2mm}
  .section-divider-label{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;margin-bottom:2mm}
  .section-divider-title{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--ink);margin-bottom:2.5mm}
  .section-divider-desc{font-size:8.5px;color:var(--ink-2);max-width:300px;line-height:1.5;margin-bottom:4mm}
  .section-divider-table{width:auto;min-width:340px;max-width:440px;margin:0 auto;border-collapse:collapse;text-align:left}
  .section-divider-table th{font-size:5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);padding:1mm 2mm;border-bottom:1.5px solid var(--ink)}
  .section-divider-table td{font-size:7.5px;padding:1mm 2mm;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.35}
  .section-divider-table td:first-child{font-family:var(--font-display);font-weight:700;color:var(--ink-3);width:14px}
  .section-divider-table .sd-concept{font-weight:600;color:var(--ink)}
  .section-divider-table .sd-vars{font-size:6.5px;color:var(--ink-3);padding-top:.3mm}
  .section-divider-table .sd-pri{font-size:6.5px;color:var(--ink-4);text-align:right;white-space:nowrap;width:18px}

  .sheet-view{display:block!important;page-break-after:always}
  .sheet-view:last-child{page-break-after:auto}
  .sheet-head{margin-bottom:3mm;padding-bottom:2mm}
  .sheet-head-track{font-size:6px}
  .sheet-head-title{font-size:14px}
  .sheet-head-concept{font-size:7.5px}
  .sheet-head-right{font-size:6.5px}
  .shoot-grid{font-size:7px;border-width:1.5px}
  .shoot-grid th{font-size:5.5px;padding:2mm 1.5mm}
  .shoot-grid td{padding:1.8mm 1.5mm;line-height:1.35}
  .shoot-grid td:first-child input[type=checkbox]{width:10px;height:10px}
  .shoot-grid td:nth-child(3) strong{font-size:7.5px}
  .shoot-grid .col-dur{font-size:7px}
  .shoot-grid .col-sm{font-size:6.5px}
  .sheet-foot{padding:2.5mm;gap:2mm;margin-top:2mm}
  .sheet-foot-item label{font-size:5px}
  .sheet-foot-item span{font-size:7px}
  .sheet-foot::after{content:'Confidential. Prepared by Creative Kitchen.';grid-column:1/-1;font-size:6px;color:#8a8279;text-align:right;padding-top:1mm}
}
</style>
</head>

    <div><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse .8s infinite alternate"></span> <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse .8s infinite alternate;animation-delay:.15s"></span> <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse .8s infinite alternate;animation-delay:.3s"></span></div>

<style>@keyframes pulse{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.1)}}</style>

<script>
const SB_URL = 'https://ifrxylvoufncdxyltgqt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmcnh5bHZvdWZuY2R4eWx0Z3F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzkwNDgsImV4cCI6MjA4OTQxNTA0OH0.ZsyGK_jdxjTrO3Ji8zgoyHz6VxW5hR36JWr1sgmmAFA';
const HEADERS = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };

async function fetchData() {
  const analysesRes = await fetch(`${SB_URL}/rest/v1/video_analyses?status=eq.complete&select=*&order=created_at.desc`, { headers: HEADERS });
  const analyses = await analysesRes.json();
  const adIds = [...new Set(analyses.map(a => a.competitor_ad_id).filter(Boolean))];
  let ads = [];
  if (adIds.length > 0) {
    const idsParam = `(${adIds.map(id => `"${id}"`).join(',')})`;
    const adsRes = await fetch(`${SB_URL}/rest/v1/competitor_ads?id=in.${idsParam}&select=id,page_name,page_id`, { headers: HEADERS });
    ads = await adsRes.json();
  }
  return { analyses, ads };
}

function getStats(analyses, ads) {
  const adMap = {};
  ads.forEach(a => { adMap[a.id] = a; });
  analyses.forEach(an => { an.ad = adMap[an.competitor_ad_id] || {}; });
  const pageIds = new Set();
  analyses.forEach(an => { if (an.ad.page_id) pageIds.add(an.ad.page_id); });
  return { totalVids: analyses.length, totalBrands: pageIds.size };
}

// ── Grid row helper ──
function R(action, frame, dur, audio, talent, props, notes) {
  return { action, frame, dur, audio, talent, props, notes };
}
function sectionRow(label) {
  return { section: label };
}

// ── Build all shoot sheets ──
function buildSheets(stats) {

  // ═══════════ INTERNAL ═══════════

    duration: '8 to 12s', format: '9:16 vertical', priority: 'P1', location: 'Kitchen (any)', talent: 'One person (hand only)',
    rows: [
      R('Closed fridge, hand reaches for handle', 'Straight-on, chest height, phone on tripod', '1.5s', 'Silence or subtle buildup', 'Hand only', 'Clean fridge exterior', 'Clean fridge of distracting items first'),
      R('Fridge door swings open, reveal full shelf', 'Same angle, don\'t move camera', '3s', 'Satisfying sound effect on open', '', 'Containers label-forward, colourful meals visible', 'Fridge light provides natural reveal'),

          R('Week 1 montage: meals + gym + tracking screenshots', 'Various', '5s', 'Music', '', 'Containers, gym, phone', 'MFP screenshots add credibility'),
          R('Week 2 mid-point: "The easiest cut I\'ve ever done"', 'To camera', '4s', '', '', '', 'The ease comparison to past cuts'),
          R('Week 3 to 4: gym PBs, energy levels, how they feel', 'Gym + kitchen', '5s', '', '', '', 'Focus on performance not just aesthetics'),
          R('Day 30: final weigh-in, progress photo, side-by-side', 'Same location as Day 1', '5s', '', '', 'Scale, mirror', 'Split-screen with Day 1'),
          R('CTA: progress photos on screen + code + link', 'To camera or graphic', '3s', '', '', '', ''),
        ]},
        { name: 'B: Female recomp (NOT weight loss framing)', rows: [
          R('Day 1: Measurements, gym benchmarks', 'Gym + home', '3s', 'Talking to camera', 'Female, 25 to 35, fitness-focused', '', 'Hook: "What does consistent nutrition actually do? 30 days."'),
          R('Week 1 to 2: meals, gym clips, energy commentary', 'Various', '6s', 'Music + brief VO', '', '', '"I have more energy at 5pm than I used to at 9am"'),
          R('Week 3: genuine meal taste reactions', 'Kitchen', '4s', '', '', 'Containers', 'Show variety of meals tried'),
          R('Day 30: benchmark comparison, how she feels, the numbers', 'Gym + to camera', '5s', '', '', '', 'Frame as performance, NOT weight'),
          R('CTA: "Try it for 30 days. See what happens." + code', 'To camera', '3s', '', '', '', ''),
        ]},
        { name: 'C: Bulking / hard gainer', rows: [
          R('Day 1: "I need 3,200 cals and I HATE cooking."', 'Kitchen, to camera', '3s', '', 'Male, 20 to 30, lean build', '', 'Hook: the hard gainer struggle'),
          R('Show the daily volume: multiple containers', 'Kitchen counter', '3s', '', '', '4 to 5 containers', '"This is what 3,200 cals of good food looks like"'),
          R('Week 1 to 3: gym clips with progressive overload, new PRs', 'Gym', '6s', 'Music', '', '', 'Show the numbers going up'),
          R('Day 30: scale + mirror. "I gained 2kg of lean mass."', 'Same location as Day 1', '4s', '', '', 'Scale', 'The payoff'),
          R('CTA: "If you struggle to eat enough, this is it." + code', 'To camera', '3s', '', '', '', ''),
        ]},
      ]
    },
    {
      id: 'ugc-6', title: 'First-Bite Taste Reaction', priority: 'P2',
      concept: 'Short, punchy, hook-optimised. The taste gap is the most consistent weakness across all brands.',
      duration: '10 to 15s', format: '9:16',
      variations: [
        { name: 'A: Sceptic convert', rows: [
          R('Open container with visible scepticism', 'Kitchen, to camera', '2s', 'Talking to camera', 'Anyone, 22 to 35, expressive', 'Container', 'Hook: "Meal prep that tastes good? I\'ll believe it when I try it."'),
          R('First bite: genuine surprise reaction', 'Same', '3s', '', '', 'Fork, food', 'THE key moment. Don\'t cut early.'),
          R('"OK wait. This is actually really good?"', 'Same', '2s', '', '', '', 'Genuine words only'),
          R('Quick shot of label: meal name + macros', 'Close-up on container', '2s', '', '', '', ''),
          R('CTA: "Link in bio" (brief)', 'To camera', '2s', '', '', '', 'Keep total under 15s'),
        ]},
        { name: 'B: Foodie/home cook', rows: [
          R('Show the food close-up (make it look appealing)', 'Overhead or 45 degree on food', '2s', '', 'Food lover, 25 to 40', 'Container', 'Hook: "I\'ve tried every meal prep company. They all taste like cardboard. Except..."'),
          R('First bite: eyebrows up', 'To camera, medium shot', '3s', '', '', '', ''),
          R('"The lemongrass in this is actually real"', 'Same', '3s', '', '', '', 'Name specific flavours'),
          R('Eating more while describing flavours', 'Same', '3s', '', '', '', 'The foodie credibility makes endorsement stronger'),
          R('CTA: "I\'m ordering more." + code', 'To camera', '2s', '', '', '', ''),
        ]},
        { name: 'C: Post-workout hunger', rows: [
          R('Just walked through door, gym kit, sweaty', 'Home, front door or kitchen', '2s', '', 'Anyone, 20 to 30, post-workout', '', 'Hook: "Post-workout and STARVING."'),
          R('Microwave: 90 seconds. Timer visible.', 'Close on microwave', '2s', '', '', 'Container in microwave', 'Speed up if needed'),
          R('First massive bite: relief + genuine enjoyment', 'Kitchen, to camera', '3s', '', '', 'Container, fork', '"Why does this taste so good right now?"'),
          R('CTA: "90 seconds. That\'s it." + code', 'To camera', '2s', '', '', '', ''),
        ]},
      ]
    },
    {
      id: 'ugc-7', title: 'Student Budget: Cost Breakdown', priority: 'P3',
      concept: 'Calculator on screen. Factor in time at minimum wage. The value angle has zero competition in the dataset.',
      duration: '20 to 30s', format: '9:16',
      variations: [
        { name: 'A: University student', rows: [
          R('Calculator or notes app on screen', 'Screen recording + face cam', '2s', 'Talking to camera', 'Student, 19 to 23', 'Phone', 'Hook: "Everyone says meal prep is expensive. Let me do the maths."'),
          R('"Supermarket shop: this much. Time cooking: X hours at min wage: this much."', 'Screen showing calculation', '5s', '', '', '', 'Make numbers visible and honest'),
          R('"Total real cost of cooking: this. [Brand] cost: this."', 'Same', '4s', '', '', '', 'Include time at minimum wage'),
          R('"When you factor in your time, it\'s actually cheaper."', 'To camera', '3s', '', '', '', 'The revelation moment'),
          R('CTA: student discount code', 'To camera', '3s', '', '', '', '"Do the maths yourself."'),
        ]},
        { name: 'B: Graduate in first job', rows: [
          R('Show Deliveroo order history (blur prices if needed)', 'Phone screen', '3s', '', '22 to 26, first real job', 'Phone', 'Hook: "I can\'t cook and I\'m spending a fortune on Deliveroo."'),
          R('"Last month I spent this much on takeaways."', 'To camera or screen', '3s', '', '', '', ''),
          R('"[Brand] for the same period: this much. AND it\'s healthy."', 'Screen comparison', '4s', '', '', '', 'The comparison is devastating'),
          R('"I feel like I\'ve finally figured out food."', 'To camera', '3s', '', '', '', 'The adulting angle'),
          R('CTA: "Stop ordering Deliveroo." + code', 'To camera', '3s', '', '', '', ''),
        ]},
        { name: 'C: Current meal prepper', rows: [
          R('Sunday routine time-lapse: shopping, chopping, cooking, cleaning', 'Kitchen, overhead/side, sped up', '4s', '', '25 to 35, meal prep veteran', 'Groceries, kitchen tools', 'Hook: "I used to batch cook every Sunday. Let me tell you what that costs."'),
          R('"4 hours of my weekend. Gone. Every week."', 'To camera', '3s', '', '', '', ''),
          R('"I switched to [brand] and got my Sundays back."', 'To camera, visibly relaxed', '3s', '', '', 'Container', 'Show a Sunday: relaxing instead of cooking'),
          R('"Same macros. Better taste. Less stress."', 'To camera', '3s', '', '', '', ''),
          R('CTA: "Get your Sundays back." + code', 'To camera', '3s', '', '', '', ''),
        ]},
      ]
    },
  ];

  // Build UGC sheets: one sheet per variation
  ugcConcepts.forEach(c => {
    c.variations.forEach((v, vi) => {
      sheets.push({
        id: `${c.id}-${String.fromCharCode(97+vi)}`,
        track: 'UGC',
        trackColor: 'var(--green)',
        trackBg: 'var(--green-light)',
        title: `${c.title} / ${v.name}`,
        concept: c.concept,
        duration: c.duration,
        format: c.format,
        priority: c.priority,
        location: 'Creator\'s own environment',
        talent: v.name.split(':').pop().trim(),
        rows: v.rows,
      });
    });
  });

  return sheets;
}

function renderSheet(s, idx) {
  let tbody = '';
  let shotNum = 0;
  s.rows.forEach(r => {
    if (r.section) {
      tbody += `<tr class="section-row"><td colspan="9">${r.section}</td></tr>`;
    } else {
      shotNum++;
      tbody += `<tr>
        <td><input type="checkbox"></td>
        <td>${shotNum}</td>
        <td><strong>${(r.action || '').split('.')[0]}</strong>${r.action.includes('.') ? '<br>' + r.action.split('.').slice(1).join('.').trim() : ''}</td>
        <td class="col-sm">${r.frame || ''}</td>
        <td class="col-dur">${r.dur || ''}</td>
        <td class="col-sm">${r.audio || ''}</td>
        <td class="col-sm">${r.talent || ''}</td>
        <td class="col-sm">${r.props || ''}</td>
        <td class="col-sm">${r.notes || ''}</td>
      </tr>`;
    }
  });

  return `<div class="sheet-view" id="sheet-${s.id}" data-idx="${idx}">
    <div class="sheet-head">
      <div class="sheet-head-left">
        <div class="sheet-head-track" style="color:${s.trackColor}">${s.track} / ${s.priority}</div>
        <div class="sheet-head-title">${s.title}</div>
        <div class="sheet-head-concept">${s.concept}</div>
      </div>
      <div class="sheet-head-right">
        <div><strong>Duration:</strong> ${s.duration}</div>
        <div><strong>Format:</strong> ${s.format}</div>
        ${s.location ? `<div><strong>Location:</strong> ${s.location}</div>` : ''}
        ${s.talent ? `<div><strong>Talent:</strong> ${s.talent}</div>` : ''}
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="shoot-grid">
        <thead><tr><th>&#10003;</th><th>#</th><th>Action / Description</th><th>Frame / Angle</th><th>Dur</th><th>Audio / Sound</th><th>Talent</th><th>Props / Set</th><th>Notes</th></tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  </div>`;
}

function render(data) {
  const complete = data.analyses.filter(a => a.ai_analysis && a.transcript_text);
  if (!complete.length) { document.getElementById('app').innerHTML = '<p>No data</p>'; return; }
  const stats = getStats(complete, data.ads);
  const sheets = buildSheets(stats);
  const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  const tracks = [
    { key: 'Internal', color: 'var(--accent)', dot: '#b44d1e' },
    { key: 'Studio', color: 'var(--blue)', dot: '#1d4e89' },
    { key: 'UGC', color: 'var(--green)', dot: '#2d6a4f' },
  ];

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar no-print">
      <div class="topbar-brand">Creative Kitchen</div>
      <div class="topbar-actions">
        <a href="creative-playbook.html" class="btn">&#8592; Playbook</a>
        <button class="btn" id="btnPrintOne" style="display:none" onclick="printCurrent()">Print This Sheet</button>
        <button class="btn btn-primary" onclick="printAll()">Print All Sheets</button>
      </div>
    </div>

    <div class="hub no-print" id="hub">
      <h1>Shoot Sheets</h1>
      <p class="hub-sub">${sheets.length} production-ready shoot sheets across 3 tracks. Each sheet is a step-by-step table grid you can print, tick off on set, and hand to anyone. Based on ${stats.totalVids} analysed competitor videos.</p>

      ${tracks.map(t => {
        const trackSheets = sheets.filter(s => s.track === t.key);
        return `<div class="track-group">
          <div class="track-group-header">
            <div class="track-dot" style="background:${t.dot}"></div>
            <div class="track-group-title" style="color:${t.color}">${t.key}</div>
            <div class="track-group-count">${trackSheets.length} sheets</div>
          </div>
          <div class="sheet-index">
            ${trackSheets.map((s, i) => {
              const globalIdx = sheets.indexOf(s);
              return `<div class="sheet-card" data-sheet="${s.id}" onclick="showSheet('${s.id}')">
                <div class="sheet-card-num">${String(i + 1).padStart(2, '0')}</div>
                <div class="sheet-card-info">
                  <div class="sheet-card-title">${s.title}</div>
                  <div class="sheet-card-meta">${s.priority} / ${s.duration}</div>
                </div>
                <div class="sheet-card-arrow">&#8594;</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- COVER PAGE (print only) -->
    <div class="cover-page">
      <div class="cover-logo">Creative Kitchen</div>
      <div class="cover-title">Shoot Sheets</div>
      <div class="cover-subtitle">${sheets.length} production-ready shoot sheets. Step-by-step table grids designed for on-set use. Print, tick off, hand to anyone.</div>
      <hr class="cover-rule">
      <div class="cover-meta">
        <div><strong>Prepared:</strong> ${today}</div>
        <div><strong>Source data:</strong> ${stats.totalVids} competitor videos across ${stats.totalBrands} brands</div>
        <div><strong>Tracks:</strong> 3 (Internal, Studio, UGC)</div>
      </div>
      <div class="cover-toc">
        <div class="cover-toc-title">Contents</div>
        ${tracks.map((t, ti) => {
          const trackSheets = sheets.filter(s => s.track === t.key);
          return `<div class="cover-toc-row">
            <div class="toc-dot" style="background:${t.dot}"></div>
            <span class="toc-label">Track ${ti + 1}: ${t.key}</span>
            <span class="toc-count">${trackSheets.length} sheet${trackSheets.length !== 1 ? 's' : ''}</span>
          </div>`;
        }).join('')}
        <div class="cover-toc-row" style="border-bottom:none;padding-top:2mm">
          <span class="toc-label" style="font-weight:400;color:var(--ink-3)">Total</span>
          <span class="toc-count" style="font-weight:700;color:var(--ink)">${sheets.length} sheets</span>
        </div>
      </div>
      <div class="cover-confidential">Confidential. For internal and production partner use only.</div>
    </div>

    <!-- SECTION DIVIDER + SHEETS per track -->
    ${tracks.map((t, ti) => {
      const trackSheets = sheets.filter(s => s.track === t.key);
      const descriptions = {
        Internal: 'Quick-turn content your team can film with a phone, ring light, and your product. Designed for rapid iteration: film, test, learn, repeat.',
        Studio: 'High-production brand content requiring a production partner. Cinematic quality that elevates your brand above the feed.',
        UGC: 'Creator-led content briefs with 3 variations per concept. Hand directly to creators with talking points, visual direction, and shot-by-shot structure.'
      };
      // Build table rows: group UGC by concept (3 vars each), flat list for others
      let tableRows = '';
      if (t.key === 'UGC') {
        // Group into concepts of 3
        const concepts = [];
        for (let ci = 0; ci < trackSheets.length; ci += 3) {
          concepts.push(trackSheets.slice(ci, ci + 3));
        }
        tableRows = `<tr><th>#</th><th>Concept</th><th>Variations</th><th>Sheets</th><th></th></tr>` +
          concepts.map((group, gi) => {
            const base = group[0].title.split(' / ')[0].replace(/"/g, '');
            const vars = group.map(s => {
              const parts = s.title.split(' / ');
              return parts.length > 1 ? parts[1] : '';
            }).join(', ');
            return `<tr>
              <td>${String(gi + 1).padStart(2, '0')}</td>
              <td><span class="sd-concept">${base}</span><div class="sd-vars">${vars}</div></td>
              <td style="text-align:center">${group.length}</td>
              <td class="sd-pri">${group[0].priority}</td>
            </tr>`;
          }).join('');
      } else {
        tableRows = `<tr><th>#</th><th>Sheet</th><th>Duration</th><th></th></tr>` +
          trackSheets.map((s, i) => `<tr>
            <td>${String(i + 1).padStart(2, '0')}</td>
            <td><span class="sd-concept">${s.title}</span></td>
            <td style="font-size:7px;color:var(--ink-3)">${s.duration}</td>
            <td class="sd-pri">${s.priority}</td>
          </tr>`).join('');
      }

      return `
        <div class="section-divider">
          <div class="section-divider-num" style="color:${t.dot}">0${ti + 1}</div>
          <div class="section-divider-label" style="color:${t.dot}">Track ${ti + 1} of 3</div>
          <div class="section-divider-title">${t.key}</div>
          <div class="section-divider-desc">${descriptions[t.key]}</div>
          <table class="section-divider-table">${tableRows}</table>
        </div>
        ${trackSheets.map(s => renderSheet(s, sheets.indexOf(s))).join('')}
      `;
    }).join('')}
  `;
}

let currentSheet = null;

function showSheet(id) {
  document.querySelectorAll('.sheet-view').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.sheet-card').forEach(c => c.classList.remove('active'));
  const el = document.getElementById('sheet-' + id);
  if (el) {
    el.classList.add('active');
    currentSheet = id;
    document.getElementById('btnPrintOne').style.display = '';
    const card = document.querySelector(`.sheet-card[data-sheet="${id}"]`);
    if (card) card.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function printCurrent() {
  if (!currentSheet) return;
  // Hide cover, dividers, and all other sheets. Show only current.
  const cover = document.querySelector('.cover-page');
  const dividers = document.querySelectorAll('.section-divider');
  const allSheets = document.querySelectorAll('.sheet-view');
  const states = [];
  if (cover) { cover.dataset.origDisplay = cover.style.display; cover.style.display = 'none'; }
  dividers.forEach(d => { d.dataset.origDisplay = d.style.display; d.style.display = 'none'; });
  allSheets.forEach(s => {
    states.push(s.style.display);
    if (s.id !== 'sheet-' + currentSheet) s.style.display = 'none';
    else s.style.display = 'block';
  });
  window.print();
  if (cover) cover.style.display = cover.dataset.origDisplay || '';
  dividers.forEach(d => { d.style.display = d.dataset.origDisplay || ''; });
  allSheets.forEach((s, i) => s.style.display = states[i]);
}

function printAll() {
  // Show all sheets for print (cover + dividers handled by CSS)
  document.querySelectorAll('.sheet-view').forEach(s => s.style.display = 'block');
  window.print();
  // Restore: only show current (or none)
  document.querySelectorAll('.sheet-view').forEach(s => {
    s.style.display = '';
    if (currentSheet && s.id === 'sheet-' + currentSheet) s.classList.add('active');
  });
}

(async () => {
  try { render(await fetchData()); }
  catch (err) { document.getElementById('app').innerHTML = `<p>Error: ${err.message}</p>`; }
})();
</script>
