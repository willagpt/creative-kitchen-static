<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGC Creator Briefs / Creative Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--surface-alt:#f4f2ee;--surface-warm:#f9f5f0;
  --ink:#1a1714;--ink-2:#5c564d;--ink-3:#8a8279;--ink-4:#b0a99e;
  --accent:#b44d1e;--accent-light:#f4e6dc;--accent-dark:#8a3710;--accent-glow:rgba(180,77,30,.08);
  --green:#2d6a4f;--green-light:#d8f3dc;--green-bg:#f0f9f2;
  --blue:#1d4e89;--blue-light:#d0e2f4;--blue-bg:#eef4fa;
  --purple:#6b21a8;--purple-light:#ede9fe;
  --amber:#92400e;--amber-light:#fef3c7;
  --red:#991b1b;--red-light:#fee2e2;
  --border:#e8e4de;--border-light:#f0ece6;
  --radius:5px;--radius-lg:8px;
  --shadow-sm:0 1px 2px rgba(26,23,20,.05);--shadow:0 1px 4px rgba(26,23,20,.08);--shadow-lg:0 4px 20px rgba(26,23,20,.1);
  --font-display:'Fraunces',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif;
}
html{font-size:14.5px;scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--ink);background:var(--bg);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.25}

.page{max-width:960px;margin:0 auto;padding:0 clamp(1rem,3vw,2.5rem) 4rem}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 0;border-bottom:1px solid var(--border);margin-bottom:0}
.topbar-brand{font-family:var(--font-display);font-size:.95rem;font-weight:700;color:var(--accent-dark)}
.topbar-actions{display:flex;gap:.5rem}
.btn{padding:.5rem 1.1rem;font-family:var(--font-body);font-size:.76rem;font-weight:600;border-radius:var(--radius);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}
.btn-export{border:1.5px solid var(--ink);background:var(--ink);color:var(--bg)}
.btn-export:hover{background:var(--accent-dark);border-color:var(--accent-dark);color:#fff}
.btn-back{border:1.5px solid var(--border);background:var(--surface);color:var(--ink-2)}
.btn-back:hover{border-color:var(--ink-3);color:var(--ink)}

.cover{padding:clamp(3rem,8vw,5rem) 0 clamp(2rem,4vw,3rem);margin-bottom:2rem;border-bottom:2px solid var(--green)}
.cover-eyebrow{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--green);margin-bottom:1rem}
.cover h1{font-size:clamp(2rem,4.5vw,3rem);font-weight:800;letter-spacing:-.04em;line-height:1.1;max-width:650px}
.cover-subtitle{font-size:.95rem;color:var(--ink-2);margin-top:1rem;max-width:520px;line-height:1.6}
.cover-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-top:2rem;padding:1.25rem;background:var(--green-bg);border-radius:var(--radius-lg)}
.cover-meta-item{display:flex;flex-direction:column;gap:.15rem}
.cover-meta-val{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--green)}
.cover-meta-lbl{font-size:.65rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}

/* Concept card */
.concept{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:2.5rem;overflow:hidden;box-shadow:var(--shadow-sm)}
.concept:hover{box-shadow:var(--shadow)}
.concept-header{padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.concept-num{font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--green);line-height:1;min-width:2.5rem}
.concept-title-area{flex:1}
.concept-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;line-height:1.3;margin-bottom:.25rem}
.concept-subtitle{font-size:.84rem;color:var(--ink-2);line-height:1.5}
.concept-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.4rem}
.tag{display:inline-block;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.2rem .45rem;border-radius:3px}
.tag-hook{background:var(--accent-light);color:var(--accent-dark)}
.tag-body{background:var(--blue-light);color:var(--blue)}
.tag-proof{background:var(--green-light);color:var(--green)}
.tag-cta{background:var(--purple-light);color:var(--purple)}
.concept-priority{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.25rem .6rem;border-radius:3px}
.p1{background:var(--accent-light);color:var(--accent-dark)}
.p2{background:var(--blue-light);color:var(--blue)}
.p3{background:var(--surface-alt);color:var(--ink-3)}

/* Brief section inside concept */
.concept-brief{padding:0 1.5rem 1rem}
.brief-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:.4rem;padding-bottom:.25rem;border-bottom:1px solid var(--border-light)}
.brief-text{font-size:.86rem;color:var(--ink-2);line-height:1.6;margin-bottom:1rem}
.brief-text strong{color:var(--ink);font-weight:600}

/* Variation cards */
.variations{padding:0 1.5rem 1.5rem}
.variations-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:.75rem}
.var-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
@media(max-width:700px){.var-grid{grid-template-columns:1fr}}
.var-card{border:1px solid var(--border);border-radius:var(--radius);padding:1rem;background:var(--surface-warm);position:relative}
.var-card-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:.5rem}
.var-card h4{font-family:var(--font-display);font-size:.88rem;font-weight:700;margin-bottom:.4rem}
.var-section{margin-bottom:.6rem}
.var-section-title{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:.25rem}
.var-section p,.var-section li{font-size:.8rem;color:var(--ink-2);line-height:1.5}
.var-section ul{list-style:none;padding:0}
.var-section li{padding:.15rem 0 .15rem .8rem;position:relative}
.var-section li::before{content:'';position:absolute;left:0;top:.45rem;width:3px;height:3px;border-radius:50%;background:var(--green)}

/* Concept footer */
.concept-footer{padding:.75rem 1.5rem;background:var(--surface-alt);border-top:1px solid var(--border-light);display:flex;gap:1.5rem;flex-wrap:wrap}
.concept-footer-item{display:flex;flex-direction:column;gap:.1rem}
.concept-footer-item label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3)}
.concept-footer-item span{font-size:.82rem;font-weight:500;color:var(--ink)}

.evidence{background:var(--surface-warm);border-left:3px solid var(--green);padding:1rem 1.25rem;border-radius:0 var(--radius-lg) var(--radius-lg) 0;margin-bottom:1.5rem}
.evidence h4{font-family:var(--font-display);font-size:.82rem;font-weight:700;margin-bottom:.3rem}
.evidence p{font-size:.82rem;color:var(--ink-2);line-height:1.55}

.creator-checklist{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-top:2rem;box-shadow:var(--shadow-sm)}
.creator-checklist h3{font-size:.95rem;margin-bottom:.75rem}
.checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .75rem}
@media(max-width:600px){.checklist-grid{grid-template-columns:1fr}}
.checklist-item{display:flex;align-items:flex-start;gap:.5rem;font-size:.84rem;color:var(--ink-2);line-height:1.5}
.checklist-item::before{content:'[ ]';font-family:monospace;font-size:.7rem;color:var(--ink-3);flex-shrink:0;margin-top:.15rem}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1.5rem}
.loading-screen h2{font-family:var(--font-display);font-size:1.4rem;color:var(--ink-2)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse .8s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.15s}.loading-dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.1)}}

@page{size:A4;margin:18mm 16mm 22mm 16mm}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  html{font-size:9px}
  body{background:#fff}
  .topbar,.no-print{display:none!important}
  .page{max-width:none;padding:0}
  .cover{padding:0 0 4mm 0;margin-bottom:4mm;page-break-after:always;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(175deg,#faf9f7 0%,#d8f3dc 50%,#c5e8cc 100%)!important;margin:-18mm -16mm 0 -16mm;padding:30mm 20mm 15mm 20mm;border:none}
  .cover h1{font-size:26px;max-width:360px}
  .cover::after{content:'Confidential. Prepared by Creative Kitchen.';display:block;margin-top:auto;padding-top:8mm;font-size:7px;color:#8a8279}
  .concept{page-break-inside:avoid;margin-bottom:4mm}
  .concept-header{padding:3mm 4mm}
  .concept-num{font-size:12px}
  .concept-title{font-size:9.5px}
  .concept-subtitle{font-size:7.5px}
  .tag{font-size:5px;padding:.8mm 1.5mm}
  .concept-brief{padding:0 4mm 2mm}
  .brief-label{font-size:5.5px}
  .brief-text{font-size:7.5px;line-height:1.4;margin-bottom:2mm}
  .variations{padding:0 4mm 3mm}
  .var-grid{gap:2mm}
  .var-card{padding:2.5mm}
  .var-card-label{font-size:5px}
  .var-card h4{font-size:8px}
  .var-section-title{font-size:5px}
  .var-section p,.var-section li{font-size:7px;line-height:1.4}
  .concept-footer{padding:2mm 4mm;gap:3mm}
  .concept-footer-item label{font-size:5px}
  .concept-footer-item span{font-size:7px}
  .evidence{padding:2.5mm 3mm;margin-bottom:3mm}
  .evidence h4{font-size:7px}
  .evidence p{font-size:6.5px}
}
</style>
</head>

<script>
const SB_URL = 'https://ifrxylvoufncdxyltgqt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmcnh5bHZvdWZuY2R4eWx0Z3F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzkwNDgsImV4cCI6MjA4OTQxNTA0OH0.ZsyGK_jdxjTrO3Ji8zgoyHz6VxW5hR36JWr1sgmmAFA';
const HEADERS = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };

async function fetchData() {
  const analysesRes = await fetch(`${SB_URL}/rest/v1/video_analyses?status=eq.complete&select=*&order=created_at.desc`, { headers: HEADERS });
  const analyses = await analysesRes.json();
  const adIds = [...new Set(analyses.map(a => a.competitor_ad_id).filter(Boolean))];
  let ads = [];
  if (adIds.length > 0) {
    const idsParam = `(${adIds.map(id => `"${id}"`).join(',')})`;
    const adsRes = await fetch(`${SB_URL}/rest/v1/competitor_ads?id=in.${idsParam}&select=id,page_name,page_id,days_active`, { headers: HEADERS });
    ads = await adsRes.json();
  }
  return { analyses, ads };
}

function getStats(analyses, ads) {
  const adMap = {};
  ads.forEach(a => { adMap[a.id] = a; });
  analyses.forEach(an => { an.ad = adMap[an.competitor_ad_id] || {}; });
  const pageIds = new Set();
  analyses.forEach(an => { if (an.ad.page_id) pageIds.add(an.ad.page_id); });
  const totalVids = analyses.length;
  const totalBrands = pageIds.size;
  const ugcCount = analyses.filter(a => ['ugc','talking-head','selfie','testimonial'].includes((a.ai_analysis?.production_style?.format || '').toLowerCase())).length;
  const ugcPct = Math.round((ugcCount / totalVids) * 100);
  const hookCounts = {};
  analyses.forEach(an => { const h = (an.ai_analysis?.hook?.type || '').toLowerCase().trim(); if (h) hookCounts[h] = (hookCounts[h] || 0) + 1; });
  const ugcTestimonialPct = Math.round(((hookCounts['ugc-testimonial'] || 0) / totalVids) * 100);
  const emotionCounts = {};
  analyses.forEach(an => { (an.ai_analysis?.emotional_drivers || []).forEach(e => { const k = e.toLowerCase().trim(); if (k) emotionCounts[k] = (emotionCounts[k] || 0) + 1; }); });
  const topEmotions = Object.entries(emotionCounts).sort((a,b) => b[1] - a[1]).slice(0, 3).map(([e]) => e.replace(/\b\w/g, c => c.toUpperCase()));
  const tastePct = Math.round((analyses.filter(a => (a.ai_analysis?.selling_points || []).some(s => s.toLowerCase().includes('taste'))).length / totalVids) * 100);
  return { totalVids, totalBrands, ugcPct, ugcTestimonialPct, topEmotions, tastePct };
}

  document.getElementById('app').innerHTML = `

      <p>UGC testimonial hooks appear in ${s.ugcTestimonialPct}% of the ${s.totalVids} analysed competitor ads. ${s.ugcPct}% use UGC or talking-head formats. This means UGC is table stakes, but most of it looks the same. These briefs exploit specific gaps: female creators (the competitive set is overwhelmingly male-presenting), taste-led content (only ${s.tastePct}% of ads sell on taste), non-gym audiences (professionals, parents, students), and format novelty (duo, diary, explainer). Each concept has 3 variations so you can A/B/C test creator types, angles, or talking points.</p>
    </div>

    <!-- CONCEPT 1 -->
    ${conceptCard(1, 'Female Fitness Creator: "My Week on [Brand]"',
      'A 7-day diary format showing a different meal each day alongside gym/activity clips. The competitive set is overwhelmingly male-presenting creators. Female fitness is the single biggest audience whitespace.',
      ['hook','body','cta'], 'P1',

          talkingPoints: ['Focus on convenience and ingredient quality, NOT macros', '"The ingredients are actually clean"', 'Compare to previous meal prep attempts that failed'],
          cta: 'Discount code + "I\'ll leave the link"'

        { label: 'Variation C', title: 'Running/outdoor fitness creator',
          creator: 'Female, 28 to 38, running/cycling/outdoor fitness. Active lifestyle aesthetic.',
          hook: '"I run 40 miles a week and this is how I fuel it without spending hours cooking."',
          shots: ['Pre-run morning routine: grab container from fridge, eat, go', 'Running clip + "I used to bonk by mile 8 because I ate rubbish"', 'Post-run: eating at kitchen counter, sweaty and genuine', 'End of week: "my recovery has been noticeably better"'],

          cta: 'Code + "honestly just try it for a week"'

    <!-- CONCEPT 2 -->
    ${conceptCard(2, 'Busy Professional: "How I Save 5 Hours a Week"',
      'Before/after format. Show the old routine (takeaway receipts, sad desk lunches, late-night cooking) vs the new one (clean meals ready, evenings free). Numbers-led hook that broadens appeal beyond fitness.',
      ['hook','proof'], 'P1',

      [

function conceptCard(num, title, subtitle, types, priority, evidence, duration, format, variations) {
  const tagMap = { hook:'tag-hook', body:'tag-body', proof:'tag-proof', cta:'tag-cta' };
  const priClass = priority === 'P1' ? 'p1' : priority === 'P2' ? 'p2' : 'p3';
  const priLabel = priority === 'P1' ? 'P1 / Top Priority' : priority === 'P2' ? 'P2 / Should Have' : 'P3 / Nice to Have';

  return `<div class="concept">
    <div class="concept-header" style="background:${priority === 'P1' ? 'var(--accent-light)' : priority === 'P2' ? 'var(--blue-light)' : 'var(--surface-alt)'}">
      <div class="concept-num">${String(num).padStart(2, '0')}</div>
      <div class="concept-title-area">
        <div class="concept-title">${title}</div>
        <div class="concept-subtitle">${subtitle}</div>
        <div class="concept-tags">${types.map(t => `<span class="tag ${tagMap[t] || ''}">${t}</span>`).join('')}</div>
      </div>
      <span class="concept-priority ${priClass}">${priLabel}</span>
    </div>

    <div class="concept-brief">
      <div class="brief-label">Competitive Evidence</div>
      <div class="brief-text">${evidence}</div>
    </div>

    <div class="variations">
      <div class="variations-title">3 Creator Variations</div>
      <div class="var-grid">
        ${variations.map(v => `
          <div class="var-card">
            <div class="var-card-label">${v.label}</div>
            <h4>${v.title}</h4>
            <div class="var-section">
              <div class="var-section-title">Creator Profile</div>
              <p>${v.creator}</p>
            </div>
            <div class="var-section">
              <div class="var-section-title">Opening Hook</div>
              <p><em>${v.hook}</em></p>
            </div>
            <div class="var-section">
              <div class="var-section-title">Shot Sequence</div>
              <ul>${v.shots.map(s => `<li>${s}</li>`).join('')}</ul>
            </div>
            <div class="var-section">
              <div class="var-section-title">Key Talking Points</div>
              <ul>${v.talkingPoints.map(t => `<li>${t}</li>`).join('')}</ul>
            </div>
            <div class="var-section">
              <div class="var-section-title">CTA</div>
              <p>${v.cta}</p>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="concept-footer">
      <div class="concept-footer-item"><label>Duration</label><span>${duration}</span></div>
      <div class="concept-footer-item"><label>Format</label><span>${format}</span></div>
      <div class="concept-footer-item"><label>Variations</label><span>3 (A/B/C test)</span></div>
    </div>
  </div>`;
}
