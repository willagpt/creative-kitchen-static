<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Kitchen — Ad Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 200px;
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #f97316;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .header-text p {
      font-size: 11px;
      color: #a1a1aa;
    }

    .section {
      padding: 16px;
      border-bottom: 1px solid #27272a;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a1a1aa;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #a1a1aa;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }

    input:focus {
      border-color: #f97316;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #f97316;
      color: #fff;
    }
    .btn-primary:hover { background: #ea580c; }

    .btn-secondary {
      background: #27272a;
      color: #fff;
    }
    .btn-secondary:hover { background: #3f3f46; }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 10px;
    }

    .status-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .status-info {
      background: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.3);
      color: #f97316;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #f97316;
    }

    .stat-label {
      font-size: 11px;
      color: #a1a1aa;
      margin-top: 2px;
    }

    .footer {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      color: #f97316;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }

    .footer a:hover { text-decoration: underline; }

    #gallery-link {
      cursor: pointer;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🍳</div>
    <div class="header-text">
      <h1>Creative Kitchen</h1>
      <p>Ad Capture, Prompt &amp; Image Generator</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="section" id="stats-section">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="total-ads">—</div>
        <div class="stat-label">Ads Saved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-prompts">—</div>
        <div class="stat-label">Prompts Generated</div>
      </div>
    </div>
  </div>

  <!-- Supabase Configuration -->
  <div class="section">
    <div class="section-title">Supabase Connection</div>

    <label for="supabase-url">Project URL</label>
    <input type="text" id="supabase-url" placeholder="https://xxxxx.supabase.co" />

    <label for="supabase-key">Anon Key</label>
    <input type="password" id="supabase-key" placeholder="eyJhbGci..." />

    <div class="btn-row">
      <button class="btn btn-primary" id="save-config">Save</button>
      <button class="btn btn-secondary" id="test-connection">Test Connection</button>
    </div>

    <div id="connection-status" class="hidden"></div>
  </div>

  <!-- fal.ai Configuration -->
  <div class="section">
    <div class="section-title">fal.ai Image Generation</div>

    <label for="fal-key">API Key</label>
    <input type="password" id="fal-key" placeholder="fal_..." />

    <div class="btn-row">
      <button class="btn btn-primary" id="save-fal">Save</button>
    </div>

    <div id="fal-status" class="hidden"></div>
  </div>

  <!-- Actions -->
  <div class="footer">
    <a id="gallery-link">Open Gallery →</a>
    <a href="https://creative-kitchen-static.vercel.app" target="_blank">Open App →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
