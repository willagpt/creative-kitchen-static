<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEFLY Prompt Tester</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0D0D0D;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #FFF6EE;
    --text-dim: #9A918A;
    --orange: #FF6B2C;
    --yellow: #FFD60A;
    --green: #A8E10C;
    --blush: #FF8FA3;
    --sky: #5CCFFF;
    --cream: #FFF6EE;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--orange); }

  .header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-row input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    width: 260px;
  }

  .api-row .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
  }

  .api-row .dot.active { background: var(--green); }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    height: calc(100vh - 120px);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  select, .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  select:hover, .btn:hover { border-color: #555; }

  .btn-generate {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
    font-weight: 600;
    padding: 8px 20px;
  }

  .btn-generate:hover { background: #e55a1f; }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
  }

  textarea:focus { outline: none; border-color: var(--orange); }

  .prompt-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .prompt-actions {
    display: flex;
    gap: 6px;
  }

  .result-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    min-height: 400px;
  }

  .result-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  .result-placeholder {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .result-placeholder .icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.3;
  }

  .result-overlay {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 6px;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .result-area:hover .result-overlay { opacity: 1; }

  .overlay-btn {
    background: rgba(13,13,13,0.8);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.15s;
  }

  .overlay-btn:hover { background: rgba(255,107,44,0.8); border-color: var(--orange); }

  .overlay-btn.fav { color: var(--yellow); }
  .overlay-btn.fav:hover { background: rgba(255,214,10,0.2); }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-bar .timer { font-variant-numeric: tabular-nums; }

  .history {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .history-thumb {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: 0.6;
    transition: all 0.15s;
    position: relative;
  }

  .history-thumb:hover { opacity: 1; }
  .history-thumb.active { border-color: var(--orange); opacity: 1; }
  .history-thumb.favourite { border-color: var(--yellow); opacity: 0.9; }
  .history-thumb.active.favourite { border-color: var(--yellow); opacity: 1; }
  .history-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .fav-star {
    position: absolute;
    top: 1px;
    right: 1px;
    font-size: 8px;
    color: var(--yellow);
    text-shadow: 0 0 3px rgba(0,0,0,0.8);
  }

  .history-detail {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 11px;
    line-height: 1.5;
  }

  .history-detail.hidden { display: none; }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .detail-label {
    color: var(--orange);
    font-weight: 600;
    font-size: 11px;
  }

  .detail-actions {
    display: flex;
    gap: 6px;
  }

  .detail-prompt {
    color: var(--text-dim);
    max-height: 80px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .presets {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover { color: var(--text); border-color: var(--orange); }
  .preset-btn.saved { border-color: var(--green); color: var(--green); }
  .preset-btn.custom { border-style: dashed; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .generating { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>CHEFLY</span> prompt tester</h1>
    <div class="subtitle">test prompts against fal.ai models — iterate fast, waste nothing</div>
  </div>
  <div class="api-row">
    <div class="dot" id="apiDot"></div>
    <input type="password" id="apiKey" placeholder="fal.ai API key" />
  </div>
</div>

<div class="main">
  <!-- Left: Prompt -->
  <div class="panel">
    <div class="panel-title">prompt</div>

    <div class="presets" id="presets"></div>

    <div class="controls">
      <select id="modelSelect">
        <option value="fal-ai/nano-banana-2">nano banana 2 (default)</option>
        <option value="fal-ai/nano-banana-pro">nano banana pro (older)</option>
        <option value="fal-ai/flux-2-pro">flux 2 pro (current gen)</option>
        <option value="fal-ai/flux-pro/v1.1-ultra">flux pro v1.1 ultra</option>
        <option value="fal-ai/flux/schnell">flux schnell (fast/cheap)</option>
      </select>
      <select id="ratioSelect">
        <option value="1:1">1:1</option>
        <option value="4:5">4:5</option>
        <option value="9:16">9:16</option>
        <option value="16:9">16:9</option>
        <option value="3:2">3:2</option>
        <option value="2:3">2:3</option>
      </select>
      <select id="resSelect">
        <option value="1K">1K</option>
        <option value="512px">512px (fast draft)</option>
        <option value="2K">2K</option>
        <option value="4K">4K</option>
      </select>
      <button class="btn btn-generate" id="genBtn" onclick="generate()">generate</button>
    </div>

    <textarea id="promptInput" placeholder="Write your prompt here..."></textarea>

    <div class="prompt-meta">
      <span><span id="charCount">0 chars</span> · <span id="tokenEst">~0 tokens</span></span>
      <div class="prompt-actions">
        <button class="preset-btn" onclick="saveCustomPreset()" title="Save current prompt as a reusable preset">+ save prompt</button>
      </div>
    </div>
  </div>

  <!-- Right: Result -->
  <div class="panel">
    <div class="panel-title">result</div>

    <div class="result-area" id="resultArea">
      <div class="result-placeholder" id="placeholder">
        <div class="icon">&#x1f3a8;</div>
        <div>paste a prompt and hit generate</div>
        <div style="margin-top:4px;font-size:11px">tip: start at 512px to iterate fast, then upscale winners</div>
      </div>
      <div class="result-overlay" id="resultOverlay">
        <button class="overlay-btn" onclick="downloadCurrent()" title="Download this image">&#x2B07; download</button>
        <button class="overlay-btn fav" onclick="toggleFavCurrent()" id="favBtn" title="Favourite this generation">&#x2606; fave</button>
      </div>
    </div>

    <div class="status-bar">
      <span id="statusText">ready</span>
      <span class="timer" id="timer"></span>
    </div>

    <div class="history-detail hidden" id="historyDetail">
      <div class="detail-header">
        <span class="detail-label" id="detailLabel">—</span>
        <div class="detail-actions">
          <button class="preset-btn" onclick="downloadFromHistory()" title="Download this image">&#x2B07; download</button>
          <button class="preset-btn" onclick="loadFromHistory()" title="Load this prompt back into the editor">&#x2191; load prompt</button>
        </div>
      </div>
      <div class="detail-prompt" id="detailPrompt"></div>
    </div>

    <div id="historyLabel" style="font-size:10px;color:var(--text-dim);margin-top:12px;display:none;justify-content:space-between;align-items:center">
      <span>generation history — click to compare · <span id="historyCount">0</span> saved</span>
      <div style="display:flex;gap:6px">
        <button class="preset-btn" onclick="exportHistory()" title="Export all history as JSON backup">export</button>
        <button class="preset-btn" onclick="clearHistory()" style="color:#FF8FA3">clear all</button>
      </div>
    </div>
    <div class="history" id="history"></div>
  </div>
</div>

<script>

  { name: 'Benefit grid (cream)', prompt: 'A clean, modern 1:1 social media ad for a UK meal delivery brand called "Chefly". Warm cream background (#FFF6EE) with subtle paper grain texture. The layout mirrors a product-in-context format. Top: Bold lowercase headline in heavy sans-serif (like Syne Extra Bold), black text reading "dinner sorted." on the first line, "every night." on the second line \u2014 the word "night." is in an elegant serif italic (like Instrument Serif Italic). Full stop at the end of both lines. Text is centre-aligned. Centre: A tightly cropped, edge-to-edge overhead photograph of a natural cream-coloured sugarcane fibre meal tray sitting on a wooden chopping board at a slight angle. The chopping board fills the full width of the middle section. NOT a black plastic container, NOT divided into compartments. The tray is rectangular with rounded corners, shallow sides, no internal dividers. Inside the tray, all in one open space: a glazed sesame chicken thigh with sesame seeds, dark purple-black rice, bright green edamame beans, wilted spinach, and thin julienned orange carrot strips. The food is colourful and appetising. Natural warm daylight, wooden board texture visible. No cutlery, no napkin, no hands. Around the tray: Four benefit callouts arranged in pairs (two above the photograph, two below), each with a small coloured dot icon and lowercase bold label: "chef-prepared" (orange dot #FF6B2C), "ready in 5 min" (green dot #A8E10C), "fresh ingredients" (yellow dot #FFD60A), "no washing up" (blue dot #5CCFFF). Thin subtle dashed lines connect each callout toward the tray. Below: A small black pill badge with cream text reading "25% off your first box", and below that a rounded orange (#FF6B2C) CTA button with white lowercase text "see this week\'s menu." Bottom: "chefly" logo \u2014 "chef" in bold black sans-serif, "ly" in serif italic, small \u00ae superscript. All lowercase. Style: Minimal, premium, editorial. The photograph must feel like a r // === Custom Presets (saved to localStorage) ===
function getCustomPresets() {
  try {
    return JSON.parse(localStorage.getItem('ck_custom_presets') || '[]');
  } catch (e) { return []; }
}

function saveCustomPresets(presets) {
  localStorage.setItem('ck_custom_presets', JSON.stringify(presets));
}

function saveCustomPreset() {
  const prompt = promptInput.value.trim();
  if (!prompt) { alert('Write a prompt first'); return; }
  const name = window.prompt('Name this preset:');
  if (!name) return;
  const customs = getCustomPresets();
  customs.push({ name, prompt });
  saveCustomPresets(customs);
  renderPresets();
}

function deleteCustomPreset(idx) {
  if (!confirm('Delete this saved preset?')) return;
  const customs = getCustomPresets();
  customs.splice(idx, 1);
  saveCustomPresets(customs);
  renderPresets();
}

function renderPresets() {
  presetsEl.innerHTML = '';
  // Built-in
  BUILT_IN_PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.name;
    btn.onclick = () => { promptInput.value = p.prompt; updateCounts(); };
    presetsEl.appendChild(btn);
  });
  // Custom
  const customs = getCustomPresets();
  customs.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn custom';
    btn.textContent = p.name;
    btn.onclick = () => { promptInput.value = p.prompt; updateCounts(); };
    btn.oncontextmenu = (e) => { e.preventDefault(); deleteCustomPreset(i); };
    btn.title = p.name + ' (right-click to delete)';
    presetsEl.appendChild(btn);
  });
}

// Init
const apiKeyInput = document.getElementById('apiKey');
const apiDot = document.getElementById('apiDot');
const promptInput = document.getElementById('promptInput');
const charCount = document.getElementById('charCount');
const tokenEst = document.getElementById('tokenEst');
const presetsEl = document.getElementById('presets');

// Load API key from localStorage
const savedKey = localStorage.getItem('ck_fal_api_key');
if (savedKey) {
  apiKeyInput.value = savedKey;
  apiDot.classList.add('active');
}

apiKeyInput.addEventListener('input', () => {
  const key = apiKeyInput.value.trim();
  localStorage.setItem('ck_fal_api_key', key);
  apiDot.classList.toggle('active', !!key);
});

// Char count
function updateCounts() {
  const len = promptInput.value.length;
  charCount.textContent = len + ' chars';
  tokenEst.textContent = '~' + Math.round(len / 4) + ' tokens';
}
promptInput.addEventListener('input', updateCounts);
updateCounts();

// Render presets
renderPresets();

// Load last used prompt from localStorage
const lastPrompt = localStorage.getItem('ck_last_prompt');
if (lastPrompt) {
  promptInput.value = lastPrompt;
  updateCounts();
}

// Auto-save prompt as you type
promptInput.addEventListener('input', () => {
  localStorage.setItem('ck_last_prompt', promptInput.value);
});

// Also save model/ratio/res selections
const lastModel = localStorage.getItem('ck_last_model');
const lastRatio = localStorage.getItem('ck_last_ratio');
const lastRes = localStorage.getItem('ck_last_res');
if (lastModel) document.getElementById('modelSelect').value = lastModel;
if (lastRatio) document.getElementById('ratioSelect').value = lastRatio;
if (lastRes) document.getElementById('resSelect').value = lastRes;

document.getElementById('modelSelect').addEventListener('change', (e) => localStorage.setItem('ck_last_model', e.target.value));
document.getElementById('ratioSelect').addEventListener('change', (e) => localStorage.setItem('ck_last_ratio', e.target.value));
document.getElementById('resSelect').addEventListener('change', (e) => localStorage.setItem('ck_last_res', e.target.value));

// === IndexedDB persistence — images survive reloads ===
const DB_NAME = 'ck_prompt_tester';
const DB_VERSION = 1;
const STORE_NAME = 'generations';
const MAX_SAVED = 100;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToDB(item) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(item);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadAllFromDB() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result.sort((a, b) => b.id - a.id));
    req.onerror = () => reject(req.error);
  });
}

async function deleteFromDB(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function imageUrlToDataUrl(url) {
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn('Could not cache image:', e);
    return url;
  }
}

// === Download ===
function downloadImage(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename || 'chefly-gen-' + Date.now() + '.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function downloadCurrent() {
  const item = history.find(h => h.id === selectedHistoryId);
  if (!item) return;
  const modelName = item.model.split('/').pop();
  const filename = 'chefly-' + modelName + '-' + item.ratio.replace(':', 'x') + '-' + item.id + '.png';
  downloadImage(item.dataUrl || item.url, filename);
}

function downloadFromHistory() {
  downloadCurrent();
}

// === Favourites ===
function toggleFavCurrent() {
  const item = history.find(h => h.id === selectedHistoryId);
  if (!item) return;
  item.favourite = !item.favourite;
  saveToDB(item);
  renderHistory();
  updateFavBtn(item);
}

function updateFavBtn(item) {
  const btn = document.getElementById('favBtn');
  if (item && item.favourite) {
    btn.innerHTML = '&#x2605; faved';
  } else {
    btn.innerHTML = '&#x2606; fave';
  }
}

// Generation history
let history = [];
let timerInterval = null;
let selectedHistoryId = null;

// Restore history on page load
(async function restoreHistory() {
  try {
    const saved = await loadAllFromDB();
    if (saved.length > 0) {
      history = saved;
      selectedHistoryId = history[0].id;
      renderHistory();
      showHistoryDetail(history[0]);
      updateFavBtn(history[0]);
      const placeholder = document.getElementById('placeholder');
      if (placeholder) placeholder.remove();
      document.getElementById('resultArea').querySelector('.result-overlay').style.display = '';
      const img = document.createElement('img');
      img.src = history[0].dataUrl || history[0].url;
      img.alt = 'Generated image';
      document.getElementById('resultArea').insertBefore(img, document.getElementById('resultOverlay'));
      document.getElementById('statusText').textContent = history[0].model.split('/').pop() + ' \u00b7 ' + history[0].ratio + ' \u00b7 ' + history[0].resolution + ' \u00b7 ' + history[0].time + 's \u00b7 restored';
    }
  } catch (e) {
    console.warn('Could not restore history:', e);
  }
})();

async function generate() {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { alert('Enter your fal.ai API key first'); return; }

  const prompt = promptInput.value.trim();
  if (!prompt) { alert('Enter a prompt'); return; }

  const model = document.getElementById('modelSelect').value;
  const ratio = document.getElementById('ratioSelect').value;
  const resolution = document.getElementById('resSelect').value;

  const btn = document.getElementById('genBtn');
  const statusText = document.getElementById('statusText');
  const timerEl = document.getElementById('timer');
  const resultArea = document.getElementById('resultArea');

  btn.disabled = true;
  btn.textContent = 'generating\u2026';
  statusText.textContent = 'submitting to ' + model + '\u2026';
  statusText.classList.add('generating');

  const startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    timerEl.textContent = elapsed + 's';
  }, 100);

  const headers = {
    'Authorization': 'Key ' + apiKey,
    'Content-Type': 'application/json'
  };

  try {
    const isFlux = model.includes('flux');
    const fluxSizeMap = {
      '1:1': 'square_hd',
      '4:5': { width: 1080, height: 1350 },
      '9:16': 'portrait_16_9',
      '16:9': 'landscape_16_9',
      '3:2': 'landscape_4_3',
      '2:3': 'portrait_4_3'
    };
    const body = { prompt, num_images: 1 };
    if (isFlux) {
      body.image_size = fluxSizeMap[ratio] || 'square_hd';
    } else {
      const validRes = (resolution === '512px') ? '1K' : resolution;
      if (resolution === '512px') {
        statusText.textContent = '512px not supported by ' + model.split('/').pop() + ' \u2014 using 1K\u2026';
      }
      body.aspect_ratio = ratio;
      body.resolution = validRes;
    }

    const submitResp = await fetch('https://queue.fal.run/' + model, {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });

    if (!submitResp.ok) throw new Error('Submit error: ' + submitResp.status);
    const submitData = await submitResp.json();

    let imageUrl = submitData.images?.[0]?.url || submitData.output?.images?.[0]?.url;

    if (!imageUrl) {
      const requestId = submitData.request_id;
      if (!requestId) throw new Error('No request_id returned');

      const statusUrl = 'https://queue.fal.run/' + model + '/requests/' + requestId + '/status';
      const resultUrl = 'https://queue.fal.run/' + model + '/requests/' + requestId;

      statusText.textContent = 'queued\u2026';
      const maxWait = 180000;
      while (Date.now() - startTime < maxWait) {
        await new Promise(r => setTimeout(r, 1500));
        const pollResp = await fetch(statusUrl, { headers: { 'Authorization': 'Key ' + apiKey } });
        if (!pollResp.ok) throw new Error('Poll error: ' + pollResp.status);
        const pollData = await pollResp.json();
        const elapsed = Math.round((Date.now() - startTime) / 1000);

        if (pollData.status === 'COMPLETED') {
          statusText.textContent = 'downloading\u2026';
          const resultResp = await fetch(resultUrl, { headers: { 'Authorization': 'Key ' + apiKey } });
          if (!resultResp.ok) throw new Error('Result error: ' + resultResp.status);
          const resultData = await resultResp.json();
          imageUrl = resultData.images?.[0]?.url || resultData.output?.images?.[0]?.url;
          break;
        } else if (pollData.status === 'FAILED') {
          throw new Error('Generation failed: ' + (pollData.error || 'unknown'));
        } else {
          statusText.textContent = pollData.status.toLowerCase().replace('_', ' ') + '\u2026 ' + elapsed + 's';
        }
      }

      if (!imageUrl) throw new Error('Timed out after 3 minutes');
    }

    clearInterval(timerInterval);
    const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
    timerEl.textContent = totalTime + 's';

    const placeholder = document.getElementById('placeholder');
    if (placeholder) placeholder.remove();

    // Remove old image if any
    const oldImg = resultArea.querySelector('img');
    if (oldImg) oldImg.remove();
    const img = document.createElement('img');
    img.src = imageUrl;
    img.alt = 'Generated image';
    resultArea.insertBefore(img, document.getElementById('resultOverlay'));

    statusText.textContent = model.split('/').pop() + ' \u00b7 ' + ratio + ' \u00b7 ' + resolution + ' \u00b7 ' + totalTime + 's';
    statusText.classList.remove('generating');

    statusText.textContent += ' \u00b7 saving\u2026';
    const dataUrl = await imageUrlToDataUrl(imageUrl);

    const entry = { url: imageUrl, dataUrl, model, ratio, resolution, time: totalTime, prompt: prompt, id: Date.now(), favourite: false };
    history.unshift(entry);
    selectedHistoryId = history[0].id;
    updateFavBtn(entry);

    try {
      await saveToDB(entry);
      if (history.length > MAX_SAVED) {
        const old = history.splice(MAX_SAVED);
        for (const item of old) await deleteFromDB(item.id);
      }
    } catch (e) { console.warn('Could not persist:', e); }

    statusText.textContent = model.split('/').pop() + ' \u00b7 ' + ratio + ' \u00b7 ' + resolution + ' \u00b7 ' + totalTime + 's \u00b7 saved';
    renderHistory();
    showHistoryDetail(history[0]);

  } catch (err) {
    clearInterval(timerInterval);
    statusText.textContent = 'error: ' + err.message;
    statusText.classList.remove('generating');
  }

  btn.disabled = false;
  btn.textContent = 'generate';
}

function renderHistory() {
  const container = document.getElementById('history');
  const label = document.getElementById('historyLabel');
  container.innerHTML = '';
  if (history.length > 0) {
    label.style.display = 'flex';
    document.getElementById('historyCount').textContent = history.length;
  }

  history.forEach((item, i) => {
    const imgSrc = item.dataUrl || item.url;
    const thumb = document.createElement('div');
    thumb.className = 'history-thumb' + (item.id === selectedHistoryId ? ' active' : '') + (item.favourite ? ' favourite' : '');
    thumb.innerHTML = '<img src="' + imgSrc + '" />' + (item.favourite ? '<span class="fav-star">\u2605</span>' : '');
    thumb.title = '#' + (history.length - i) + ' \u00b7 ' + item.model.split('/').pop() + ' \u00b7 ' + item.ratio + ' \u00b7 ' + item.time + 's' + (item.favourite ? ' \u2605' : '');
    thumb.onclick = () => {
      selectedHistoryId = item.id;
      const oldImg = document.getElementById('resultArea').querySelector('img');
      if (oldImg) oldImg.remove();
      const placeholder = document.getElementById('placeholder');
      if (placeholder) placeholder.remove();
      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = 'Generated image';
      document.getElementById('resultArea').insertBefore(img, document.getElementById('resultOverlay'));
      document.getElementById('statusText').textContent = item.model.split('/').pop() + ' \u00b7 ' + item.ratio + ' \u00b7 ' + item.resolution + ' \u00b7 ' + item.time + 's';
      document.querySelectorAll('.history-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      showHistoryDetail(item);
      updateFavBtn(item);
    };
    container.appendChild(thumb);
  });
}

function showHistoryDetail(item) {
  const panel = document.getElementById('historyDetail');
  const label = document.getElementById('detailLabel');
  const promptEl = document.getElementById('detailPrompt');

  const modelName = item.model.split('/').pop();
  const idx = history.length - history.findIndex(h => h.id === item.id);
  label.textContent = '#' + idx + ' \u00b7 ' + modelName + ' \u00b7 ' + item.ratio + ' \u00b7 ' + item.resolution + ' \u00b7 ' + item.time + 's' + (item.favourite ? ' \u2605' : '');
  promptEl.textContent = item.prompt;
  panel.classList.remove('hidden');
}

function loadFromHistory() {
  const item = history.find(h => h.id === selectedHistoryId);
  if (!item) return;
  promptInput.value = item.prompt;
  document.getElementById('modelSelect').value = item.model;
  document.getElementById('ratioSelect').value = item.ratio;
  document.getElementById('resSelect').value = item.resolution;
  updateCounts();
  localStorage.setItem('ck_last_prompt', item.prompt);
}

// === Export history as JSON (backup) ===
function exportHistory() {
  const exportData = history.map(h => ({
    id: h.id,
    model: h.model,
    ratio: h.ratio,
    resolution: h.resolution,
    time: h.time,
    prompt: h.prompt,
    favourite: h.favourite || false,
    dataUrl: h.dataUrl
  }));
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chefly-prompt-tester-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function clearHistory() {
  if (!confirm('Delete all saved generations? This cannot be undone.')) return;
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).clear();
    await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
  } catch (e) { console.warn('Could not clear DB:', e); }
  history = [];
  selectedHistoryId = null;
  document.getElementById('history').innerHTML = '';
  document.getElementById('historyLabel').style.display = 'none';
  document.getElementById('historyDetail').classList.add('hidden');
  document.getElementById('resultArea').innerHTML = '<div class="result-placeholder" id="placeholder"><div class="icon">&#x1f3a8;</div><div>paste a prompt and hit generate</div></div><div class="result-overlay" id="resultOverlay"><button class="overlay-btn" onclick="downloadCurrent()" title="Download this image">&#x2B07; download</button><button class="overlay-btn fav" onclick="toggleFavCurrent()" id="favBtn" title="Favourite this generation">&#x2606; fave</button></div>';
  document.getElementById('statusText').textContent = 'history cleared';
}
</script>
