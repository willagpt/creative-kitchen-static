name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history so `git diff` against the previous main tip
          # works for both squash merges and merge commits. Default shallow
          # clone (fetch-depth: 1) caused the diff to return nothing and every
          # function deploy was silently skipped (see debug-auth v6 incident).
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Compute deploy range
        id: range
        run: |
          # github.event.before is the main tip before this push. It is zero
          # (0000...) for the very first push to a fresh repo, in which case
          # we fall back to HEAD~1.
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "Diff range: $BEFORE -> ${{ github.sha }}"

      - name: Deploy changed functions
        run: |
          set -euo pipefail
          BEFORE="${{ steps.range.outputs.before }}"
          AFTER="${{ steps.range.outputs.after }}"

          if [ -z "$BEFORE" ]; then
            echo "No prior commit to diff against, skipping."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- 'supabase/functions/**' || true)

          if [ -z "$CHANGED" ]; then
            echo "No edge function changes detected."
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          FUNCTIONS=$(echo "$CHANGED" | awk -F'/' '{print $3}' | sort -u | grep -v '^$')

          if [ -z "$FUNCTIONS" ]; then
            echo "Changed files did not resolve to any function slugs."
            exit 0
          fi

          echo "Deploying functions:"
          echo "$FUNCTIONS"

          for func in $FUNCTIONS; do
            echo "::group::Deploy $func"
            supabase functions deploy "$func" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            echo "::endgroup::"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
