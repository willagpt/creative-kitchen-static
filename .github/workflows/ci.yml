name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ifrxylvoufncdxyltgqt.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-for-ci-build-check
