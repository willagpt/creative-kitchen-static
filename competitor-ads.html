<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>competitor ads. — creative kitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: rgb(13, 13, 13);
            color: rgb(255, 246, 238);
            font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Navigation */
        nav {
            background-color: rgb(22, 20, 18);
            border-bottom: 1px solid rgb(255, 214, 10);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .nav-logo {
            font-weight: 700;
            font-size: 18px;
            color: rgb(255, 214, 10);
        }

        .nav-title {
            font-weight: 500;
            font-size: 14px;
            color: rgb(255, 246, 238);
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            font-size: 14px;
            font-weight: 500;
            color: rgb(154, 145, 138);
            padding: 8px 12px;
            border-radius: 6px;
            background-color: transparent;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .nav-tab:hover {
            color: rgb(255, 214, 10);
            background-color: rgba(255, 214, 10, 0.05);
        }

        .nav-tab.active {
            font-weight: 700;
            color: rgb(255, 214, 10);
            background-color: rgba(255, 214, 10, 0.1);
            border-bottom: 1px solid rgb(255, 214, 10);
        }

        /* Main content */
        main {
            padding: 40px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: rgb(255, 246, 238);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            font-weight: 400;
            color: rgb(154, 145, 138);
        }

        /* API Key Section */
        .api-section {
            margin-bottom: 32px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .input-group {
            flex: 1;
            max-width: 300px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgb(154, 145, 138);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="password"],
        input[type="text"],
        input[type="date"],
        select {
            background-color: rgb(22, 20, 18);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: rgb(255, 246, 238);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 13px;
            width: 100%;
            transition: border-color 0.2s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: rgb(255, 214, 10);
            background-color: rgba(255, 214, 10, 0.02);
        }

        input[type="password"]::placeholder,
        input[type="text"]::placeholder {
            color: rgb(107, 114, 128);
        }

        input[type="date"] {
            color-scheme: dark;
        }

        .status-indicator {
            position: absolute;
            right: 10px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgb(107, 114, 128);
            transition: background-color 0.2s ease;
        }

        .status-indicator.valid {
            background-color: #22c55e;
        }

        .status-indicator.invalid {
            background-color: #ef4444;
        }

        input[type="password"].has-indicator {
            padding-right: 32px;
        }

        /* Search Bar */
        .search-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-input-wrapper {
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgb(22, 20, 18);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: rgb(255, 246, 238);
            font-size: 14px;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: rgb(255, 214, 10);
            background-color: rgba(255, 214, 10, 0.02);
        }

        .search-button {
            padding: 10px 20px;
            background-color: rgb(255, 107, 44);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        .search-button:hover {
            background-color: rgb(230, 80, 20);
        }

        .search-button:disabled {
            background-color: rgb(107, 114, 128);
            cursor: not-allowed;
        }

        /* Filters Row */
        .filters-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: rgb(154, 145, 138);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pill-button {
            font-size: 12px;
            background-color: rgba(255, 214, 10, 0.1);
            color: rgb(255, 214, 10);
            border: 1.5px solid rgb(255, 214, 10);
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .pill-button:hover {
            background-color: rgba(255, 214, 10, 0.2);
        }

        .pill-button.active {
            background-color: rgb(255, 214, 10);
            color: rgb(13, 13, 13);
        }

        .date-range-inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .date-range-inputs input {
            width: 140px;
        }

        .date-separator {
            color: rgb(154, 145, 138);
            font-size: 12px;
        }

        select {
            min-width: 140px;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            align-items: center;
        }

        .stat-badge {
            font-size: 9px;
            font-weight: 700;
            background-color: rgba(107, 114, 128, 0.15);
            color: rgb(156, 163, 175);
            padding: 3px 10px;
            border-radius: 4px;
            white-space: nowrap;
        }

        /* Results Grid */
        .results-container {
            margin-bottom: 40px;
        }

        .state-message {
            text-align: center;
            padding: 60px 24px;
            color: rgb(154, 145, 138);
            font-size: 16px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        @media (max-width: 1024px) {
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .ad-card {
            background-color: rgb(22, 20, 18);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .ad-card:hover {
            border-color: rgba(255, 214, 10, 0.3);
        }

        .ad-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1.2;
            background-color: rgb(13, 13, 13);
            overflow: hidden;
        }

        .ad-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-image-frame {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        .ad-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(154, 145, 138);
            font-size: 12px;
        }

        .ad-save-button {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(13, 13, 13, 0.7);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .ad-save-button:hover {
            background-color: rgba(13, 13, 13, 0.9);
        }

        .ad-save-button.saved {
            background-color: rgb(255, 107, 44);
        }

        .ad-save-icon {
            font-size: 18px;
            color: rgb(255, 246, 238);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-save-button.saved .ad-save-icon {
            color: white;
        }

        .ad-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .ad-brand-name {
            font-weight: 600;
            font-size: 13px;
            color: rgb(255, 246, 238);
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ad-meta {
            font-size: 11px;
            color: rgb(154, 145, 138);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .ad-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .ad-platforms {
            display: flex;
            gap: 4px;
        }

        .platform-icon {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            color: rgb(154, 145, 138);
        }

        .ad-body-preview {
            font-size: 11px;
            color: rgb(154, 145, 138);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .ad-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .ad-view-link {
            font-size: 10px;
            color: rgb(255, 214, 10);
            text-decoration: none;
            font-weight: 500;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .ad-view-link:hover {
            opacity: 1;
        }

        /* Saved Section */
        .saved-section {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 40px;
        }

        .saved-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            cursor: pointer;
            user-select: none;
        }

        .saved-title {
            font-size: 18px;
            font-weight: 600;
            color: rgb(255, 246, 238);
        }

        .toggle-arrow {
            display: inline-block;
            transition: transform 0.2s ease;
            font-size: 12px;
            color: rgb(154, 145, 138);
        }

        .toggle-arrow.collapsed {
            transform: rotate(-90deg);
        }

        .saved-content {
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .saved-content.collapsed {
            max-height: 0;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 214, 10, 0.2);
            border-top-color: rgb(255, 214, 10);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Utility */
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                gap: 16px;
            }

            .filters-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .date-range-inputs {
                width: 100%;
                flex-direction: column;
            }

            .date-range-inputs input {
                width: 100%;
            }

            .date-separator {
                display: none;
            }

            select {
                width: 100%;
            }

            main {
                padding: 24px 12px;
            }

            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-logo-container" onclick="window.location.href='competitor-ads.html'">
            <span class="nav-logo">CK</span>
            <span class="nav-title">creative kitchen</span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="window.location.href='competitor-ads.html'">competitor ads</button>
            <button class="nav-tab" onclick="window.location.href='ad-library.html'">ad library</button>
            <button class="nav-tab" onclick="window.location.href='brand-dna.html'">brand dna</button>
            <button class="nav-tab" onclick="window.location.href='photo-library.html'">photo library</button>
            <button class="nav-tab" onclick="window.location.href='generator.html'">generator</button>
            <button class="nav-tab" onclick="window.location.href='review.html'">review</button>
            <button class="nav-tab" onclick="window.location.href='launcher.html'">launcher</button>
            <button class="nav-tab" onclick="window.location.href='prompt-tester.html'">prompt tester</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Header -->
        <div class="header">
            <h1 class="page-title">competitor ads.</h1>
            <p class="page-subtitle">search meta ad library — find what's working, save what matters.</p>
        </div>

        <!-- API Key Input -->
        <div class="api-section">
            <div class="input-group">
                <label class="input-label">meta ad library access token</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="apiKey"
                        class="has-indicator"
                        placeholder="paste your token here"
                    >
                    <div class="status-indicator" id="statusIndicator"></div>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-input-wrapper">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="search by brand or page name..."
                    disabled
                >
            </div>
            <button class="search-button" id="searchButton" disabled>search</button>
        </div>

        <!-- Filters Row -->
        <div class="filters-row">
            <div class="filter-group">
                <span class="filter-label">format</span>
                <button class="pill-button active" data-format="all" onclick="updateFormatFilter(this)">all</button>
                <button class="pill-button" data-format="image" onclick="updateFormatFilter(this)">image</button>
                <button class="pill-button" data-format="video" onclick="updateFormatFilter(this)">video</button>
                <button class="pill-button" data-format="carousel" onclick="updateFormatFilter(this)">meme/carousel</button>
            </div>

            <div class="filter-group">
                <span class="filter-label">date range</span>
                <div class="date-range-inputs">
                    <input type="date" id="dateFrom" disabled>
                    <span class="date-separator">to</span>
                    <input type="date" id="dateTo" disabled>
                </div>
            </div>

            <div class="filter-group">
                <span class="filter-label">sort by</span>
                <select id="sortBy" disabled>
                    <option value="longest">days running (longest first)</option>
                    <option value="shortest">days running (shortest first)</option>
                    <option value="newest">newest first</option>
                    <option value="oldest">oldest first</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-label">country</span>
                <select id="countryFilter" disabled>
                    <option value="GB">gb</option>
                    <option value="US">us</option>
                    <option value="EU">eu</option>
                </select>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <span class="stat-badge" id="resultCount">0 ads found</span>
            <span class="stat-badge" id="savedCount">0 saved</span>
        </div>

        <!-- Results Container -->
        <div class="results-container">
            <div class="state-message" id="stateMessage">search for a brand to see their ads.</div>
            <div class="results-grid" id="resultsGrid" style="display: none;"></div>
        </div>

        <!-- Saved Section -->
        <div class="saved-section" id="savedSection" style="display: none;">
            <div class="saved-header" onclick="toggleSavedSection()">
                <h2 class="saved-title">saved ads</h2>
                <span class="toggle-arrow" id="toggleArrow">▼</span>
            </div>
            <div class="saved-content" id="savedContent">
                <div class="results-grid" id="savedGrid"></div>
            </div>
        </div>
    </main>

    <script>
        // State Management
        let state = {
            apiKey: localStorage.getItem('metaAdLibraryToken') || '',
            searchQuery: '',
            formatFilter: 'all',
            dateFrom: null,
            dateTo: null,
            sortBy: 'longest',
            country: 'GB',
            results: [],
            saved: JSON.parse(localStorage.getItem('savedAds') || '[]'),
            isLoading: false,
            savedSectionExpanded: true
        };

        // Initialize
        function init() {
            setupEventListeners();
            restoreApiKey();
            updateSavedCount();
        }

        // Event Listeners
        function setupEventListeners() {
            const apiKeyInput = document.getElementById('apiKey');
            const searchInput = document.getElementById('searchInput');
            const searchButton = document.getElementById('searchButton');

            apiKeyInput.addEventListener('input', handleApiKeyChange);
            apiKeyInput.addEventListener('blur', saveApiKey);

            searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            searchButton.addEventListener('click', performSearch);

            document.getElementById('dateFrom').addEventListener('change', (e) => {
                state.dateFrom = e.target.value;
            });

            document.getElementById('dateTo').addEventListener('change', (e) => {
                state.dateTo = e.target.value;
            });

            document.getElementById('sortBy').addEventListener('change', (e) => {
                state.sortBy = e.target.value;
                sortResults();
                renderResults();
            });

            document.getElementById('countryFilter').addEventListener('change', (e) => {
                state.country = e.target.value;
            });
        }

        function handleApiKeyChange(e) {
            const value = e.target.value.trim();
            state.apiKey = value;
            updateStatusIndicator(value.length > 20);
            updateInputStates(value.length > 0);
        }

        function saveApiKey() {
            if (state.apiKey.length > 20) {
                localStorage.setItem('metaAdLibraryToken', state.apiKey);
            }
        }

        function restoreApiKey() {
            if (state.apiKey) {
                document.getElementById('apiKey').value = state.apiKey;
                updateStatusIndicator(true);
                updateInputStates(true);
            }
        }

        function updateStatusIndicator(isValid) {
            const indicator = document.getElementById('statusIndicator');
            indicator.classList.toggle('valid', isValid);
            indicator.classList.toggle('invalid', !isValid && state.apiKey.length > 0);
        }

        function updateInputStates(enabled) {
            document.getElementById('searchInput').disabled = !enabled;
            document.getElementById('searchButton').disabled = !enabled;
            document.getElementById('dateFrom').disabled = !enabled;
            document.getElementById('dateTo').disabled = !enabled;
            document.getElementById('sortBy').disabled = !enabled;
            document.getElementById('countryFilter').disabled = !enabled;
        }

        function updateFormatFilter(button) {
            document.querySelectorAll('[data-format]').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            state.formatFilter = button.dataset.format;
        }

        function toggleSavedSection() {
            state.savedSectionExpanded = !state.savedSectionExpanded;
            const content = document.getElementById('savedContent');
            const arrow = document.getElementById('toggleArrow');

            content.classList.toggle('collapsed', !state.savedSectionExpanded);
            arrow.classList.toggle('collapsed', !state.savedSectionExpanded);
        }

        // Search and API
        async function performSearch() {
            if (!state.searchQuery.trim() || !state.apiKey) {
                return;
            }

            state.isLoading = true;
            showLoading();

            try {
                const params = new URLSearchParams({
                    access_token: state.apiKey,
                    search_terms: state.searchQuery,
                    ad_reached_countries: state.country,
                    ad_type: 'ALL',
                    fields: 'id,ad_creation_time,ad_creative_bodies,ad_creative_link_captions,ad_creative_link_titles,ad_delivery_start_time,ad_delivery_stop_time,ad_snapshot_url,bylines,impressions,page_id,page_name,publisher_platforms,estimated_audience_size',
                    limit: 50,
                    ad_active_status: 'ALL'
                });

                if (state.dateFrom) {
                    params.append('ad_delivery_date_min', state.dateFrom);
                }

                if (state.dateTo) {
                    params.append('ad_delivery_date_max', state.dateTo);
                }

                const response = await fetch(`https://graph.facebook.com/v19.0/ads_archive?${params}`);

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();

                if (data.data) {
                    state.results = processResults(data.data);
                    sortResults();
                    renderResults();
                } else {
                    showNoResults();
                }
            } catch (error) {
                console.error('Search error:', error);
                showError(error.message);
            } finally {
                state.isLoading = false;
            }
        }

        function processResults(rawResults) {
            return rawResults.map(ad => {
                const startTime = new Date(ad.ad_delivery_start_time);
                const endTime = ad.ad_delivery_stop_time ? new Date(ad.ad_delivery_stop_time) : new Date();
                const daysActive = Math.floor((endTime - startTime) / (1000 * 60 * 60 * 24));

                return {
                    id: ad.id,
                    pageName: ad.page_name || 'unknown',
                    pageId: ad.page_id,
                    image: ad.ad_snapshot_url || null,
                    startDate: startTime,
                    daysActive: Math.max(daysActive, 0),
                    platforms: ad.publisher_platforms || [],
                    impressions: ad.impressions || null,
                    isActive: !ad.ad_delivery_stop_time,
                    creativeBody: ad.ad_creative_bodies?.[0] || ''
                };
            });
        }

        function sortResults() {
            const sortBy = state.sortBy;

            state.results.sort((a, b) => {
                switch(sortBy) {
                    case 'longest':
                        return b.daysActive - a.daysActive;
                    case 'shortest':
                        return a.daysActive - b.daysActive;
                    case 'newest':
                        return b.startDate - a.startDate;
                    case 'oldest':
                        return a.startDate - b.startDate;
                    default:
                        return 0;
                }
            });
        }

        function filterResults(results) {
            return results.filter(ad => {
                if (state.formatFilter !== 'all') {
                    // Format filtering would depend on creative type detection
                    // For now, include all since API doesn't provide explicit format field
                }
                return true;
            });
        }

        function renderResults() {
            const filtered = filterResults(state.results);
            const container = document.getElementById('resultsGrid');
            const stateMessage = document.getElementById('stateMessage');
            const resultCount = document.getElementById('resultCount');

            if (filtered.length === 0) {
                container.style.display = 'none';
                stateMessage.style.display = 'block';
                stateMessage.textContent = 'no ads found for that search.';
                resultCount.textContent = '0 ads found';
                return;
            }

            container.innerHTML = filtered.map(ad => renderAdCard(ad)).join('');
            container.style.display = 'grid';
            stateMessage.style.display = 'none';
            resultCount.textContent = `${filtered.length} ads found`;

            // Attach event listeners to save buttons
            container.querySelectorAll('.ad-save-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleSaveAd(btn.dataset.adId, btn);
                });
            });
        }

        function renderAdCard(ad) {
            const isSaved = state.saved.some(s => s.id === ad.id);
            const saveButtonClass = isSaved ? 'saved' : '';

            let impressionBadge = '';
            if (ad.impressions) {
                impressionBadge = `<span class="stat-badge">${formatImpressions(ad.impressions)}</span>`;
            }

            return `
                <div class="ad-card">
                    <div class="ad-image-container">
                        ${ad.image ? `<iframe src="${ad.image}" class="ad-image-frame" sandbox="allow-scripts allow-same-origin" loading="lazy" title="ad preview"></iframe>` : '<div class="ad-image-placeholder">no preview available.</div>'}
                        <button class="ad-save-button ${saveButtonClass}" data-ad-id="${ad.id}" title="save ad">
                            <span class="ad-save-icon">${isSaved ? '\u2605' : '\u2606'}</span>
                        </button>
                    </div>
                    <div class="ad-content">
                        <div class="ad-brand-name">${escapeHtml(ad.pageName)}</div>
                        <div class="ad-meta">
                            ${ad.isActive ? 'running since ' : 'ran from '}${formatDate(ad.startDate)}<br>
                            ${ad.daysActive} days active
                        </div>
                        <div class="ad-badges">
                            <span class="stat-badge">${ad.daysActive}d</span>
                            ${impressionBadge}
                        </div>
                        ${ad.creativeBody ? `<div class="ad-body-preview">${escapeHtml(ad.creativeBody.substring(0, 80))}${ad.creativeBody.length > 80 ? '...' : ''}</div>` : ''}
                        <div class="ad-footer">
                            <div class="ad-platforms">
                                ${ad.platforms.includes('facebook') ? '<span class="platform-icon">f</span>' : ''}
                                ${ad.platforms.includes('instagram') ? '<span class="platform-icon">ig</span>' : ''}
                            </div>
                            ${ad.image ? `<a href="${ad.image}" target="_blank" rel="noopener" class="ad-view-link">view on meta \u2197</a>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleSaveAd(adId, button) {
            const ad = state.results.find(a => a.id === adId);
            if (!ad) return;

            const index = state.saved.findIndex(s => s.id === adId);

            if (index > -1) {
                state.saved.splice(index, 1);
                button.classList.remove('saved');
                button.querySelector('.ad-save-icon').textContent = '\u2606';
            } else {
                state.saved.push(ad);
                button.classList.add('saved');
                button.querySelector('.ad-save-icon').textContent = '\u2605';
            }

            localStorage.setItem('savedAds', JSON.stringify(state.saved));
            updateSavedCount();
            renderSavedAds();
        }

        function updateSavedCount() {
            const savedCount = document.getElementById('savedCount');
            const savedSection = document.getElementById('savedSection');

            savedCount.textContent = `${state.saved.length} saved`;

            if (state.saved.length > 0) {
                savedSection.style.display = 'block';
                renderSavedAds();
            } else {
                savedSection.style.display = 'none';
            }
        }

        function renderSavedAds() {
            const container = document.getElementById('savedGrid');
            if (state.saved.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = state.saved.map(ad => renderAdCard(ad)).join('');

            container.querySelectorAll('.ad-save-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleSaveAd(btn.dataset.adId, btn);
                    // Re-render main grid to update button states
                    renderResults();
                });
            });
        }

        // UI States
        function showLoading() {
            const stateMessage = document.getElementById('stateMessage');
            const container = document.getElementById('resultsGrid');

            container.style.display = 'none';
            stateMessage.style.display = 'block';
            stateMessage.innerHTML = '<div class="flex-center" style="gap: 12px;"><div class="spinner"></div><span>searching ads...</span></div>';
        }

        function showNoResults() {
            const stateMessage = document.getElementById('stateMessage');
            const container = document.getElementById('resultsGrid');

            container.style.display = 'none';
            stateMessage.style.display = 'block';
            stateMessage.textContent = 'no ads found for that search.';
            document.getElementById('resultCount').textContent = '0 ads found';
        }

        function showError(message) {
            const stateMessage = document.getElementById('stateMessage');
            const container = document.getElementById('resultsGrid');

            container.style.display = 'none';
            stateMessage.style.display = 'block';
            stateMessage.innerHTML = `<span style="color: #ef4444;">error: ${escapeHtml(message)}. check your api token and try again.</span>`;
        }

        // Utilities
        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function formatImpressions(impressions) {
            // Meta returns impressions as an object like {lower_bound: "1000", upper_bound: "5000"}
            if (typeof impressions === 'object' && impressions !== null) {
                const lower = parseInt(impressions.lower_bound || 0);
                const upper = parseInt(impressions.upper_bound || 0);
                return `${formatNumber(lower)}\u2013${formatNumber(upper)}`;
            }
            if (typeof impressions === 'number') {
                return formatNumber(impressions);
            }
            return String(impressions);
        }

        function formatNumber(n) {
            if (n >= 1000000) return `${(n / 1000000).toFixed(1)}m`;
            if (n >= 1000) return `${(n / 1000).toFixed(0)}k`;
            return String(n);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
